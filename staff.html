          </select>
          <span class="hint">Matches the coloured dot in the dashboard.</span>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${s ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('subjForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        name: fd.get('name'),
        exam_board: fd.get('exam_board'),
        level: fd.get('level'),
        color_key: fd.get('color_key'),
      };
      if (s) {
        const { error } = await supabaseClient.from('subjects').update(payload).eq('id', s.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject updated', 'success');
      } else {
        const { data, error } = await supabaseClient.from('subjects').insert(payload).select().single();
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  window.deleteSubject = async (id) => {
    if (!confirm('Delete this subject and everything under it (topics, lessons, blocks)? This cannot be undone.')) return;
    const { error } = await supabaseClient.from('subjects').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Subject deleted', 'success');
    if (state.currentSubject?.id === id) { state.currentSubject = null; state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  $('newSubjectBtn').addEventListener('click', () => openSubjectModal());

  window.openTopicModal = (parentId, id) => {
    // parentId may be a subject id (when + Topic) or a topic id (when renaming)
    let subjectId, existing;
    if (id) {
      existing = findTopic(id);
      subjectId = existing?.subject_id;
    } else {
      subjectId = parentId;
    }
    openModal(existing ? 'Rename topic' : 'New topic', `
      <form id="topicForm" class="editor" style="padding: 0;">
        <div class="form-row">
          <label>Name</label>
          <input name="name" required value="${escapeHtml(existing?.name || '')}" placeholder="e.g. Cell structure" />
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('topicForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      if (existing) {
        const { error } = await supabaseClient.from('topics').update({ name }).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic updated', 'success');
      } else {
        // figure out next order_index
        const subj = state.subjects.find(s => s.id === subjectId);
        const next = (subj?.topics || []).length;
        const { error } = await supabaseClient.from('topics').insert({ name, subject_id: subjectId, order_index: next });
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  function findTopic(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) if (t.id === id) return t;
    return null;
  }
  function findLesson(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) for (const l of (t.lessons || [])) if (l.id === id) return { lesson: l, topic: t, subject: s };
    return null;
  }

  window.deleteTopic = async (id) => {
    if (!confirm('Delete this topic and all its lessons?')) return;
    const { error } = await supabaseClient.from('topics').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Topic deleted', 'success');
    if (state.currentTopic?.id === id) { state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  window.openLessonModal = (topicId, id) => {
    let existing, parentTopic;
    if (id) {
      const found = findLesson(id);
      existing = found?.lesson;
      parentTopic = found?.topic;
      topicId = existing?.topic_id;
    } else {
      parentTopic = findTopic(topicId);
    }
    openModal(existing ? 'Rename lesson' : 'New lesson', `
      <form id="lessonForm" class="editor" style="padding: 0;">
        <div class="form-row">
          <label>Title</label>
          <input name="title" required value="${escapeHtml(existing?.title || '')}" placeholder="e.g. Mitochondria" />
        </div>
        <div class="form-row">
          <label>Duration (minutes)</label>
          <input name="duration_min" type="number" min="1" max="600" value="${existing?.duration_min ?? 20}" />
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('lessonForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        title: e.target.title.value.trim(),
        duration_min: parseInt(e.target.duration_min.value, 10) || 20,
      };
      if (!payload.title) return;
      if (existing) {
        const { error } = await supabaseClient.from('lessons').update(payload).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Lesson updated', 'success');
      } else {
        const next = (parentTopic?.lessons || []).length;
        const { error } = await supabaseClient.from('lessons').insert({ ...payload, topic_id: topicId, order_index: next });
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Lesson created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  window.deleteLesson = async (id) => {
    if (!confirm('Delete this lesson and all its blocks?')) return;
    const { error } = await supabaseClient.from('lessons').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Lesson deleted', 'success');
    if (state.currentLesson?.id === id) { state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  // ---------- lesson editor ----------
  window.openLesson = async (id) => {
    if (state.dirty && !confirm('You have unsaved changes. Discard them?')) return;

    const found = findLesson(id);
    if (!found) { toast('Lesson not found', 'error'); return; }
    const { lesson, topic, subject } = found;

    state.currentSubject = subject;
    state.currentTopic = topic;

    const { data: blocks, error } = await supabaseClient
      .from('lesson_blocks')
      .select('*')
      .eq('lesson_id', id)
      .order('order_index');
    if (error) { toast('Could not load blocks: ' + error.message, 'error'); return; }

    state.currentLesson = {
      ...lesson,
      blocks: blocks || [],
    };
    state.dirty = false;
    renderTree();
    renderEditor();
  };

  function renderEmpty() {
    $('main').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div>
          <h2>Lesson creator</h2>
          <p>Pick a subject, topic, and lesson on the left to start editing. Or create a new one.</p>
          <div class="actions">
            <button class="btn-primary" onclick="document.getElementById('newSubjectBtn').click()">+ New subject</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderEditor() {
    const L = state.currentLesson;
    if (!L) { renderEmpty(); return; }
    const topic = state.currentTopic;
    const subj  = state.currentSubject;

    $('main').innerHTML = `
      <div class="topbar">
        <div class="crumbs">
          <a href="#" onclick="renderEmpty(); return false;">Catalogue</a>
          <span class="sep">/</span>
          <span>${escapeHtml(subj.name)}</span>
          <span class="sep">/</span>
          <span>${escapeHtml(topic.name)}</span>
          <span class="sep">/</span>
          <span class="current">${escapeHtml(L.title)}</span>
        </div>
        <div class="right">
          <button class="btn-ghost" id="previewBtn">Preview</button>
          <button class="btn-primary" id="saveBlocksBtn">Save blocks</button>
        </div>
      </div>
      <div class="editor">
        <div class="editor-meta">
          <div class="form-row" style="margin: 0;">
            <label>Lesson title</label>
            <input id="lessonTitle" value="${escapeHtml(L.title)}" />
          </div>
          <div class="form-row" style="margin: 0;">
            <label>Duration (min)</label>
            <input id="lessonDuration" type="number" min="1" max="600" value="${L.duration_min ?? 20}" />
          </div>
          <div class="form-row" style="margin: 0;">
            <label>Order</label>
            <input id="lessonOrder" type="number" value="${L.order_index ?? 0}" />
          </div>
        </div>
        <div class="editor-actions">
          <span class="${state.dirty ? 'dirty' : 'saved'}">${state.dirty ? '● Unsaved changes' : '✓ All saved'}</span>
          <span class="spacer"></span>
          <span class="shortcuts"><kbd>⌘S</kbd> save · <kbd>⌘Z</kbd> undo block</span>
          <button class="btn-ghost" id="saveMetaBtn">Save lesson details</button>
        </div>
        <div class="blocks" id="blocksList"></div>
        <div class="block-add" id="blockPicker"></div>
      </div>
    `;
    renderBlocksList();
    renderBlockPicker();

    document.getElementById('previewBtn').addEventListener('click', openPreview);
    document.getElementById('saveMetaBtn').addEventListener('click', saveLessonMeta);
    document.getElementById('saveBlocksBtn').addEventListener('click', saveBlocks);
    ['lessonTitle','lessonDuration','lessonOrder'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => { state.dirty = true; renderEditorHeader(); });
    });
  }

  function renderEditorHeader() {
    const el = document.querySelector('.editor-actions .saved, .editor-actions .dirty');
    if (!el) return;
    el.className = state.dirty ? 'dirty' : 'saved';
    el.textContent = state.dirty ? '● Unsaved changes' : '✓ All saved';
  }

  async function saveLessonMeta() {
    const L = state.currentLesson;
    if (!L) return;
    const payload = {
      title: document.getElementById('lessonTitle').value.trim(),
      duration_min: parseInt(document.getElementById('lessonDuration').value, 10) || 20,
      order_index: parseInt(document.getElementById('lessonOrder').value, 10) || 0,
    };
    if (!payload.title) { toast('Title is required', 'error'); return; }
    const { error } = await supabaseClient.from('lessons').update(payload).eq('id', L.id);
    if (error) { toast('Save failed: ' + error.message, 'error'); return; }
    Object.assign(L, payload);
    state.dirty = false;
    renderEditorHeader();
    await loadTree();
    // re-open this lesson in the tree to refresh the title
    renderTree();
    // re-mark active
    const active = document.querySelector(`.tree-lesson[data-lesson-id="${L.id}"]`);
    if (active) active.classList.add('active');
    toast('Lesson saved', 'success');
  }

  function renderBlocksList() {
    const list = document.getElementById('blocksList');
    if (!list) return;
    const L = state.currentLesson;
    if (!L.blocks.length) {
      list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--text-4); font-size: 13px; background: var(--bg-2); border: 1px dashed var(--line-2); border-radius: var(--r-md);">No blocks yet. Use the picker below to add the first one.</div>`;
      return;
    }
    list.innerHTML = L.blocks.map((b, i) => renderBlockEditor(b, i)).join('');
    // Wire interactivity for any block whose editor body includes a .preview
    // (callout, image, video, math, worked_example, reveal, flashcard, plus
    // all the new interactive practice / layout / study-aid kinds).
    list.querySelectorAll('.block').forEach((blockEl) => {
      const i = parseInt(blockEl.dataset.blockIndex, 10);
      if (isNaN(i)) return;
      const block = L.blocks[i];
      const preview = blockEl.querySelector('.preview');
      if (preview && block) bindInteractive(preview, block);
    });
    // Wire drag-to-reorder
    wireDragReorder(list);
  }

  // ---------- block picker (grouped) ----------
  const BLOCK_GROUPS = {
    'Text & structure': ['heading', 'text', 'callout', 'image', 'video', 'math', 'keypoints', 'worked_example', 'reveal', 'flashcard'],
    'Interactive practice': ['mcq', 'truefalse', 'shortanswer', 'fillblank', 'match', 'ordering', 'hotspot'],
    'Layout': ['accordion', 'tabs', 'compare', 'timeline'],
    'Study aids': ['objectives', 'prerequisites', 'glossary', 'summary'],
  };

  function renderBlockPicker() {
    const picker = document.getElementById('blockPicker');
    if (!picker) return;
    const html = Object.entries(BLOCK_GROUPS).map(([group, kinds], gi) => {
      const sep = gi > 0 ? `<span class="group-sep"></span>` : '';
      const label = `<span class="group-label">${escapeHtml(group)}</span>`;
      const btns = kinds.map(k => {
        if (!BLOCK_DEFS[k]) return '';
        return `<button class="picker-btn" onclick="addBlock('${k}')" title="${escapeHtml(BLOCK_DEFS[k].label)}">+ ${escapeHtml(BLOCK_DEFS[k].label)}</button>`;
      }).join('');
      return `${sep}${label}${btns}`;
    }).join('');
    const tplBtn = `<span class="group-sep"></span><span class="group-label">Templates</span><button class="picker-btn" id="tplBtn" onclick="toggleTemplatePop(event)">+ From template…</button>`;
    picker.innerHTML = html + tplBtn;
  }

  // ---------- template library ----------
  const TEMPLATES = {
    'mcq-photosynthesis': {
      label: 'MCQ — photosynthesis',
      hint:  'A 4-option MCQ about photosynthesis.',
      blocks: () => [{ kind: 'mcq', data: BLOCK_DEFS.mcq.defaults() }]
    },
    'worked-quadratic': {
      label: 'Worked example — quadratic equation',
      hint:  'A step-by-step worked example for (x+3)(x-2)=0.',
      blocks: () => [{
        kind: 'worked_example',
        data: {
          question: 'Solve (x + 3)(x − 2) = 0.',
          steps: [
            { label: 'Step 1', body: 'A product is zero when at least one of its factors is zero.' },
            { label: 'Step 2', body: 'Set **x + 3 = 0** and **x − 2 = 0**.' },
            { label: 'Step 3', body: 'Solve each linear equation.' }

          answer: 'x = −3 or x = 2'
        }
      }]
    },

      hint:  '5 reveal blocks with cell-biology terms.',
      blocks: () => {

          ['Mitochondrion', 'The site of aerobic respiration in eukaryotic cells.'],
          ['Ribosome',       'The site of protein synthesis; found free in the cytoplasm and on the rough ER.'],
          ['Nucleus',        'Contains the cell\'s DNA and controls its activities.'],
          ['Cell membrane',  'A phospholipid bilayer that controls what enters and leaves the cell.'],

        kind: 'timeline',

            { date: '1939', title: 'War begins', markdown: 'Germany invades Poland; Britain and France declare war.' },

            { date: '1944', title: 'D-Day', markdown: 'Allied forces land on the beaches of Normandy.' },

        }
      }]
    },

      blocks: () => [{
        kind: 'glossary',
        data: {

            { term: 'Proton', definition: 'A positively charged particle in the nucleus.' },
            { term: 'Neutron', definition: 'A neutral particle in the nucleus.' },
            { term: 'Electron', definition: 'A negatively charged particle orbiting the nucleus.' },
            { term: 'Atomic number', definition: 'The number of protons in the nucleus.' },

  function toggleTemplatePop(e) {
    e.stopPropagation();
    const existing = document.getElementById('tplPop');
    if (existing) { existing.remove(); return; }
    const pop = document.createElement('div');
    pop.id = 'tplPop';
    pop.className = 'tpl-pop';
    pop.style.top = (e.target.getBoundingClientRect().bottom + window.scrollY + 4) + 'px';
    pop.style.left = Math.min(window.innerWidth - 360, e.target.getBoundingClientRect().left + window.scrollX) + 'px';
    pop.innerHTML = `
      <div class="tpl-head">Insert from template</div>
      ${Object.entries(TEMPLATES).map(([id, t]) => `
        <button class="tpl-item" onclick="applyTemplate('${id}')">
          ${escapeHtml(t.label)}
          <span class="tpl-meta">${escapeHtml(t.hint || '')}</span>
        </button>
      `).join('')}
    `;
    document.body.appendChild(pop);
    const closer = (ev) => {
      if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', closer); }
    };
    setTimeout(() => document.addEventListener('click', closer), 0);
  }
  window.applyTemplate = (id) => {
    const t = TEMPLATES[id];
    if (!t) return;
    if (!state.currentLesson) { toast('Open a lesson first', 'error'); return; }
    const blocks = t.blocks();
    state.currentLesson.blocks.push(...blocks);
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
    document.getElementById('tplPop')?.remove();
    toast(`Inserted ${blocks.length} block${blocks.length === 1 ? '' : 's'} from template`, 'success');
  };

  function renderBlockEditor(b, i) {
    const def = BLOCK_DEFS[b.kind];
    const label = def ? def.label : b.kind;
    const isFirst = i === 0;
    const isLast  = i === state.currentLesson.blocks.length - 1;
    return `
      <div class="block" data-block-id="${b.id || ''}" data-block-index="${i}" draggable="true">
        <div class="block-head">
          <span class="grip" style="color:var(--text-4);cursor:grab;padding:0 4px;font-size:12px;user-select:none;" title="Drag to reorder">⋮⋮</span>
          <span class="kind-label">${escapeHtml(label)}</span>
          <span style="color: var(--text-4);">#${i + 1}</span>
          <span class="spacer"></span>
          <button class="icon-btn" title="Move up"   ${isFirst ? 'disabled' : ''} onclick="moveBlock(${i}, -1)">▲</button>
          <button class="icon-btn" title="Move down" ${isLast  ? 'disabled' : ''} onclick="moveBlock(${i}, +1)">▼</button>
          <button class="icon-btn" title="Duplicate" onclick="duplicateBlock(${i})">⎘</button>
          <button class="icon-btn danger" title="Delete" onclick="deleteBlock(${i})">✕</button>
        </div>
        <div class="block-body">
          ${renderBlockEditorBody(b, i)}
        </div>
      </div>
    `;
  }

  // Per-kind inline editor body. Each editor reads from / writes to
  // state.currentLesson.blocks[i].data and also marks state.dirty = true.
  function renderBlockEditorBody(b, i) {
    switch (b.kind) {
      case 'heading':
        return `

            <label>Level</label>

          </div>
        `;
      case 'text':
        return `
          <div class="two-col">
            <div class="form-row" style="margin: 0;">
              <label>Markdown</label>
              <textarea class="mono" oninput="updateBlock(${i}, {markdown: this.value})">${escapeHtml(b.data.markdown || '')}</textarea>

            <label>Tone</label>
            <select onchange="updateBlock(${i}, {tone: this.value})">

              <option value="warning"    ${b.data.tone==='warning'?'selected':''}>⚠️ Warning</option>
              <option value="definition" ${b.data.tone==='definition'?'selected':''}>📖 Definition</option>
            </select>
          </div>
          <div class="two-col">
            <div class="form-row" style="margin: 0;">
              <label>Markdown</label>
              <textarea oninput="updateBlock(${i}, {markdown: this.value})">${escapeHtml(b.data.markdown || '')}</textarea>
            </div>
            <div class="form-row" style="margin: 0;">
              <label>Preview</label>
              <div class="preview">${renderBlock(b)}</div>
            </div>
          </div>

      case 'image':
        return `
          <div class="form-row">
            <label>Image URL</label>
            <div style="display:flex;gap:6px;">
              <input id="imgUrl-${i}" value="${escapeHtml(b.data.url||'')}" oninput="updateBlock(${i}, {url: this.value})" placeholder="https://…" style="flex:1;" />
              <button class="upload-btn" onclick="uploadImage(${i})" title="Upload to lesson-images bucket">↑ Upload</button>

          </div>
          <div class="form-row">
            <label>Caption (optional)</label>
            <input value="${escapeHtml(b.data.caption||'')}" oninput="updateBlock(${i}, {caption: this.value})" />

          <div class="form-row" style="margin: 0;">

            <div class="preview">${renderBlock(b)}</div>

          <div class="form-row" style="margin: 0;">
            <label>Preview</label>
            <div class="preview">${renderBlock(b)}</div>
          </div>

        return `
          <div class="form-row inline">
            <label>LaTeX</label>

  // ----- Fill-in-the-blank editor -----
  function renderFBEditor(b, i) {
    const blanks = b.data.blanks || [];
    return `
      <div class="form-row">
        <label>Sentence (use <code>___</code> for each blank)</label>
        <textarea oninput="updateFBText(${i}, this.value)">${escapeHtml(b.data.text || '')}</textarea>
      </div>
      <div class="form-row">
        <label>Answers (in order)</label>
        <div class="repeater">
          ${blanks.map((bl, j) => `
            <div class="fb-line">
              <div class="fb-head">
                <code>blank ${j + 1}</code>
                <input type="text" value="${escapeHtml(bl.answer || '')}" oninput="updateFBBlank(${i}, ${j}, this.value)" placeholder="Answer" />
                <button class="del" onclick="removeFBBlank(${i}, ${j})">✕</button>
              </div>
            </div>
          `).join('')}
          <button class="add" onclick="addFBBlank(${i})">+ Add blank</button>
        </div>
        <span class="hint">The number of <code>___</code> placeholders in the sentence should match the number of answers. Use the Sync button if they differ.</span>
      </div>
      <div class="form-row">
        <button class="btn-ghost" onclick="syncFBBlanks(${i})">Sync blanks to text</button>
      </div>
      <div class="form-row">
        <label>Explanation (shown after checking)</label>
        <textarea oninput="updateBlock(${i}, {explanation: this.value})">${escapeHtml(b.data.explanation || '')}</textarea>
      </div>
      <div class="form-row" style="margin: 0;">
        <label>Preview</label>
        <div class="preview">${renderBlock(b)}</div>
      </div>
    `;
  }
  window.updateFBText = (i, val) => {
    const data = state.currentLesson.blocks[i].data;
    data.text = val;
    // Auto-extend/trim blanks array to match ___ count
    const count = (val.match(/___/g) || []).length;
    if (!data.blanks) data.blanks = [];
    while (data.blanks.length < count) data.blanks.push({ answer: '' });
    if (data.blanks.length > count) data.blanks.length = count;
    state.dirty = true; renderEditorHeader();
    // Re-render just the blanks list inside this block
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    if (!block) return;
    const preview = block.querySelector('.preview');
    if (preview) {
      preview.innerHTML = renderBlock(state.currentLesson.blocks[i]);
      bindInteractive(preview, state.currentLesson.blocks[i]);
    }
  };
  window.updateFBBlank = (i, j, val) => {
    const data = state.currentLesson.blocks[i].data;
    if (!data.blanks[j]) data.blanks[j] = { answer: '' };
    data.blanks[j].answer = val;
    state.dirty = true; renderEditorHeader();
  };
  window.addFBBlank = (i) => {
    const data = state.currentLesson.blocks[i].data;
    if (!data.blanks) data.blanks = [];
    data.blanks.push({ answer: '' });
    // Also add a ___ placeholder at the end
    data.text = (data.text || '') + ' ___';
    renderBlocksList();
  };
  window.removeFBBlank = (i, j) => {
    const data = state.currentLesson.blocks[i].data;
    data.blanks.splice(j, 1);
    // Remove the n-th ___ occurrence
    const parts = (data.text || '').split('___');
    if (parts.length > 1) {
      parts.splice(j, 1);
      data.text = parts.join('___');
    }
    renderBlocksList();
  };
  window.syncFBBlanks = (i) => {
    const data = state.currentLesson.blocks[i].data;
    const count = ((data.text || '').match(/___/g) || []).length;
    if (!data.blanks) data.blanks = [];
    while (data.blanks.length < count) data.blanks.push({ answer: '' });
    if (data.blanks.length > count) data.blanks.length = count;
    renderBlocksList();
  };

  // ---------- drag-to-reorder ----------
  function wireDragReorder(list) {
    if (!list) return;
    let dragSrc = null;
    list.querySelectorAll('.block[draggable="true"]').forEach((el) => {
      el.addEventListener('dragstart', (e) => {
        dragSrc = el;
        el.classList.add('dragging');
        // Without setData Firefox refuses to start the drag
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', el.dataset.blockIndex || '');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        list.querySelectorAll('.block').forEach(b => b.classList.remove('drop-above', 'drop-below'));
        dragSrc = null;
      });
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!dragSrc || dragSrc === el) return;
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        list.querySelectorAll('.block').forEach(b => b.classList.remove('drop-above', 'drop-below'));
        el.classList.add(after ? 'drop-below' : 'drop-above');
      });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSrc || dragSrc === el) return;
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        const srcIdx = parseInt(dragSrc.dataset.blockIndex, 10);
        const dstIdx = parseInt(el.dataset.blockIndex, 10);
        if (isNaN(srcIdx) || isNaN(dstIdx) || srcIdx === dstIdx) return;
        const arr = state.currentLesson.blocks;
        const [moved] = arr.splice(srcIdx, 1);
        // After splicing, the destination index may have shifted
        const newDst = srcIdx < dstIdx ? dstIdx : dstIdx;
        arr.splice(after ? newDst + 1 : newDst, 0, moved);
        state.dirty = true;
        renderBlocksList();
        renderEditorHeader();
      });
    });
  }

  // ---------- per-block undo (Cmd/Ctrl+Z) ----------
  // Coalesces rapid keystrokes into a single undo chunk. After 800ms of
  // no further changes to the same block, the next change starts a new
  // chunk. This makes Cmd+Z feel natural for typing (undo a word) rather
  // than per-character.
  const _undoStack = new Map();   // block index -> array of data snapshots
  const _undoLastAt = new Map();  // block index -> timestamp of last push
  const _undoChunkMs = 800;

  function pushUndo(i) {
    const data = state.currentLesson.blocks[i]?.data;
    if (!data) return;
    const now = Date.now();
    if (_undoLastAt.has(i) && now - _undoLastAt.get(i) < _undoChunkMs) {
      _undoLastAt.set(i, now);
      return; // still in the same edit chunk
    }
    _undoLastAt.set(i, now);
    const snap = JSON.parse(JSON.stringify(data));
    const stack = _undoStack.get(i) || [];
    stack.push(snap);
    if (stack.length > 50) stack.shift();
    _undoStack.set(i, stack);
  }
  window.undoBlock = (i) => {
    const stack = _undoStack.get(i);
    if (!stack || !stack.length) { toast('Nothing to undo in this block', 'error'); return; }
    const prev = stack.pop();
    state.currentLesson.blocks[i].data = prev;
    state.dirty = true;
    // Reset the chunk window so the next change is a fresh edit chunk.
    _undoLastAt.set(i, 0);
    renderBlocksList();
    renderEditorHeader();
  };

  // ---------- global keyboard shortcuts ----------

    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      if (state.currentLesson) saveBlocks();
      return;
    }
    // Cmd/Ctrl+Z undoes the active block (only if focus is inside .editor)
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
      const t = e.target;
      const blockEl = t && t.closest && t.closest('.block');
      if (blockEl && state.currentLesson) {

  });

  let _saveTimer = null;
  let _saveInFlight = false;
  let _saveQueued = false;
  async function maybeAutosave() {
    if (!state.currentLesson || !state.dirty) return;
    if (_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async () => {
      if (_saveInFlight) { _saveQueued = true; return; }
      _saveInFlight = true;
      try { await saveBlocks({ silent: true }); } finally { _saveInFlight = false; }

  // ---------- save blocks ----------
  async function saveBlocks(opts = {}) {
    const L = state.currentLesson;
    if (!L) return;
    // Plan: for each block, if id is null → insert; else update. For deletes
    // we diff against the most recently loaded set (state._serverBlocks).
    const server = L._serverBlocks || (L._serverBlocks = await fetchServerBlocks(L.id));
    const current = L.blocks;

    const currentIds = new Set(current.filter(b => b.id).map(b => b.id));
    const toDelete = server.filter(b => !currentIds.has(b.id)).map(b => b.id);
    if (toDelete.length) {
      const { error } = await supabaseClient.from('lesson_blocks').delete().in('id', toDelete);
      if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    }

    // Insert + update in parallel
    const inserts = current.filter(b => !b.id).map((b, idx) => ({
      lesson_id: L.id,
      kind: b.kind,
      data: b.data,
      order_index: current.indexOf(b),
    }));
    if (inserts.length) {
      const { error } = await supabaseClient.from('lesson_blocks').insert(inserts);
      if (error) { toast('Insert failed: ' + error.message, 'error'); return; }
    }
    // Updates: only need to send if data or order_index changed
    const updates = current.filter(b => b.id).map((b) => {
      const before = server.find(s => s.id === b.id);
      const newOrder = current.indexOf(b);
      const dataChanged = !before || JSON.stringify(before.data) !== JSON.stringify(b.data);
      const orderChanged = !before || before.order_index !== newOrder;
      return (dataChanged || orderChanged) ? { id: b.id, data: b.data, order_index: newOrder } : null;
    }).filter(Boolean);
    for (const u of updates) {
      const { error } = await supabaseClient.from('lesson_blocks').update({ data: u.data, order_index: u.order_index }).eq('id', u.id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return; }
    }

    // Reload to get the canonical state (ids, order).
    L._serverBlocks = await fetchServerBlocks(L.id);
    L.blocks = L._serverBlocks;
    state.dirty = false;
    renderBlocksList();
    renderEditorHeader();
    if (!opts.silent) toast('Blocks saved', 'success');
  }

  async function fetchServerBlocks(lessonId) {
    const { data, error } = await supabaseClient
      .from('lesson_blocks')
      .select('*')
      .eq('lesson_id', lessonId)
      .order('order_index');
    if (error) { toast('Could not load blocks: ' + error.message, 'error'); return []; }
    return data || [];
  }

  // ---------- preview modal ----------
  function openPreview() {
    const L = state.currentLesson;

    const blocksHtml = (L.blocks || []).map((b, i) =>

    ).join('') || '<p style="color: var(--text-4)">No blocks yet.</p>';
    const body = `
      <article style="font-size: 14.5px; line-height: 1.6; color: var(--text);">
        <h1 style="font-size: 26px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.02em;">${escapeHtml(L.title)}</h1>
        <p style="color: var(--text-3); font-size: 13px; margin: 0 0 20px;">
          ${escapeHtml(state.currentSubject?.name || '')} · ${escapeHtml(state.currentTopic?.name || '')} · ${L.duration_min ?? 20} min
        </p>
        ${blocksHtml}
      </article>
    `;
    openModal('Preview — ' + L.title, body);
    // Wire interactivity for any interactive blocks in the preview.
    const article = $('modalBody').querySelector('article');
    if (article) {
      article.querySelectorAll('.preview-block').forEach((wrap, i) => {
        bindInteractive(wrap, L.blocks[i]);
      });
    }
  }

  // ============================================================
  // EDITOR DISPATCH — maps new block kinds to their editor renderers.
  // Defined last so the helper functions above are in scope.
  // ============================================================
  const EDITOR_DISPATCH = {
    mcq:           (b, i) => renderMCQEditor(b, i),
    truefalse:     (b, i) => renderTFEditor(b, i),
    shortanswer:   (b, i) => renderSAEditor(b, i),
    fillblank:     (b, i) => renderFBEditor(b, i),
    match:         (b, i) => renderMatchEditor(b, i),
    ordering:      (b, i) => renderOrderingEditor(b, i),
    hotspot:       (b, i) => renderHotspotEditor(b, i),
    accordion:     (b, i) => renderAccordionEditor(b, i),
    tabs:          (b, i) => renderTabsEditor(b, i),
    compare:       (b, i) => renderCompareEditor(b, i),
    timeline:      (b, i) => renderTimelineEditor(b, i),
    objectives:    (b, i) => renderObjectivesEditor(b, i),
    prerequisites: (b, i) => renderPrereqEditor(b, i),
    glossary:      (b, i) => renderGlossaryEditor(b, i),
    summary:       (b, i) => renderSummaryEditor(b, i),
  };

  // ---------- go ----------
  boot();
</script>
</body>
</html>
