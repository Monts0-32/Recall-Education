<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consent recorded — Recall</title>
  <meta name="description" content="Thanks — parental consent has been recorded for a Recall account." />
  <!-- Polite redirect to the home page after 5 seconds. The parent can also
       click "Close this tab" — there's no need to go anywhere specific. -->
  <meta http-equiv="refresh" content="5;url=/index.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0D1117;
      --bg-2:      #161B22;
      --bg-3:      #1C2128;
      --bg-4:      #21262D;
      --line:      #21262D;
      --line-2:    #30363D;
      --line-3:    #484F58;
      --text:      #F0F6FC;
      --text-2:    #C9D1D9;
      --text-3:    #8B949E;
      --text-4:    #6E7681;
      --blue:      #58A6FF;
      --blue-2:    #1F6FEB;
      --green:     #3FB950;
      --r-sm: 6px;
      --r-md: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav.top {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    nav.top .row {
      max-width: 1280px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 16px;
      color: var(--text);
    }
    .brand-mark {
      width: 28px; height: 28px;
      background: var(--blue); color: #fff;
      display: grid; place-items: center;
      font-weight: 800; font-size: 14px;
      border-radius: var(--r-sm);
    }

    .wrap {
      max-width: 560px; margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .card {
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      padding: 32px;
    }
    h1 {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.015em;
      margin: 0 0 8px;
    }
    .lede {
      font-size: 14px;
      color: var(--text-2);
      margin: 0 0 18px;
    }

    .check {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.4);
      border-radius: var(--r-sm);
      color: #7EE787;
      font-size: 13px;
      margin: 18px 0 22px;
    }
    .check .glyph {
      width: 22px; height: 22px;
      background: var(--green);
      color: #0D1117;
      border-radius: 50%;
      display: grid; place-items: center;
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
    }
    .check b { color: #A7F0B5; font-weight: 600; }

    .actions {
      display: flex; gap: 10px;
    }
    .btn-ghost {
      flex: 1;
      padding: 10px 18px;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line-2);
    }
    .btn-ghost:hover { background: var(--bg-3); text-decoration: none; }

    .small {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--blue); outline-offset: 2px;
    }
  </style>
</head>
<body>

<nav class="top">
  <div class="row">
    <a class="brand" href="index.html"><span class="brand-mark">R</span> Recall</a>
  </div>
</nav>

<main class="wrap">
  <div class="card">
    <h1>Consent recorded</h1>
    <p class="lede">Thank you. Your decision has been saved.</p>

    <div class="check">
      <span class="glyph">✓</span>
      <span><b>Your child can now use Recall.</b> Their account is active and they can sign in straight away.</span>
    </div>

    <div class="actions">
      <a class="btn-ghost" href="index.html">Close this tab</a>
    </div>

    <p class="small">
      You can withdraw consent at any time by emailing
      <a href="mailto:hello@recalleducation.co.uk">hello@recalleducation.co.uk</a> —
      we will delete the account.
    </p>
  </div>
</main>

</body>
</html>
