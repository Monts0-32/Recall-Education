<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email confirmed — Recall</title>
  <meta name="description" content="Your Recall email is confirmed." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0D1117;
      --bg-2:      #161B22;
      --bg-3:      #1C2128;
      --bg-4:      #21262D;
      --line:      #21262D;
      --line-2:    #30363D;
      --line-3:    #484F58;
      --text:      #F0F6FC;
      --text-2:    #C9D1D9;
      --text-3:    #8B949E;
      --text-4:    #6E7681;
      --blue:      #58A6FF;
      --blue-2:    #1F6FEB;
      --green:     #3FB950;
      --red:       #F85149;
      --r-sm: 6px;
      --r-md: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav.top {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    nav.top .row {
      max-width: 1280px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 16px;
      color: var(--text);
    }
    .brand-mark {
      width: 28px; height: 28px;
      background: var(--blue); color: #fff;
      display: grid; place-items: center;
      font-weight: 800; font-size: 14px;
      border-radius: var(--r-sm);
    }

    .wrap {
      max-width: 560px; margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .card {
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      padding: 32px;
    }
    h1 {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.015em;
      margin: 0 0 8px;
    }
    .lede {
      font-size: 14px;
      color: var(--text-2);
      margin: 0 0 24px;
    }

    .state {
      display: none;
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .state.show { display: block; }
    .state.info  { background: rgba(56,139,253,0.10); border: 1px solid rgba(56,139,253,0.4); color: var(--blue); }
    .state.warn  { background: rgba(210,153,34,0.10); border: 1px solid rgba(210,153,34,0.4); color: #E3B341; }
    .state.error { background: rgba(248,81,73,0.10);  border: 1px solid rgba(248,81,73,0.4);  color: #FFA198; }

    .actions {
      display: flex; gap: 10px;
      margin-top: 8px;
    }
    .btn-primary, .btn-ghost {
      flex: 1;
      padding: 10px 18px;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--blue); color: #fff;
      border: 1px solid var(--blue);
    }
    .btn-primary:hover { background: var(--blue-2); border-color: var(--blue-2); text-decoration: none; }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line-2);
    }
    .btn-ghost:hover { background: var(--bg-3); text-decoration: none; }

    .small {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .loading {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 18px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--blue); outline-offset: 2px;
    }
  </style>
</head>
<body>

<nav class="top">
  <div class="row">
    <a class="brand" href="index.html"><span class="brand-mark">R</span> Recall</a>
  </div>
</nav>

<main class="wrap">
  <div class="card">
    <h1 id="heading">Email confirmed</h1>
    <p class="lede" id="cardLede">Verifying your account…</p>

    <div class="state" id="state"></div>
    <div class="loading" id="loading">One moment…</div>

    <div id="ready" hidden>
      <div class="actions">
        <a class="btn-primary" id="ctaBtn" href="dashboard.html">Go to your dashboard</a>
        <a class="btn-ghost"   href="index.html">Back to home</a>
      </div>
      <p class="small">
        Need help? Email <a href="mailto:hello@recalleducation.co.uk">hello@recalleducation.co.uk</a>.
      </p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Supabase client — same project as the rest of the site.
  const SUPABASE_URL = 'https://hkjiyibpeqdoqzlyqzwz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhraml5aWJwZXFkb3F6bHlxend6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MzkxNDgsImV4cCI6MjA5OTQxNTE0OH0.UGVZ0-b9-c7JVtu006mmyfj0NkIbpmmn0wCNNqdi9iU';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = (id) => document.getElementById(id);

  function showState(msg, kind) {
    const el = $('state');
    el.textContent = msg;
    el.className = 'state show ' + (kind || 'info');
  }
  function showReady() {
    $('loading').hidden = true;
    $('ready').hidden = false;
  }
  function showLoading() {
    $('loading').hidden = false;
    $('ready').hidden = true;
    $('state').classList.remove('show');
  }

  // Read the user's profile to decide which "ready" state to show:
  //   - over-16 OR consent already granted:  "Go to your dashboard"
  //   - under-16 awaiting parent:           "We're waiting on your parent"
  async function renderReady(user) {
    try {
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('requires_parental_consent, consent_status, full_name')
        .eq('id', user.id)
        .maybeSingle();

      if (profile && profile.requires_parental_consent && profile.consent_status !== 'granted') {
        $('heading').textContent = 'Almost there';
        $('cardLede').textContent =
          'Your account is ready, but we need a parent or guardian to confirm before you can sign in. We sent them a link by email — it expires in 7 days.';
        $('ctaBtn').textContent = 'Back to home';
        $('ctaBtn').setAttribute('href', 'index.html');
        showState('Waiting for parental consent.', 'warn');
        showReady();
        return;
      }

      // Over-16 OR consent granted. Welcome them by first name.
      const first = ((profile && profile.full_name) || user.email || '').trim().split(/\s+/)[0] || 'there';
      $('cardLede').textContent = 'Welcome, ' + first + '. Your account is ready. Taking you to your dashboard…';
      showReady();
      // Auto-redirect after 2s. The button is still there if they want to
      // click it manually (e.g. assistive tech, slow connection).
      setTimeout(function () { window.location.href = 'dashboard.html'; }, 2000);
    } catch (err) {
      // profiles not readable in this env (e.g. dashboard tables not yet
      // created). Optimistically send them to the dashboard anyway — the
      // dashboard's own auth check will redirect them back to /login.html
      // if the session is somehow not valid.
      showReady();
      setTimeout(function () { window.location.href = 'dashboard.html'; }, 2000);
    }
  }

  // Two ways the user can land here with a session:
  //   1. They came in with no URL hash but already have a session (e.g.
  //      opened the link in a browser that was already signed in). getSession()
  //      returns the session.
  //   2. They just clicked the email-confirmation link, which puts an
  //      access_token in the URL hash. supabase-js processes the hash
  //      asynchronously and emits SIGNED_IN. We listen for that.
  let handled = false;

  supabaseClient.auth.getSession().then(({ data, error }) => {
    if (handled) return;
    const session = data?.session;
    if (error || !session || !session.user) return; // wait for onAuthStateChange
    handled = true;
    renderReady(session.user);
  });

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (handled) return;
    // INITIAL_SESSION fires once after supabase-js parses the URL hash
    // (or once on init if there's no hash). SIGNED_IN fires when the
    // confirmation / recovery flow sets the session. Both are "we have a
    // user now" signals.
    if ((event === 'INITIAL_SESSION' || event === 'SIGNED_IN') && session?.user) {
      handled = true;
      renderReady(session.user);
    }
  });

  // If after 4s nothing has resolved, the link is invalid or expired.
  setTimeout(function () {
    if (handled) return;
    handled = true;
    $('loading').hidden = true;
    $('ready').hidden = true;
    $('state') && showState(
      'This confirmation link is invalid or has expired. Try signing in — if your account is verified, you\'ll be taken straight to your dashboard.',
      'error'
    );
    // Show a fallback CTA even in the error case.
    const fallback = document.createElement('div');
    fallback.className = 'actions';
    fallback.innerHTML =
      '<a class="btn-primary" href="login.html">Sign in</a>' +
      '<a class="btn-ghost" href="signup.html">Sign up again</a>';
    $('state').insertAdjacentElement('afterend', fallback);
  }, 4000);
</script>
</body>
</html>
