<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Binary — Recall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #0D1117;
      --bg-2:  #161B22;
      --line:  #21262D;
      --line-2:#30363D;
      --text:  #F0F6FC;
      --text-2:#C9D1D9;
      --text-3:#8B949E;
      --text-4:#6E7681;
      --blue:  #58A6FF;
      --blue-dim:  rgba(88,166,255,0.15);
      --green: #3FB950;
      --green-dim: rgba(63,185,80,0.12);
      --red:   #F85149;
      --red-dim:   rgba(248,81,73,0.12);
      --yellow:    #D29922;
      --r: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }
    .stage { width: 100%; max-width: 560px; }

    /* ---------- HUD (top strip) ---------- */
    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .hud-cell {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .hud-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-4); font-weight: 700;
    }
    .hud-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px; font-weight: 700;
      line-height: 1;
    }
    .hud-val.flash-up    { color: var(--green); }
    .hud-val.flash-down  { color: var(--red); }
    .lives { display: flex; gap: 4px; font-size: 14px; }
    .life { color: var(--red); }
    .life.gone { color: var(--text-4); }

    /* ---------- Question card ---------- */
    .card {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 28px 24px;
    }
    .q-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-3); font-weight: 700;
      margin: 0 0 6px;
    }
    .q-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 44px; font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
    }
    .q-value .suffix {
      font-size: 14px; color: var(--text-3);
      font-weight: 500; margin-left: 8px;
    }

    /* ---------- Bits ---------- */
    .bits {
      display: flex; gap: 6px; flex-wrap: wrap;
      justify-content: center; margin: 24px 0 16px;
    }
    .bit {
      background: var(--bg);
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      width: 60px; height: 78px;
      cursor: pointer; font-family: inherit;
      color: var(--text);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: background 0.1s, border-color 0.1s;
      -webkit-user-select: none; user-select: none;
    }
    .bit:hover { background: var(--bg-2); }
    .bit .v {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px; font-weight: 700; color: var(--text-4);
    }
    .bit .p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-4); margin-top: 4px;
    }
    .bit.on { background: var(--blue-dim); border-color: var(--blue); }
    .bit.on .v, .bit.on .p { color: var(--blue); }
    .bit.right { background: var(--green-dim); border-color: var(--green); }
    .bit.right .v, .bit.right .p { color: var(--green); }
    .bit.wrong { background: var(--red-dim); border-color: var(--red); }
    .bit.wrong .v, .bit.wrong .p { color: var(--red); }

    /* ---------- Actions ---------- */
    .actions {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 8px;
    }
    button {
      font-family: inherit; cursor: pointer;
      border-radius: var(--r);
    }
    .btn {
      background: var(--blue); color: #fff;
      border: 1px solid var(--blue);
      padding: 9px 20px;
      font-size: 13px; font-weight: 600;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--text-3);
      border: 1px solid transparent;
      padding: 9px 14px;
      font-size: 13px; font-weight: 500;
    }
    .btn-ghost:hover { color: var(--text); background: var(--bg); }

    /* ---------- Feedback ---------- */
    .feedback {
      margin-top: 12px; min-height: 36px;
      text-align: center;
      font-size: 13px; color: var(--text-3);
    }
    .feedback.ok  { color: var(--green); }
    .feedback.bad { color: var(--red); }

    /* ---------- Timer bar ---------- */
    .timer {
      height: 4px; background: var(--bg-2);
      border-radius: 999px; overflow: hidden;
      margin-bottom: 16px;
    }
    .timer-fill {
      height: 100%; background: var(--blue);
      width: 100%;
      transition: width 0.1s linear, background 0.2s;
    }
    .timer-fill.low      { background: var(--yellow); }
    .timer-fill.critical { background: var(--red); }
    .timer-fill.ended    { background: var(--text-4); }

    /* ---------- End screen ---------- */
    .end { text-align: center; }
    .end h1 {
      font-size: 28px; font-weight: 700; margin: 0 0 4px;
      letter-spacing: -0.01em;
    }
    .end p { color: var(--text-3); margin: 0 0 24px; }
    .final-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px; font-weight: 700; color: var(--blue);
      line-height: 1; margin-bottom: 8px;
    }
    .final-sub {
      display: flex; justify-content: center; gap: 24px;
      color: var(--text-3); font-size: 13px;
      margin-bottom: 24px;
    }
    .final-sub b {
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .card { padding: 22px 16px; }
      .q-value { font-size: 36px; }
      .bit { width: 38px; height: 60px; }
      .bit .v { font-size: 18px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="stage" id="root"></div>

<script>
(function () {
  'use strict';

  // ---------- config ----------
  const BITS = 8;
  const MAX  = 255;
  const TIME = 60;        // seconds
  const LIVES = 3;
  const STORE_KEY = 'recall.binaryGame.minimal.v1';
  const root = document.getElementById('root');

  // ---------- state ----------
  let score = 0, streak = 0, bestStreak = 0, lives = LIVES;
  let correct = 0, wrong = 0;
  let bits = new Array(BITS).fill(0);  // bits[0] = LSB
  let target = 0;
  let locked = false;
  let endsAt = 0, rafId = null, timeLeft = TIME;

  // ---------- storage ----------
  const best = (() => {
    try {
      const v = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
      return v && typeof v.score === 'number' ? v : { score: 0, streak: 0 };
    } catch (_) { return { score: 0, streak: 0 }; }
  })();
  const saveBest = () => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(best)); } catch (_) {}
  };

  // ---------- helpers ----------
  const $ = (s) => root.querySelector(s);
  const el = (tag, attrs = {}, ...children) => {
    const e = document.createElement(tag);
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    for (const c of children) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  };

  // ---------- render: play ----------
  function renderPlay() {
    root.innerHTML = '';
    const hud = el('div', { class: 'hud' },
      hudCell('Score', String(score), 'scoreVal'),
      hudCell('Streak', String(streak), 'streakVal'),
      hudLives(),
    );
    const timer = el('div', { class: 'timer' },
      el('div', { class: 'timer-fill', id: 'timerFill' })
    );
    const card = el('div', { class: 'card' },
      el('p', { class: 'q-title' }, 'Convert to binary'),
      el('p', { class: 'q-value' },
        String(target),
        el('span', { class: 'suffix' }, 'decimal')
      ),
      el('div', { class: 'bits', id: 'bits' },
        ...bitButtons()
      ),
      el('div', { class: 'actions' },
        el('button', { class: 'btn', id: 'submit', onclick: submit }, 'Submit'),
        el('button', { class: 'btn-ghost', id: 'skip', onclick: skip }, 'Skip')
      ),
      el('div', { class: 'feedback', id: 'fb' })
    );
    root.appendChild(hud);
    root.appendChild(timer);
    root.appendChild(card);
  }

  function hudCell(label, val, id) {
    return el('div', { class: 'hud-cell' },
      el('div', null,
        el('div', { class: 'hud-label' }, label),
        el('div', { class: 'hud-val', id }, val)
      )
    );
  }
  function hudLives() {
    const cell = el('div', { class: 'hud-cell' },
      el('div', null,
        el('div', { class: 'hud-label' }, 'Lives'),
        el('div', { class: 'hud-val' },
          el('div', { class: 'lives', id: 'lives' },
            ...Array.from({ length: LIVES }, (_, i) =>
              el('span', { class: 'life' + (i >= lives ? ' gone' : '') }, '♥')
            )
          )
        )
      )
    );
    return cell;
  }

  function bitButtons() {
    const out = [];
    // MSB on the left → visible index i maps to bit BITS-1-i
    for (let i = 0; i < BITS; i++) {
      const bitIdx = BITS - 1 - i;
      const place = Math.pow(2, bitIdx);
      const on = bits[bitIdx] === 1;
      out.push(
        el('button', {
          class: 'bit' + (on ? ' on' : ''),
          'data-idx': String(bitIdx),
          onclick: () => toggleBit(bitIdx),
        },
          el('span', { class: 'v' }, on ? '1' : '0'),
          el('span', { class: 'p' }, String(place))
        )
      );
    }
    return out;
  }

  function toggleBit(idx) {
    if (locked) return;
    bits[idx] = bits[idx] ? 0 : 1;
    // Update only the toggled bit's button — cheaper than re-rendering.
    const btn = root.querySelector(`.bit[data-idx="${idx}"]`);
    if (btn) {
      const on = bits[idx] === 1;
      btn.classList.toggle('on', on);
      btn.querySelector('.v').textContent = on ? '1' : '0';
    }
  }

  // ---------- next question ----------
  function nextQuestion() {
    locked = false;
    target = Math.floor(Math.random() * (MAX + 1));
    bits = new Array(BITS).fill(0);
    renderPlay();
    $('#submit').disabled = false;
  }

  // ---------- submit / check ----------
  function checkAnswer() {
    const got = bits.slice().reverse().join('');
    const want = target.toString(2).padStart(BITS, '0');
    return got === want;
  }

  function showBitsResult() {
    const wantBits = target.toString(2).padStart(BITS, '0').split('').map(Number);
    root.querySelectorAll('.bit').forEach(b => {
      const idx = parseInt(b.dataset.idx, 10);
      const got = bits[idx];
      const want = wantBits[BITS - 1 - idx];
      b.classList.remove('on');
      b.classList.add(got === want ? 'right' : 'wrong');
    });
  }

  function flash(el_, kind) {
    el_.classList.remove('flash-up', 'flash-down');
    void el_.offsetWidth;
    el_.classList.add(kind === 'up' ? 'flash-up' : 'flash-down');
  }

  function submit() {
    if (locked) return;
    if (!checkAnswer()) {
      locked = true;
      wrong += 1;
      streak = 0;
      lives -= 1;
      const fb = $('#fb');
      fb.className = 'feedback bad';
      fb.textContent = 'Not quite — ' + target + ' = ' + target.toString(2).padStart(BITS, '0');
      flash($('#scoreVal'), 'down');
      showBitsResult();
      $('#submit').disabled = true;
      // update lives display
      const ls = $('#lives').children;
      if (ls[lives]) ls[lives].classList.add('gone');
      if (lives <= 0) {
        setTimeout(endGame, 1200);
        return;
      }
      setTimeout(nextQuestion, 1100);
      return;
    }
    locked = true;
    correct += 1;
    streak += 1;
    bestStreak = Math.max(bestStreak, streak);
    const mult = Math.min(3, 1 + Math.floor(streak / 3) * 0.5);
    score += Math.round(10 * mult);
    const fb = $('#fb');
    fb.className = 'feedback ok';
    fb.textContent = 'Correct · ' + streak + ' in a row' + (mult > 1 ? ' · ×' + mult.toFixed(1) : '');
    flash($('#scoreVal'), 'up');
    $('#scoreVal').textContent = String(score);
    $('#streakVal').textContent = String(streak);
    showBitsResult();
    $('#submit').disabled = true;
    // Activity-lesson postMessage — first correct answer marks the
    // lesson complete when the game is hosted as an iframe inside
    // lesson.html. BlockId is overridable via window.__recallBlockId
    // (lesson.html sets that to the lesson id).
    if (!window._posted) {
      window._posted = true;
      try {
        parent.postMessage({
          type: 'recall-block-complete',
          blockId: (typeof window.__recallBlockId === 'string' && window.__recallBlockId) || 'binary-game',
          score: 1, total: 1,
        }, '*');
      } catch (_) {}
    }
    setTimeout(nextQuestion, 700);
  }

  function skip() {
    if (locked) return;
    locked = true;
    streak = 0;
    const fb = $('#fb');
    fb.className = 'feedback';
    fb.textContent = 'Skipped — ' + target + ' = ' + target.toString(2).padStart(BITS, '0');
    showBitsResult();
    $('#submit').disabled = true;
    setTimeout(nextQuestion, 1000);
  }

  // ---------- timer ----------
  function startTimer() {
    endsAt = performance.now() + TIME * 1000;
    const tick = () => {
      const left = Math.max(0, (endsAt - performance.now()) / 1000);
      timeLeft = left;
      const fill = $('#timerFill');
      if (!fill) return; // screen changed
      const pct = (left / TIME) * 100;
      fill.style.width = pct + '%';
      fill.classList.toggle('low', pct < 35 && pct >= 15);
      fill.classList.toggle('critical', pct < 15);
      if (left <= 0) { endGame(); return; }
      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }
  function stopTimer() { if (rafId) cancelAnimationFrame(rafId); rafId = null; }

  // ---------- end ----------
  function endGame() {
    stopTimer();
    const isNew = score > best.score;
    if (isNew) { best.score = score; best.streak = bestStreak; saveBest(); }
    root.innerHTML = '';
    const wrap = el('div', { class: 'card end' },
      el('h1', null, timeLeft <= 0 ? "Time's up" : 'Out of lives'),
      el('p', null, isNew ? 'New best.' : 'Best: ' + best.score + ' · Try again?'),
      el('div', { class: 'final-score' }, String(score)),
      el('div', { class: 'final-sub' },
        el('span', null, 'Best streak ', el('b', null, String(bestStreak))),
        el('span', null, 'Correct ', el('b', null, String(correct))),
      ),
      el('div', { class: 'actions' },
        el('button', { class: 'btn', onclick: start }, 'Play again')
      )
    );
    root.appendChild(wrap);
  }

  // ---------- start ----------
  function start() {
    score = 0; streak = 0; bestStreak = 0;
    lives = LIVES; correct = 0; wrong = 0;
    locked = false; timeLeft = TIME;
    stopTimer();
    nextQuestion();
    startTimer();
  }
  start();

  // Keyboard: Enter submits, Esc skips.
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
    else if (e.key === 'Escape') { e.preventDefault(); skip(); }
  });
})();
</script>
</body>
</html>
