<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Binary — Recall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:    #0D1117;
      --bg-2:  #161B22;
      --line:  #21262D;
      --line-2:#30363D;
      --text:  #F0F6FC;
      --text-2:#C9D1D9;
      --text-3:#8B949E;
      --text-4:#6E7681;
      --blue:  #58A6FF;
      --blue-dim:  rgba(88,166,255,0.15);
      --green: #3FB950;
      --green-dim: rgba(63,185,80,0.12);
      --red:   #F85149;
      --red-dim:   rgba(248,81,73,0.12);
      --yellow:    #D29922;
      --yellow-dim:rgba(210,153,34,0.12);
      --purple:    #A371F7;
      --r: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }
    .stage { width: 100%; max-width: 720px; }

    /* ---------- Effects vocabulary (shared across the Recall stack) ---------- */
    @keyframes fxPop       { 0%{transform:scale(1)} 45%{transform:scale(1.18)} 100%{transform:scale(1)} }
    @keyframes fxShake     { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(3px)} 30%,50%,70%{transform:translateX(-5px)} 40%,60%{transform:translateX(5px)} }
    @keyframes fxGlow      { 0%{box-shadow:0 0 0 0 rgba(63,185,80,.55)} 100%{box-shadow:0 0 0 18px rgba(63,185,80,0)} }
    @keyframes fxFadeUp    { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes fxScoreRoll { 0%{transform:translateY(-6px);opacity:.3} 100%{transform:translateY(0);opacity:1} }
    @keyframes fxConfetti  { 0%{transform:translate(0,0) rotate(0); opacity:1} 100%{transform:translate(var(--tx,40px),140px) rotate(540deg); opacity:0} }
    .fx-pop        { animation: fxPop .35s cubic-bezier(.34,1.56,.64,1); }
    .fx-shake      { animation: fxShake .45s; }
    .fx-glow       { animation: fxGlow .8s ease-out; }
    .fx-fade-up    { animation: fxFadeUp .35s ease-out both; }
    .fx-score-roll { animation: fxScoreRoll .35s ease-out; }

    /* Confetti pieces are absolutely positioned inside a relative host.
       They animate via the keyframe and self-remove on animationend. */
    .confetti-host { position: relative; overflow: visible; }
    .confetti-piece {
      position: absolute; width: 8px; height: 12px;
      border-radius: 2px;
      top: 0; left: 50%;
      pointer-events: none;
      animation: fxConfetti .9s cubic-bezier(.2,.7,.4,1) forwards;
      will-change: transform, opacity;
    }

    /* ---------- HUD ---------- */
    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .hud-cell {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 8px 10px;
    }
    .hud-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-4); font-weight: 700;
    }
    .hud-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 700;
      line-height: 1; margin-top: 3px;
      display: inline-block;
    }
    .hud-val.flash-up    { color: var(--green); }
    .hud-val.flash-down  { color: var(--red); }
    .hud-val.flash-x     { color: var(--yellow); }
    .lives { display: flex; gap: 4px; font-size: 15px; margin-top: 3px; }
    .life { color: var(--red); transition: color 0.2s, transform 0.2s; }
    .life.gone { color: var(--text-4); }
    .life.lost { animation: fxShake .4s; }

    /* ---------- Card (start / end) ---------- */
    .card {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 28px 24px;
      position: relative;
    }

    /* ---------- 3D play card ---------- */
    .play-card {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 12px;
      position: relative;
    }
    .play-card .play-hint {
      position: absolute; top: 12px; right: 16px;
      font-size: 11px; color: var(--text-4);
      font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
      z-index: 2;
    }
    .scene-host {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--bg);
      border-radius: calc(var(--r) - 2px);
      overflow: hidden;
    }
    .scene-host canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .scene-error {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      padding: 24px; text-align: center;
      color: var(--red); font-size: 13px;
    }
    .scene-error .sub { color: var(--text-3); font-size: 12px; margin-top: 6px; }

    /* ---------- Feedback ---------- */
    .feedback {
      margin-top: 8px; min-height: 20px;
      text-align: center;
      font-size: 13px; color: var(--text-3);
    }
    .feedback .combo {
      display: inline-block; margin-left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: var(--yellow);
      background: var(--yellow-dim);
      padding: 3px 10px; border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .feedback.ok  { color: var(--green); }
    .feedback.bad { color: var(--red); }

    /* ---------- Timer bar ---------- */
    .timer {
      height: 4px; background: var(--bg-2);
      border-radius: 999px; overflow: hidden;
      margin-top: 10px;
    }
    .timer-fill {
      height: 100%; background: var(--blue);
      width: 100%;
      transition: width 0.1s linear, background 0.2s;
    }
    .timer-fill.low      { background: var(--yellow); }
    .timer-fill.critical { background: var(--red); }
    .timer-fill.ended    { background: var(--text-4); }

    /* ---------- Start / end screens ---------- */
    .menu, .end { text-align: center; }
    .menu h1, .end h1 {
      font-size: 30px; font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }
    .menu p, .end p { color: var(--text-3); margin: 0 0 22px; }
    .menu h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-3); font-weight: 700; margin: 22px 0 10px;
    }
    .menu-diffs {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 22px;
    }
    .menu-diff {
      background: var(--bg); border: 1px solid var(--line-2);
      border-radius: var(--r);
      padding: 12px 12px;
      cursor: pointer; text-align: left;
      color: var(--text); font-family: inherit;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
    }
    .menu-diff:hover { background: var(--bg-2); border-color: var(--blue); }
    .menu-diff:active { transform: scale(0.99); }
    .menu-diff.sel { background: var(--blue-dim); border-color: var(--blue); }
    .menu-diff .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .menu-diff .desc { font-size: 11.5px; color: var(--text-3); }
    .menu-diff .best {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--text-4);
      margin-top: 6px;
    }
    .menu-actions {
      display: flex; gap: 8px; justify-content: center; align-items: center;
    }
    .menu .mode-info {
      font-size: 12px; color: var(--text-4); margin: 8px 0 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .menu .how-to {
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      padding: 12px 14px;
      margin: 18px 0 6px;
      color: var(--text-2);
      font-size: 12.5px;
      line-height: 1.5;
    }
    .menu .how-to b { color: var(--text); }
    .menu .how-to .kbd {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--text);
    }

    .final-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 60px; font-weight: 800; color: var(--blue);
      line-height: 1; margin-bottom: 8px;
    }
    .final-sub {
      display: flex; justify-content: center; gap: 24px;
      color: var(--text-3); font-size: 13px;
      margin-bottom: 20px;
    }
    .final-sub b {
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }
    .new-record {
      display: inline-block; margin-left: 8px;
      font-size: 11px; font-weight: 700;
      color: var(--yellow);
      background: var(--yellow-dim);
      padding: 3px 10px; border-radius: 999px;
      letter-spacing: 0.04em; vertical-align: middle;
    }

    /* ---------- Buttons ---------- */
    .actions {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 8px;
    }
    button {
      font-family: inherit; cursor: pointer;
      border-radius: var(--r);
    }
    .btn {
      background: var(--blue); color: #fff;
      border: 1px solid var(--blue);
      padding: 9px 22px;
      font-size: 13px; font-weight: 600;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--text-3);
      border: 1px solid transparent;
      padding: 9px 14px;
      font-size: 13px; font-weight: 500;
    }
    .btn-ghost:hover { color: var(--text); background: var(--bg); }

    @media (max-width: 480px) {
      .card { padding: 22px 16px; }
      .play-card { padding: 8px; }
      .menu-diffs { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="stage" id="root"></div>

<script>
(function () {
  'use strict';

  // ---------- config ----------
  // Easy: 4 bits, no timer. Mirrors "your first introduction to binary".
  // Medium: 8 bits, 60s. The byte-sized 0-255 range.
  // Hard: 8 bits, 30s. Same range, half the time.
  const DIFFS = {
    easy:   { bitWidth: 4, timeLimit: 0  },
    medium: { bitWidth: 8, timeLimit: 60 },
    hard:   { bitWidth: 8, timeLimit: 30 },
  };
  const LIVES = 3;
  const STORE_KEY = 'recall.binaryGame.v2';
  const root = document.getElementById('root');

  // Color constants used for the 3D scene. Kept in sync with the CSS
  // :root tokens above so the screens match the rest of the app.
  const COLOR = {
    bg:     0x0D1117,
    bg2:    0x161B22,
    line:   0x21262D,
    line2:  0x30363D,
    text:   0xF0F6FC,
    text3:  0x8B949E,
    text4:  0x6E7681,
    blue:   0x58A6FF,
    green:  0x3FB950,
    red:    0xF85149,
    yellow: 0xD29922,
  };

  // ---------- state ----------
  const state = {
    diff: 'medium',
    bitWidth: 8,
    timeLimit: 60,
    timeLeft: 60,
    score: 0, streak: 0, bestStreak: 0, multiplier: 1.0,
    lives: LIVES, correct: 0, wrong: 0,
    target: 0,         // the denary value to convert
    buffer: [],        // bits dropped so far, in order (left = first)
    packages: [],      // 3D package refs (mesh + baseY + speed + bit)
    locked: false,     // input gate
    endsAt: 0,
    timerRaf: null,
    rafId: null,
    doorFlash: 0,
    railShake: 0,
    scene: null,       // THREE.Scene
    renderer: null,    // THREE.WebGLRenderer
    camera: null,      // THREE.PerspectiveCamera
    canvas: null,      // the <canvas> element
    raycaster: null,   // THREE.Raycaster
    pointer: null,     // THREE.Vector2 (normalized)
    beltTexture: null, // the scrolling stripes texture
    beltSpeed: 0.18,   // base scrolling speed in offset.x / s
    decimalScreen: { mesh: null, halo: null, texture: null, verdict: 'neutral', haloTarget: 0, haloOpacity: 0 },
    bitScreen: { mesh: null, texture: null, baseY: 0 },
    sendButton: { cap: null, stalk: null, labelTex: null, targetY: 0, down: false },
    door: { frame: null, light: null, interior: null, baseIntensity: 0.6 },
    rails: [],         // the two side rails (for shake)
  };

  // ---------- storage ----------
  // Per (mode, diff) best score. Key shape is the same as v1 plus a
  // version bump so old keys don't clash with the new shape.
  function loadBest() {
    try {
      const v = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
      return v && typeof v === 'object' ? v : {};
    } catch (_) { return {}; }
  }
  function saveBest(map) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(map)); } catch (_) {}
  }
  function bestKey() { return 'factory/' + state.diff; }
  function getBest() { return loadBest()[bestKey()] || null; }
  function setBest(score, streak) {
    const m = loadBest();
    m[bestKey()] = { score, streak, at: Date.now() };
    saveBest(m);
  }

  // ---------- DOM helpers ----------
  const $ = (s) => root.querySelector(s);
  const el = (tag, attrs = {}, ...children) => {
    const e = document.createElement(tag);
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'style') e.setAttribute('style', attrs[k]);
      else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    for (const c of children) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  };

  // ---------- fx helper (shared contract) ----------
  // Tiny effects vocabulary — see the matching CSS keyframes above.
  // Each function restarts the animation by toggling the class off
  // and forcing a reflow. fx.confetti() spawns a handful of
  // absolutely-positioned <span>s at the host element and lets the
  // keyframe carry them off; they self-remove on animationend.
  const fx = {
    pop(el_)     { el_ && (el_.classList.remove('fx-pop'),     void el_.offsetWidth, el_.classList.add('fx-pop')); },
    shake(el_)   { el_ && (el_.classList.remove('fx-shake'),   void el_.offsetWidth, el_.classList.add('fx-shake')); },
    glow(el_)    { el_ && (el_.classList.remove('fx-glow'),    void el_.offsetWidth, el_.classList.add('fx-glow')); },
    fadeUp(el_)  { el_ && (el_.classList.remove('fx-fade-up'), void el_.offsetWidth, el_.classList.add('fx-fade-up')); },
    scoreRoll(el_, newText) {
      if (!el_) return;
      el_.textContent = newText;
      el_.classList.remove('fx-score-roll');
      void el_.offsetWidth;
      el_.classList.add('fx-score-roll');
    },
    confetti(host, count = 14) {
      if (!host) return;
      if (!host.classList.contains('confetti-host')) host.classList.add('confetti-host');
      const colours = ['#58A6FF', '#3FB950', '#D29922', '#A371F7', '#F85149', '#56D4DD'];
      const w = host.offsetWidth || 100;
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        const x0 = Math.random() * w - w / 2;
        const tx = x0 + (Math.random() * 80 - 40);
        piece.style.left = `calc(50% + ${x0}px)`;
        piece.style.background = colours[i % colours.length];
        piece.style.setProperty('--tx', tx + 'px');
        piece.style.animationDelay = (Math.random() * 100) + 'ms';
        host.appendChild(piece);
        piece.addEventListener('animationend', () => piece.remove(), { once: true });
      }
    },
  };

  // ---------- sfx (WebAudio synth) ----------
  // Tiny procedural sound module — no samples, just oscillators. The
  // AudioContext is created lazily on the first call because most
  // browsers require a user gesture before allowing audio. Each
  // function is a short envelope on a sine/square pair; volumes are
  // kept conservative so a classroom full of these doesn't get
  // painful. If the audio context can't be created (or the user has
  // muted the tab), every call is a no-op.
  const sfx = (function () {
    let ctx = null;
    let master = null;
    function ensure() {
      if (ctx) return ctx;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        master = ctx.createGain();
        master.gain.value = 0.18;
        master.connect(ctx.destination);
      } catch (_) { ctx = null; }
      return ctx;
    }
    function blip(freq, dur, type, vol) {
      const c = ensure();
      if (!c) return;
      // Resume if the context was suspended (Chrome autoplay policy).
      if (c.state === 'suspended') c.resume().catch(() => {});
      const t = c.currentTime;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol != null ? vol : 0.7, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g);
      g.connect(master);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }
    function sweep(f1, f2, dur, type, vol) {
      const c = ensure();
      if (!c) return;
      if (c.state === 'suspended') c.resume().catch(() => {});
      const t = c.currentTime;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(f1, t);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, f2), t + dur);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol != null ? vol : 0.7, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g);
      g.connect(master);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }
    return {
      // A package drops onto the belt — a short soft thunk.
      drop()    { blip(440, 0.12, 'sine', 0.5); blip(180, 0.08, 'square', 0.18); },
      // The yellow cover swings up — a quick rising sweep.
      coverOpen()   { sweep(280, 720, 0.18, 'square', 0.45); },
      // The cover closes back down on the next question — a falling sweep.
      coverClose()  { sweep(540, 200, 0.16, 'square', 0.4); },
      // SEND fires — a punchy descending chirp with a click on top.
      send()    {
        sweep(880, 220, 0.22, 'square', 0.55);
        blip(120, 0.14, 'square', 0.4);
      },
      // Wrong answer — a low buzz.
      wrong()   { blip(160, 0.28, 'sawtooth', 0.4); blip(120, 0.28, 'sawtooth', 0.3); },
      // Correct answer — a short rising arpeggio (3 notes).
      correct() {
        blip(523, 0.10, 'sine', 0.55);
        setTimeout(() => blip(659, 0.10, 'sine', 0.55), 80);
        setTimeout(() => blip(784, 0.18, 'sine', 0.6), 160);
      },
    };
  })();

  // ---------- texture builders (CanvasTexture) ----------
  // Each builder returns a fresh THREE.CanvasTexture. We rebuild on
  // state change so the texture content always matches state.
  function makeFloorTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const g = c.getContext('2d');
    g.fillStyle = '#161B22';
    g.fillRect(0, 0, 512, 512);
    g.strokeStyle = '#21262D';
    g.lineWidth = 1;
    // Grid lines, 32px apart on a 512px texture = 16 cells per axis.
    // The 30m floor will repeat this texture 0.06x per metre.
    for (let i = 0; i <= 16; i++) {
      const p = i * 32;
      g.beginPath(); g.moveTo(p, 0); g.lineTo(p, 512); g.stroke();
      g.beginPath(); g.moveTo(0, p); g.lineTo(512, p); g.stroke();
    }
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }

  function makeBeltTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 64;
    const g = c.getContext('2d');
    g.fillStyle = '#1a1f27';
    g.fillRect(0, 0, 256, 64);
    g.fillStyle = '#2a313a';
    // 4 stripes across the 256px width.
    for (let i = 0; i < 4; i++) {
      g.fillRect(i * 64, 0, 32, 64);
    }
    // Edges of the belt
    g.fillStyle = '#0f1216';
    g.fillRect(0, 0, 256, 4);
    g.fillRect(0, 60, 256, 4);
    const t = new THREE.CanvasTexture(c);
    t.wrapS = THREE.RepeatWrapping;
    t.wrapT = THREE.ClampToEdgeWrapping;
    t.repeat.set(2, 1);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }

  function makePackageTexture(bit) {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const g = c.getContext('2d');
    // Background gradient: slightly darker corners, brighter centre.
    const base = bit === 1 ? '#3FB950' : '#F85149';
    const grd = g.createLinearGradient(0, 0, 0, 256);
    grd.addColorStop(0, shade(base, 1.18));
    grd.addColorStop(1, shade(base, 0.78));
    g.fillStyle = grd;
    g.fillRect(0, 0, 256, 256);
    // Inset bezel.
    g.strokeStyle = shade(base, 0.55);
    g.lineWidth = 8;
    g.strokeRect(8, 8, 240, 240);
    // Big "0" or "1".
    g.fillStyle = '#ffffff';
    g.font = 'bold 180px JetBrains Mono, monospace';
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.fillText(String(bit), 128, 138);
    // Small "BIN" caption.
    g.fillStyle = 'rgba(255,255,255,0.65)';
    g.font = '500 18px JetBrains Mono, monospace';
    g.fillText('BIN', 128, 220);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }
  // Lightens/darkens a hex colour by a multiplier. Used by the package
  // texture for subtle gradients.
  function shade(hex, mult) {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if (!m) return hex;
    const r = clamp(Math.round(parseInt(m[1], 16) * mult), 0, 255);
    const g = clamp(Math.round(parseInt(m[2], 16) * mult), 0, 255);
    const b = clamp(Math.round(parseInt(m[3], 16) * mult), 0, 255);
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function makeScreenTexture(width, height, draw) {
    const c = document.createElement('canvas');
    c.width = width; c.height = height;
    draw(c.getContext('2d'), width, height);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
    return { canvas: c, ctx: c.getContext('2d'), texture: t };
  }

  // Halo sprite — a soft radial gradient used for the verdict glow
  // behind the decimal screen.
  function makeHaloTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const g = c.getContext('2d');
    const grd = g.createRadialGradient(128, 128, 0, 128, 128, 128);
    grd.addColorStop(0, 'rgba(255,255,255,0.55)');
    grd.addColorStop(0.5, 'rgba(255,255,255,0.18)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grd;
    g.fillRect(0, 0, 256, 256);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }

  function drawDecimalScreen(g, w, h, value, verdict) {
    // Border colour reflects the verdict.
    const colors = {
      neutral: '#30363D',
      correct: '#3FB950',
      wrong:   '#F85149',
    };
    const accent = colors[verdict] || colors.neutral;
    // Background
    g.fillStyle = '#161B22';
    g.fillRect(0, 0, w, h);
    // 4px accent border on the inside.
    g.strokeStyle = accent;
    g.lineWidth = 4;
    g.strokeRect(2, 2, w - 4, h - 4);
    // Subtle scanlines
    g.fillStyle = 'rgba(0,0,0,0.15)';
    for (let y = 0; y < h; y += 4) g.fillRect(0, y, w, 1);
    // Caption
    g.fillStyle = '#8B949E';
    g.font = '500 16px JetBrains Mono, monospace';
    g.textAlign = 'center';
    g.textBaseline = 'top';
    g.fillText('DECIMAL', w / 2, 14);
    // Big number
    g.fillStyle = '#F0F6FC';
    g.font = 'bold 96px JetBrains Mono, monospace';
    g.textBaseline = 'middle';
    g.fillText(String(value), w / 2, h / 2 + 10);
    // Small subscript (just the word "denary" so the player knows the unit).
    g.fillStyle = '#6E7681';
    g.font = '500 14px JetBrains Mono, monospace';
    g.textBaseline = 'bottom';
    g.fillText('denary', w / 2, h - 12);
  }

  function updateDecimalScreen(value, verdict) {
    const ds = state.decimalScreen;
    if (!ds.ctx) return;
    drawDecimalScreen(ds.ctx, ds.canvas.width, ds.canvas.height, value, verdict);
    ds.texture.needsUpdate = true;
    ds.verdict = verdict;
    // Halo colour + opacity ramp.
    const haloColors = {
      neutral: 0xffffff,
      correct: COLOR.green,
      wrong:   COLOR.red,
    };
    ds.halo.material.color.setHex(haloColors[verdict] || 0xffffff);
    ds.haloTarget = verdict === 'neutral' ? 0 : 0.55;
  }

  function drawBitScreen(g, w, h, buffer, lastVerdict, reveal) {
    // 8 cells in a row. On easy, the leftmost 4 are used and the rest are dim.
    const cells = state.bitWidth;
    const padX = 12;
    const topY = 32;
    const cellW = (w - padX * 2) / state.bitWidth;
    const cellH = h - topY - 28;
    g.fillStyle = '#161B22';
    g.fillRect(0, 0, w, h);
    // Border
    g.strokeStyle = '#30363D';
    g.lineWidth = 3;
    g.strokeRect(1, 1, w - 2, h - 2);
    // Header
    g.fillStyle = '#8B949E';
    g.font = '500 16px JetBrains Mono, monospace';
    g.textAlign = 'left';
    g.textBaseline = 'top';
    g.fillText('BITS', 14, 10);
    g.fillStyle = '#6E7681';
    g.font = '500 12px JetBrains Mono, monospace';
    g.textAlign = 'right';
    const want = state.target.toString(2).padStart(state.bitWidth, '0');
    if (reveal) g.fillText('answer: ' + want, w - 14, 12);

    for (let i = 0; i < state.bitWidth; i++) {
      const x = padX + i * cellW;
      const place = Math.pow(2, state.bitWidth - 1 - i);
      const bufferIdx = state.bitWidth - 1 - i; // MSB-first position
      const isUsed = i < cells; // always true for now (cells === bitWidth)
      const isSet = bufferIdx >= 0 && bufferIdx < buffer.length;
      const bit = isSet ? buffer[bufferIdx] : null;
      const isCurrent = !reveal && isSet === false && buffer.length === bufferIdx;
      let bg, border, textColor, valText, valColor;
      if (!isUsed) {
        bg = '#0D1117'; border = '#21262D'; valText = '·'; valColor = '#6E7681';
      } else if (reveal) {
        const wantBit = parseInt(want[bufferIdx >= 0 ? bufferIdx : 0], 10);
        const right = bit === wantBit;
        if (right) { bg = 'rgba(63,185,80,0.18)'; border = '#3FB950'; valColor = '#3FB950'; valText = isSet ? String(bit) : '·'; }
        else { bg = 'rgba(248,81,73,0.18)'; border = '#F85149'; valColor = '#F85149'; valText = isSet ? String(bit) : '·'; }
      } else if (isCurrent) {
        bg = 'rgba(88,166,255,0.18)'; border = '#58A6FF'; valColor = '#58A6FF'; valText = '_';
      } else if (isSet) {
        bg = bit === 1 ? 'rgba(63,185,80,0.10)' : 'rgba(248,81,73,0.10)';
        border = bit === 1 ? '#3FB950' : '#F85149';
        valColor = bit === 1 ? '#3FB950' : '#F85149';
        valText = String(bit);
      } else {
        bg = '#0D1117'; border = '#21262D'; valColor = '#6E7681'; valText = '·';
      }
      // Cell rectangle
      g.fillStyle = bg;
      g.fillRect(x + 2, topY, cellW - 4, cellH);
      g.strokeStyle = border;
      g.lineWidth = 2;
      g.strokeRect(x + 2, topY, cellW - 4, cellH);
      // Big bit value
      g.fillStyle = valColor;
      g.font = 'bold 56px JetBrains Mono, monospace';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText(valText, x + cellW / 2, topY + cellH / 2 - 6);
      // Place value label
      g.fillStyle = '#6E7681';
      g.font = '500 12px JetBrains Mono, monospace';
      g.textBaseline = 'bottom';
      g.fillText(String(place), x + cellW / 2, topY + cellH - 4);
    }
  }

  function updateBitScreen(reveal) {
    const bs = state.bitScreen;
    if (!bs.ctx) return;
    drawBitScreen(bs.ctx, bs.canvas.width, bs.canvas.height, state.buffer, null, !!reveal);
    bs.texture.needsUpdate = true;
  }

  function buildSendButton() {
    // Industrial emergency-stop style SEND button. Sits in the
    // front-right of the desk so it doesn't block the player's view
    // of the belt/pipe. The cap is wide and flat-topped (proper
    // mushroom profile, not a tall bulb). A yellow safety cover is
    // attached to the side of the base — it swings over to cover
    // the cap when the player needs to flip it up to arm the button.
    //
    // Construction (top to bottom):
    //   - mushroom cap (lathe profile, flat top + rounded edge)
    //   - LED indicator ring (emissive torus) — green when armed
    //   - short neck (cylinder) under the cap
    //   - base plate (wider cylinder) with 4 visible bolt heads
    //   - safety cover (yellow disc with handle) hinged to the side
    const c = state.console;
    // Position on the front-right of the desk, in front of the bit
    // screen. Pulled forward so it's well clear of the screens.
    const sx = c.halfWidth - 0.35;
    const sz = c.frontZ - 0.35;
    const baseY = c.topY + 0.02; // sitting on the desk top

    // Cap dimensions.
    const capRadius = 0.22;       // radius of the cap top
    const capRimH = 0.04;         // height of the cylindrical rim
    const capDomeH = 0.10;        // height of the rounded top

    // Cap label texture (SEND on the cap's flat top, viewed from above).
    const labelTex = makeScreenTexture(256, 128, (g, W, H) => {
      g.fillStyle = '#F85149';
      g.fillRect(0, 0, W, H);
      g.fillStyle = '#ffffff';
      g.font = 'bold 56px JetBrains Mono, monospace';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText('SEND', W / 2, H / 2 + 4);
    });
    // Cap face (the flat top) — a separate plane that sits on top of
    // the lathe. This is the part the player actually sees when looking
    // down at the button.
    const capFace = new THREE.Mesh(
      new THREE.CircleGeometry(capRadius - 0.005, 32),
      new THREE.MeshStandardMaterial({
        map: labelTex.texture, color: COLOR.red, roughness: 0.45, metalness: 0.15,
      })
    );
    capFace.rotation.x = -Math.PI / 2; // facing up
    capFace.position.set(sx, baseY + capRimH + capDomeH, sz);
    capFace.userData.kind = 'send';
    capFace.userData.baseY = baseY;
    state.scene.add(capFace);

    // Mushroom cap body — a lathe with a flat top, rounded edge, and
    // short rim. The cap face sits on top of this.
    const profile = [];
    // Start from the bottom edge of the cap rim.
    profile.push(new THREE.Vector2(capRadius + 0.005, 0));
    profile.push(new THREE.Vector2(capRadius + 0.005, capRimH));
    // Rounded top edge.
    const samples = 6;
    for (let i = 1; i <= samples; i++) {
      const t = i / samples;
      const angle = (t * Math.PI) / 2; // 0 to PI/2
      const r = (capRadius + 0.005) - (capRadius + 0.005 - capRadius) * Math.sin(angle);
      const y = capRimH + capDomeH * (1 - Math.cos(angle));
      profile.push(new THREE.Vector2(r, y));
    }
    // Close the top.
    profile.push(new THREE.Vector2(capRadius - 0.01, capRimH + capDomeH));
    const capGeo = new THREE.LatheGeometry(profile, 32);
    const cap = new THREE.Mesh(capGeo, new THREE.MeshStandardMaterial({
      color: COLOR.red, roughness: 0.4, metalness: 0.2,
    }));
    cap.position.set(sx, baseY, sz);
    cap.userData.kind = 'send';
    cap.userData.baseY = baseY;
    state.scene.add(cap);

    // LED indicator ring (emissive torus) around the cap base.
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0x0f1318, emissive: 0x2ea043, emissiveIntensity: 0.7, roughness: 0.4, metalness: 0.2,
    });
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(capRadius + 0.03, 0.02, 12, 48),
      ringMat
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.set(sx, baseY + 0.02, sz);
    state.scene.add(ring);
    state.sendButton.ring = ring;

    // Base plate (wider, low cylinder that grips the desk).
    const collarMat = new THREE.MeshStandardMaterial({ color: 0x1a1f27, roughness: 0.5, metalness: 0.5 });
    const basePlate = new THREE.Mesh(
      new THREE.CylinderGeometry(capRadius + 0.08, capRadius + 0.10, 0.05, 32),
      collarMat
    );
    basePlate.position.set(sx, baseY - 0.025, sz);
    state.scene.add(basePlate);

    // Bolt heads (4 little circles on the base plate) for detail.
    const boltMat = new THREE.MeshStandardMaterial({ color: 0x30363D, roughness: 0.4, metalness: 0.7 });
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
      const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.012, 8), boltMat);
      bolt.position.set(
        sx + Math.cos(angle) * (capRadius + 0.06),
        baseY - 0.005,
        sz + Math.sin(angle) * (capRadius + 0.06)
      );
      state.scene.add(bolt);
    }

    // Safety cover — a yellow disc with a "diagonal stripe" warning
    // pattern and a small handle. Hinged at the LEFT side (at the
    // base of the button, in -X direction). When closed, it lies over
    // the cap from the right side; when opened, it swings to the left.
    const coverRadius = capRadius + 0.08;
    const coverMat = new THREE.MeshStandardMaterial({
      color: 0xD29922, roughness: 0.45, metalness: 0.35, map: makeScreenTexture(256, 256, (g, W, H) => {
        g.fillStyle = '#D29922';
        g.fillRect(0, 0, W, H);
        g.save();
        g.translate(W / 2, H / 2);
        g.rotate(-Math.PI / 6);
        g.fillStyle = 'rgba(0,0,0,0.55)';
        for (let i = -3; i <= 3; i++) g.fillRect(-W, i * 40 - 4, W * 2, 14);
        g.restore();
        g.fillStyle = 'rgba(0,0,0,0.65)';
        g.font = 'bold 26px JetBrains Mono, monospace';
        g.textAlign = 'center';
        g.textBaseline = 'middle';
        g.fillText('FLIP UP', W / 2, H / 2 - 6);
        g.fillText('TO ARM', W / 2, H / 2 + 22);
      }).texture,
    });
    const coverGroup = new THREE.Group();
    const coverDisc = new THREE.Mesh(
      new THREE.CylinderGeometry(coverRadius, coverRadius, 0.04, 32),
      coverMat
    );
    coverGroup.add(coverDisc);
    // Handle on the OUTSIDE edge of the cover (right edge, so it's
    // easy to grab).
    const handle = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.05, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x1a1a22, roughness: 0.5, metalness: 0.4 })
    );
    handle.position.set(coverRadius - 0.04, 0.04, 0);
    coverGroup.add(handle);

    // Hinge: the group's origin is the pivot. Disc + handle sit to
    // the right of the pivot. The pivot is at the LEFT side of the
    // disc in world coords, just above the cap.
    coverGroup.position.set(sx - (coverRadius - 0.04), baseY + capRimH + capDomeH + 0.02, sz);
    coverDisc.position.set(coverRadius - 0.04, 0, 0);
    handle.position.set(coverRadius - 0.04 + (coverRadius - 0.04) - 0.05, 0.04, 0);

    coverGroup.userData.kind = 'sendCover';
    coverGroup.userData.basePos = coverGroup.position.clone();
    coverGroup.userData.baseRotY = 0;
    state.scene.add(coverGroup);

    // Bookkeeping for the animation system.
    state.sendButton.cap = cap;
    state.sendButton.capFace = capFace;
    state.sendButton.labelTex = labelTex;
    state.sendButton.targetY = cap.userData.baseY;
    state.sendButton.cover = coverGroup;
    state.sendButton.coverOpen = false;
    state.sendButton.coverMoving = false;
    state.sendButton.coverTarget = 0;
  }

  // ---------- scene init ----------
  function initScene(host) {
    const w = host.clientWidth || 600;
    const h = host.clientHeight || 450;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(w, h, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.setClearColor(COLOR.bg, 1);
    host.appendChild(renderer.domElement);
    state.canvas = renderer.domElement;
    state.renderer = renderer;

    state.scene = new THREE.Scene();
    state.scene.background = new THREE.Color(COLOR.bg);
    // Push the fog farther so the foreground desk isn't lost.
    state.scene.fog = new THREE.Fog(COLOR.bg, 12, 28);

    const aspect = w / h;
    // "Over the shoulder" angled view. The camera sits up high and
    // back, looking down-and-forward at the factory floor. The belt
    // runs left-to-right across the lower-middle of the frame, with
    // the drop pipe on the right, the door on the left, the control
    // console (with its two screens) below in the foreground, and the
    // SEND button on the right side of the desk.
    //
    // Camera position: behind the player (~5.5m forward from world 0,
    // elevated to a "standing person" eye line ~2.6m up, and pulled
    // back a touch so the FOV covers belt + pipe + door + desk).
    state.camera = new THREE.PerspectiveCamera(65, aspect, 0.1, 100);
    state.camera.position.set(0.0, 4.0, 9.0);
    state.camera.lookAt(-1.0, 0.5, 0);

    state.raycaster = new THREE.Raycaster();
    state.pointer = new THREE.Vector2();

    buildLights();
    buildFloor();
    buildBelt();
    buildDoor();
    buildDropPipe();
    buildControlConsole();
    buildDecimalScreen();
    buildBitScreen();
    buildSendButton();

    // Pointer wiring for raycast.
    state.canvas.addEventListener('pointerdown', onPointerDown);
    state.canvas.addEventListener('pointerup', onPointerUp);
    state.canvas.addEventListener('pointermove', onPointerMove);

    // Resize.
    window.addEventListener('resize', onResize);

    // First render so the scene is visible immediately.
    renderer.render(state.scene, state.camera);
  }

  function onResize() {
    if (!state.renderer || !state.camera) return;
    const host = state.canvas.parentElement;
    const w = host.clientWidth;
    const h = host.clientHeight;
    if (w === 0 || h === 0) return;
    state.renderer.setSize(w, h, false);
    state.camera.aspect = w / h;
    state.camera.updateProjectionMatrix();
  }

  // ---------- raycast / input ----------
  // The raycaster targets the bit-screen plane (any click acts as a 0/1
  // keypress for the next empty slot) and the send-button cap. The
  // door, decimal screen, and other meshes are non-interactive.
  function setPointerFromEvent(e) {
    const rect = state.canvas.getBoundingClientRect();
    state.pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    state.pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  }

  function pickInteractives() {
    if (!state.raycaster) return [];
    state.raycaster.setFromCamera(state.pointer, state.camera);
    // Check the bit-screen plane, the send cap (lathe + face), and
    // the send cover. The cover sits over the cap so its hits come
    // first; we only enable the cap for hits when the cover is open.
    const targets = [];
    if (state.bitScreen.mesh) targets.push(state.bitScreen.mesh);
    if (state.sendButton.cover && !state.sendButton.coverOpen) targets.push(state.sendButton.cover);
    if (state.sendButton.cap && state.sendButton.coverOpen) targets.push(state.sendButton.cap);
    if (state.sendButton.capFace && state.sendButton.coverOpen) targets.push(state.sendButton.capFace);
    return state.raycaster.intersectObjects(targets, true);
  }

  function onPointerDown(e) {
    if (e.button !== undefined && e.button !== 0) return;
    if (!state.scene) return;
    setPointerFromEvent(e);
    const hits = pickInteractives();
    if (!hits.length) return;
    const hit = hits[0].object;
    // Climb up to the cover group if the hit was a child of the cover.
    const coverGroup = state.sendButton.cover;
    const isCoverHit = coverGroup && (hit === coverGroup || (hit.parent && hit.parent === coverGroup));
    if (isCoverHit) {
      // First-stage press: flip the cover up. No submission yet.
      if (!state.locked) openCover();
    } else if (hit === state.sendButton.cap || hit === state.sendButton.capFace) {
      // Second-stage press: the cap is exposed. Lower the cap visually
      // and call submit() (which is a no-op if the cover isn't open).
      if (!state.locked) {
        state.sendButton.down = true;
        state.sendButton.targetY = state.sendButton.cap.userData.baseY - 0.04;
      }
    } else if (hit === state.bitScreen.mesh && !state.locked) {
      // Click on the bit screen acts as a 0/1 keypress. We always drop
      // a '1' for the first click in a slot, and the keyboard user
      // decides between 0 and 1 with the actual keys. Clicking an
      // already-set cell flips it (0→1 or 1→0) and recolours the
      // package that's on the belt.
      const uv = hits[0].uv;
      // The bit screen has 8 (or 4) cells. UV x is 0 on the left (MSB)
      // and 1 on the right (LSB). Map the hit position to a cell index
      // and then to an MSB-first buffer position.
      const cellIdx = Math.min(state.bitWidth - 1, Math.max(0, Math.floor(uv.x * state.bitWidth)));
      const pos = state.bitWidth - 1 - cellIdx; // MSB-first
      if (pos === state.buffer.length) {
        dropBit(1);
      } else if (pos < state.buffer.length) {
        flipBitAt(pos);
      }
    }
  }

  function onPointerUp(e) {
    if (!state.sendButton.down) return;
    state.sendButton.down = false;
    state.sendButton.targetY = state.sendButton.cap.userData.baseY; // back to base
    // Submit on release so the press/release feels like a real button.
    // submit() itself is two-stage (opens the cover first, fires the
    // second time) but at this point we know the cap was hit, which
    // is only possible once the cover is already open.
    if (!state.locked) submit();
  }

  function onPointerMove(e) {
    // Used only for the cursor style: show 'pointer' over interactive meshes.
    if (!state.scene || state.locked) return;
    setPointerFromEvent(e);
    const hits = pickInteractives();
    state.canvas.style.cursor = hits.length ? 'pointer' : 'default';
  }

  // ---------- package spawn / animation ----------
  // Packages don't slide down the belt continuously — they appear at the
  // front of the belt (near the player) and stay there, lined up in a
  // row to display the binary number. When the player presses Send, the
  // packages accelerate and slide off toward the door.
  // Packages sit on the control desk's back row, lined up across the
  // belt-width span. The player watches them fill in left-to-right as
  // Packages drop from the pipe at the right end of the belt. They
  // line up along the belt (going LEFT from the pipe) so the player
  // sees the binary number from MSB (left) to LSB (right). Each
  // package is given a slot x position based on its buffer index.
  function packageSlotX(bufferIdx) {
    // Belt is 9m long, drop pipe at x=+2.5. Distribute slots across a
    // 2.6m span so an 8-bit row is comfortably visible side-on. The
    // rightmost slot sits just to the LEFT of the pipe (so the
    // package doesn't overlap with the pipe wall).
    const n = state.bitWidth;
    const span = 2.6;
    const stride = n > 1 ? span / (n - 1) : 0;
    return (2.5 - 0.45) - bufferIdx * stride;
  }
  function spawnPackage(bit) {
    const geo = new THREE.BoxGeometry(0.36, 0.36, 0.36);
    const mat = new THREE.MeshStandardMaterial({
      map: makePackageTexture(bit),
      color: bit === 1 ? COLOR.green : COLOR.red,
      roughness: 0.45,
      metalness: 0.15,
    });
    const m = new THREE.Mesh(geo, mat);
    // The package appears at the bottom of the drop pipe (pipeX) and
    // falls straight down, then settles into its slot. We start it
    // above the pipe so the player sees it "come out" of the drop.
    const slotX = packageSlotX(state.buffer.length);
    const landY = 0.05 + 0.18; // resting on the belt
    m.position.set(state.dropPipe.x, state.dropPipe.dropY, 0);
    m.userData = {
      bit, glowUntil: 0, glowColor: null,
      spawnAt: performance.now(),
      startY: state.dropPipe.dropY,
      startX: state.dropPipe.x,
      slotX,
    };
    state.scene.add(m);
    state.packages.push({ mesh: m, baseY: landY, speed: 0, sliding: false, slotX, slotZ: 0 });
    sfx.drop();
  }

  function flipBitAt(pos) {
    // Flip the buffer value at `pos` (MSB-first) AND recolour the
    // package that's on the belt.
    const newBit = state.buffer[pos] === 1 ? 0 : 1;
    state.buffer[pos] = newBit;
    // The corresponding package is in the packages array at the same
    // index (they spawn in lockstep).
    const pkg = state.packages[pos];
    if (pkg) {
      const oldMap = pkg.mesh.material.map;
      pkg.mesh.material.map = makePackageTexture(newBit);
      pkg.mesh.material.color.setHex(newBit === 1 ? COLOR.green : COLOR.red);
      if (oldMap) oldMap.dispose();
      pkg.mesh.userData.bit = newBit;
    }
    updateBitScreen(false);
    fx.pop($('.play-card'));
  }

  function glowWrongPackages() {
    const want = state.target.toString(2).padStart(state.bitWidth, '0');
    for (let i = 0; i < state.packages.length; i++) {
      const p = state.packages[i];
      const got = state.buffer[i];
      const wantBit = parseInt(want[i], 10);
      if (got !== wantBit) {
        p.mesh.userData.glowUntil = performance.now() + 800;
        p.mesh.userData.glowColor = new THREE.Color(COLOR.red);
      } else {
        p.mesh.userData.glowUntil = performance.now() + 500;
        p.mesh.userData.glowColor = new THREE.Color(COLOR.green);
      }
    }
  }

  function removeAllPackages() {
    for (const p of state.packages) {
      state.scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      if (p.mesh.material.map) p.mesh.material.map.dispose();
      p.mesh.material.dispose();
    }
    state.packages = [];
  }

  // ---------- start / end screens ----------
  function renderStart() {
    stopTimer();
    state.diff = state.diff || 'medium';
    root.innerHTML = '';
    // The hint paragraph under the title — explains the controls. The
    // "fill all N bits" line is rebuilt whenever the difficulty changes.
    const line1 = el('div', { class: 'how-to-line' });
    const line2 = el('div', { class: 'how-to-line', style: 'margin-top:6px;' });
    const line3 = el('div', { class: 'how-to-line', style: 'margin-top:6px;color:var(--text-3);' }, 'Click the bit screen to drop bits with the mouse instead.');
    function rebuildHowTo() {
      const n = DIFFS[state.diff].bitWidth;
      line1.innerHTML = '';
      line1.appendChild(document.createTextNode('Press '));
      line1.appendChild(el('span', { class: 'kbd' }, '0'));
      line1.appendChild(document.createTextNode(' to drop a '));
      line1.appendChild(el('b', null, '0 package'));
      line1.appendChild(document.createTextNode(' or '));
      line1.appendChild(el('span', { class: 'kbd' }, '1'));
      line1.appendChild(document.createTextNode(' to drop a '));
      line1.appendChild(el('b', null, '1 package'));
      line1.appendChild(document.createTextNode(' on the belt.'));
      line2.innerHTML = '';
      line2.appendChild(document.createTextNode('Fill all '));
      line2.appendChild(el('b', null, String(n) + ' bits'));
      line2.appendChild(document.createTextNode(' then press '));
      line2.appendChild(el('span', { class: 'kbd' }, 'Enter'));
      line2.appendChild(document.createTextNode(' (twice) or tap the '));
      line2.appendChild(el('b', null, 'SEND'));
      line2.appendChild(document.createTextNode(' button — once to flip the safety cover, again to ship the order.'));
    }
    rebuildHowTo();
    const card = el('div', { class: 'card menu' },
      el('h1', null, 'Factory Binary'),
      el('p', null, 'A denary number appears on the order screen. Build the binary answer on the belt.'),
      el('div', { class: 'how-to' }, line1, line2, line3),
      el('h2', null, 'Difficulty'),
      el('div', { class: 'menu-diffs', id: 'diffRow' },
        diffCard('easy',   'Easy',   '4 bits · no timer · 0–15'),
        diffCard('medium', 'Medium', '8 bits · 60s · 0–255'),
        diffCard('hard',   'Hard',   '8 bits · 30s · 0–255'),
      ),
      el('div', { class: 'menu-actions' },
        el('button', { class: 'btn', id: 'startBtn' }, 'Start')
      ),
      el('p', { class: 'mode-info' }, 'Denary → binary · pick a difficulty')
    );
    root.appendChild(card);
    refreshBestLabels();
    root.querySelectorAll('.menu-diff').forEach(b => {
      b.addEventListener('click', () => {
        state.diff = b.dataset.diff;
        root.querySelectorAll('.menu-diff').forEach(x => x.classList.toggle('sel', x === b));
        rebuildHowTo();
        fx.pop(b);
      });
    });
    // Default selection.
    const defaultDiff = root.querySelector('[data-diff="' + state.diff + '"]');
    if (defaultDiff) defaultDiff.classList.add('sel');
    $('#startBtn').addEventListener('click', start);
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); start(); }
    };
    document.addEventListener('keydown', onKey, { once: true });
  }

  function diffCard(diff, name, desc) {
    return el('button', { class: 'menu-diff', 'data-diff': diff },
      el('div', { class: 'name' }, name),
      el('div', { class: 'desc' }, desc),
      el('div', { class: 'best', 'data-best': diff }, 'best —')
    );
  }

  function refreshBestLabels() {
    const all = loadBest();
    document.querySelectorAll('[data-best]').forEach(el_ => {
      const diff = el_.dataset.best;
      const a = all[('factory/' + diff)] || null;
      const best = a ? a.score : 0;
      el_.textContent = 'best ' + (best || '—');
    });
  }

  // ---------- play screen ----------
  function renderPlay() {
    root.innerHTML = '';
    // Order on the page: canvas first, then timer, then HUD, then feedback.
    // The HUD lives just under the canvas so the player can see score and
    // lives without looking up.
    const hint = el('div', { class: 'play-hint' }, 'Press 0 / 1 — Enter twice: open cover, then send');
    const host = el('div', { class: 'scene-host', id: 'sceneHost' });
    const hud = el('div', { class: 'hud' },
      hudCell('Score', String(state.score), 'scoreVal'),
      hudCell('Streak', String(state.streak) + (state.multiplier > 1 ? ' ×' + state.multiplier.toFixed(1) : ''), 'streakVal'),
      hudLives(),
    );
    const timer = el('div', { class: 'timer' },
      el('div', { class: 'timer-fill', id: 'timerFill' })
    );
    const card = el('div', { class: 'play-card' },
      hint,
      host,
      timer,
      hud,
      el('div', { class: 'feedback', id: 'fb' }),
    );
    root.appendChild(card);

    // If Three.js failed to load (CDN blocked), show an inline error
    // and bail out of the scene init.
    if (typeof THREE === 'undefined') {
      host.appendChild(el('div', { class: 'scene-error' },
        el('div', null, 'Could not load the 3D scene.'),
        el('div', { class: 'sub' }, 'Three.js failed to load from the CDN. Please refresh the page.'),
      ));
      state.locked = true;
      return;
    }

    try {
      initScene(host);
    } catch (err) {
      host.appendChild(el('div', { class: 'scene-error' },
        el('div', null, 'Could not start the 3D scene.'),
        el('div', { class: 'sub' }, String(err && err.message || err)),
      ));
      state.locked = true;
      return;
    }

    fx.fadeUp(card);
    setTimeout(() => fx.fadeUp($('.hud')), 80);

    // Pick a question and start the RAF loop.
    state.target = pickTarget();
    state.buffer = [];
    state.locked = false;
    updateDecimalScreen(state.target, 'neutral');
    updateBitScreen(false);
    // Make sure the cover is closed at the start of every game.
    closeCover();
    startLoop();
  }

  function hudCell(label, val, id) {
    return el('div', { class: 'hud-cell' },
      el('div', { class: 'hud-label' }, label),
      el('div', { class: 'hud-val', id }, val)
    );
  }
  function hudLives() {
    return el('div', { class: 'hud-cell' },
      el('div', { class: 'hud-label' }, 'Lives'),
      el('div', { class: 'hud-val' },
        el('div', { class: 'lives', id: 'lives' },
          ...Array.from({ length: LIVES }, (_, i) =>
            el('span', { class: 'life' + (i >= state.lives ? ' gone' : '') }, '♥')
          )
        )
      )
    );
  }

  // ---------- RAF loop ----------
  let lastFrame = 0;
  function startLoop() {
    if (state.rafId) cancelAnimationFrame(state.rafId);
    lastFrame = performance.now();
    const tick = (now) => {
      const dt = Math.min(0.05, (now - lastFrame) / 1000);
      lastFrame = now;

      // Belt scroll
      if (state.beltTexture) {
        state.beltTexture.offset.x = (state.beltTexture.offset.x + dt * state.beltSpeed) % 1;
      }

      // Packages — either mid-fall from the drop pipe to their slot on
      // the belt, parked at their slot, or sliding off toward the door
      // once the player has sent the order.
      for (let i = state.packages.length - 1; i >= 0; i--) {
        const p = state.packages[i];
        const u = p.mesh.userData;
        if (p.sliding) {
          // Slide-off: accelerate toward the door (left, -X).
          p.speed = Math.min(8, p.speed + dt * 6);
          p.mesh.position.x -= dt * p.speed;
          p.mesh.position.y = 0.23;
        } else {
          // Fall: drop from the pipe (y = dropY) down to the belt
          // (y = baseY) over the first 350ms, while sliding from
          // pipeX to slotX. Then bob in place.
          const age = now - u.spawnAt;
          if (age < 350) {
            const t = age / 350;
            const eased = 1 - Math.pow(1 - t, 2);
            p.mesh.position.y = p.baseY + (u.startY - p.baseY) * (1 - eased);
            p.mesh.position.x = u.startX + (u.slotX - u.startX) * eased;
          } else {
            p.mesh.position.x = p.slotX;
            p.mesh.position.y = p.baseY + Math.sin(now * 0.003 + i) * 0.006;
          }
        }
        // Accent fade for verdict glow (wrong bits glow red, right ones
        // briefly glow green).
        if (u.glowUntil > now) {
          const t = (u.glowUntil - now) / 800; // 1 → 0
          p.mesh.material.emissive.copy(u.glowColor);
          p.mesh.material.emissiveIntensity = 0.6 * t;
        } else if (p.mesh.material.emissiveIntensity > 0) {
          p.mesh.material.emissiveIntensity = 0;
        }
        if (p.mesh.position.x < -6.0) {
          state.scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          if (p.mesh.material.map) p.mesh.material.map.dispose();
          p.mesh.material.dispose();
          state.packages.splice(i, 1);
        }
      }

      // Door flash
      if (state.door.light && state.doorFlash > 0) {
        state.doorFlash = Math.max(0, state.doorFlash - dt * 4);
        state.door.light.intensity = state.door.baseIntensity + state.doorFlash * 1.9;
      }

      // Send button spring
      if (state.sendButton.cap) {
        const cur = state.sendButton.cap.position.y;
        const tgt = state.sendButton.targetY;
        const newY = (Math.abs(cur - tgt) > 0.0005)
          ? cur + (tgt - cur) * 0.18
          : tgt;
        state.sendButton.cap.position.y = newY;
        // The cap face sits on top of the cap — move it with the cap.
        if (state.sendButton.capFace) {
          const capDomeTopY = state.sendButton.cap.userData.baseY + 0.14; // rim+dome
          const offset = newY - state.sendButton.cap.userData.baseY;
          state.sendButton.capFace.position.y = capDomeTopY + offset;
        }
      }

      // LED ring pulse — the ring brightens when the cover is open
      // and dims when closed. A sin() pulse on top makes it feel
      // "armed" rather than statically lit.
      if (state.sendButton.ring) {
        const sb = state.sendButton;
        const armed = sb.coverOpen ? 1 : 0;
        const base = 0.4 + 0.5 * armed;
        const pulse = armed ? 0.25 * Math.sin(now * 0.008) : 0;
        sb.ring.material.emissiveIntensity = base + pulse;
        // Color: green when armed, dim red-ish when disarmed.
        const targetColor = armed ? 0x2ea043 : 0x6e7681;
        if (!sb._ringColor) sb._ringColor = new THREE.Color();
        sb._ringColor.setHex(targetColor);
        sb.ring.material.emissive.lerp(sb._ringColor, 0.15);
      }

      // Safety cover animation — lerp rotation.z toward coverTarget.
      // The cover is hinged on the LEFT side of the cap. When closed
      // (rotation.z = 0), the disc lies flat over the cap. When open,
      // it tilts up on its right edge so the cap is exposed.
      if (state.sendButton.cover && state.sendButton.coverMoving) {
        const cur = state.sendButton.cover.rotation.z;
        const tgt = state.sendButton.coverTarget;
        const next = cur + (tgt - cur) * 0.18;
        state.sendButton.cover.rotation.z = next;
        if (Math.abs(next - tgt) < 0.005) {
          state.sendButton.cover.rotation.z = tgt;
          state.sendButton.coverMoving = false;
        }
      }

      // Decimal screen halo opacity ramp
      if (state.decimalScreen.halo) {
        const cur = state.decimalScreen.halo.material.opacity;
        const tgt = state.decimalScreen.haloTarget;
        state.decimalScreen.halo.material.opacity = cur + (tgt - cur) * 0.12;
      }

      // Rail shake decay
      if (state.railShake > 0) {
        state.railShake = Math.max(0, state.railShake - dt);
        const k = state.railShake;
        for (let i = 0; i < state.rails.length; i++) {
          const r = state.rails[i];
          r.position.x = (i === 0 ? -0.85 : 0.85) + (Math.sin(performance.now() * 0.04 + i) * 0.04 * k);
        }
        if (state.railShake === 0) {
          for (let i = 0; i < state.rails.length; i++) {
            state.rails[i].position.x = (i === 0 ? -0.85 : 0.85);
          }
        }
      }

      // Timer
      if (state.timeLimit > 0) {
        state.timeLeft = Math.max(0, (state.endsAt - now) / 1000);
        const fill = $('#timerFill');
        if (fill) {
          const pct = (state.timeLeft / state.timeLimit) * 100;
          fill.style.width = pct + '%';
          fill.classList.toggle('low', pct < 35 && pct >= 15);
          fill.classList.toggle('critical', pct < 15);
        }
        if (state.timeLeft <= 0) { endGame(); return; }
      }

      if (state.renderer) state.renderer.render(state.scene, state.camera);
      state.rafId = requestAnimationFrame(tick);
    };
    state.rafId = requestAnimationFrame(tick);
  }

  function stopLoop() {
    if (state.rafId) cancelAnimationFrame(state.rafId);
    state.rafId = null;
  }

  // ---------- question lifecycle ----------
  function pickTarget() {
    const max = Math.pow(2, state.bitWidth) - 1;
    if (state.correct + state.wrong === 0) {
      // Skip 0 on first question so the first impression is meaningful.
      return 1 + Math.floor(Math.random() * max);
    }
    return Math.floor(Math.random() * (max + 1));
  }

  function dropBit(bit) {
    if (state.locked) return;
    if (bit !== 0 && bit !== 1) return;
    if (state.buffer.length >= state.bitWidth) {
      // Refuse — shake the rails briefly.
      state.railShake = 0.4;
      return;
    }
    state.buffer.push(bit);
    spawnPackage(bit);
    updateBitScreen(false);
  }

  function openCover() {
    // First-stage press: flip the safety cover to the side. The
    // player can now either click the cap (mouse) or press Enter
    // again (keyboard) to actually fire the order. Idempotent.
    const sb = state.sendButton;
    if (!sb.cover) return;
    if (sb.coverOpen && !sb.coverMoving) return;
    sb.coverOpen = true;
    // Negative Y rotation swings the disc to the left around the
    // left-side hinge.
    sb.coverTarget = Math.PI * 0.5; // tilts the right edge up over the hinge
    sb.coverMoving = true;
    sb.ledPulse = 1.0;
    sfx.coverOpen();
  }

  function closeCover() {
    // Called when a new question loads. Resets the cover so the player
    // has to flip it open again for the next SEND.
    const sb = state.sendButton;
    if (!sb.cover) return;
    sb.coverOpen = false;
    sb.coverTarget = 0;
    sb.coverMoving = true;
    sfx.coverClose();
  }

  function submit(opts) {
    // Two-stage press: the first time the player triggers SEND (mouse
    // or Enter), the safety cover flips up and we return without
    // shipping anything. The second time, the cover is already open
    // and we actually submit the order. This matches the "industrial
    // safety cover" feel.
    // `opts.skipCoverGuard` is used by the Escape-skip flow, which
    // wants to submit the order directly (the cover is irrelevant
    // when the player is giving up on a question).
    const skipGuard = !!(opts && opts.skipCoverGuard);
    if (!skipGuard) {
      if (state.buffer.length !== state.bitWidth) {
        // Buffer not full yet — don't even open the cover. Show a hint
        // by shaking the rails (matches the existing dropBit full-buffer
        // behaviour).
        state.railShake = 0.4;
        return;
      }
      if (!state.sendButton.coverOpen) {
        openCover();
        return;
      }
    }
    if (state.locked) return;
    state.locked = true;
    // Mark all packages as sliding so the per-frame loop accelerates
    // them toward the door. The verdict (green/red per bit) is set
    // in glowWrongPackages below.
    for (const p of state.packages) p.sliding = true;
    sfx.send();

    const want = state.target.toString(2).padStart(state.bitWidth, '0');
    const got = state.buffer.join('');
    const correct = (got === want);

    if (correct) {
      state.correct += 1;
      state.streak += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      state.multiplier = Math.min(3, 1 + Math.floor(state.streak / 3) * 0.5);
      const gain = Math.round(10 * state.multiplier);
      state.score += gain;
      sfx.correct();

      updateDecimalScreen(state.target, 'correct');
      updateBitScreen(true);
      state.doorFlash = 1.0;
      // Confetti at the bit screen position (screen-space).
      const bitMesh = state.bitScreen.mesh;
      if (bitMesh) {
        const v = new THREE.Vector3();
        bitMesh.getWorldPosition(v);
        v.project(state.camera);
        const rect = state.canvas.getBoundingClientRect();
        const cx = (v.x * 0.5 + 0.5) * rect.width;
        const cy = (-v.y * 0.5 + 0.5) * rect.height;
        const host = document.createElement('div');
        host.style.cssText = `position:absolute; left:${cx}px; top:${cy}px; width:1px; height:1px; pointer-events:none;`;
        state.canvas.parentElement.appendChild(host);
        fx.confetti(host, 18);
        setTimeout(() => host.remove(), 1500);
      }
      // Fire postMessage on first correct.
      if (!window._posted) {
        window._posted = true;
        try {
          parent.postMessage({
            type: 'recall-block-complete',
            blockId: (typeof window.__recallBlockId === 'string' && window.__recallBlockId) || 'binary-game',
            score: 1, total: 1,
          }, '*');
        } catch (_) {}
      }

      const sv = $('#scoreVal');
      if (sv) {
        sv.classList.remove('flash-up', 'flash-down');
        void sv.offsetWidth;
        sv.classList.add('flash-up');
        fx.scoreRoll(sv, String(state.score));
      }
      const streakEl = $('#streakVal');
      if (streakEl) fx.scoreRoll(streakEl, String(state.streak) + (state.multiplier > 1 ? ' ×' + state.multiplier.toFixed(1) : ''));

      const fb = $('#fb');
      if (fb) {
        fb.className = 'feedback ok';
        let detail = 'Correct · ' + want + (state.multiplier > 1 ? ' · +' + gain + ' pts' : '');
        if (state.multiplier >= 2) detail += '<span class="combo">×' + state.multiplier.toFixed(1) + '</span>';
        fb.innerHTML = detail;
        fx.fadeUp(fb);
      }
      updateHud();
      setTimeout(nextQuestion, 900);
    } else {
      state.wrong += 1;
      state.streak = 0;
      state.multiplier = 1.0;
      state.lives -= 1;
      sfx.wrong();

      updateDecimalScreen(state.target, 'wrong');
      updateBitScreen(true);
      glowWrongPackages();

      const fb = $('#fb');
      if (fb) {
        fb.className = 'feedback bad';
        fb.innerHTML = 'Not quite — ' + state.target + ' in binary is ' + want;
        fx.fadeUp(fb);
      }
      const sv = $('#scoreVal');
      if (sv) {
        sv.classList.remove('flash-up', 'flash-down');
        void sv.offsetWidth;
        sv.classList.add('flash-down');
      }
      // Shake the bit screen.
      if (state.bitScreen.mesh) {
        const baseY = state.bitScreen.baseY;
        const t0 = performance.now();
        const shake = () => {
          const t = (performance.now() - t0) / 450;
          if (t >= 1) { state.bitScreen.mesh.position.y = baseY; return; }
          state.bitScreen.mesh.position.y = baseY + Math.sin(t * 30) * 0.04 * (1 - t);
          requestAnimationFrame(shake);
        };
        shake();
      }
      loseLife();
      updateHud();
      if (state.lives <= 0) {
        setTimeout(endGame, 1200);
        return;
      }
      setTimeout(nextQuestion, 1300);
    }
  }

  function nextQuestion() {
    // Clear old packages, pick a new target, unlock.
    removeAllPackages();
    state.buffer = [];
    state.target = pickTarget();
    state.locked = false;
    // Reset the safety cover so the player has to flip it open again
    // for the next SEND.
    closeCover();
    updateDecimalScreen(state.target, 'neutral');
    updateBitScreen(false);
    // Reset the feedback line.
    const fb = $('#fb');
    if (fb) { fb.className = 'feedback'; fb.innerHTML = ''; }
    // Reset the bit screen position in case shake left it offset.
    if (state.bitScreen.mesh) state.bitScreen.mesh.position.y = state.bitScreen.baseY;
  }

  function loseLife() {
    const ls = $('#lives');
    if (!ls) return;
    const children = ls.children;
    if (children[state.lives]) {
      children[state.lives].classList.add('lost');
      setTimeout(() => {
        children[state.lives].classList.remove('lost');
        children[state.lives].classList.add('gone');
      }, 400);
    }
  }

  function updateHud() {
    const sv = $('#scoreVal'); if (sv) sv.textContent = String(state.score);
    const sk = $('#streakVal'); if (sk) sk.textContent = String(state.streak) + (state.multiplier > 1 ? ' ×' + state.multiplier.toFixed(1) : '');
  }

  // ---------- timer ----------
  function startTimer() {
    if (state.timerRaf) cancelAnimationFrame(state.timerRaf);
    if (!state.timeLimit) return;
    state.endsAt = performance.now() + state.timeLimit * 1000;
  }
  function stopTimer() {
    if (state.timerRaf) cancelAnimationFrame(state.timerRaf);
    state.timerRaf = null;
  }

  // ---------- end screen ----------
  function endGame() {
    stopLoop();
    stopTimer();
    const isNew = state.score > ((getBest() || {}).score || 0);
    if (isNew) setBest(state.score, state.bestStreak);
    // Tear down the scene to free WebGL resources.
    teardownScene();
    root.innerHTML = '';
    const card = el('div', { class: 'card end' },
      el('h1', null, state.timeLeft <= 0 && state.lives > 0 ? "Time's up" : 'Out of lives'),
      el('p', null, isNew ? 'New best for this difficulty.' : 'Best: ' + ((getBest() || {}).score || 0) + ' · Try again?'),
      el('div', { class: 'final-score', id: 'finalScore' }, String(state.score),
        isNew ? el('span', { class: 'new-record' }, 'New best') : null
      ),
      el('div', { class: 'final-sub' },
        el('span', null, 'Best streak ', el('b', null, String(state.bestStreak))),
        el('span', null, 'Correct ', el('b', null, String(state.correct))),
      ),
      el('div', { class: 'actions' },
        el('button', { class: 'btn', id: 'againBtn' }, 'Play again'),
        el('button', { class: 'btn-ghost', id: 'menuBtn' }, 'Menu')
      )
    );
    root.appendChild(card);
    fx.fadeUp(card);
    setTimeout(() => {
      const fs = $('#finalScore');
      if (fs) {
        fx.scoreRoll(fs, String(state.score));
        if (isNew) fx.confetti(fs, 22);
      }
    }, 120);
    $('#againBtn').addEventListener('click', start);
    $('#menuBtn').addEventListener('click', () => { teardownScene(); renderStart(); });
  }

  function teardownScene() {
    if (state.canvas) {
      state.canvas.removeEventListener('pointerdown', onPointerDown);
      state.canvas.removeEventListener('pointerup', onPointerUp);
      state.canvas.removeEventListener('pointermove', onPointerMove);
    }
    window.removeEventListener('resize', onResize);
    removeAllPackages();
    if (state.scene) {
      // Dispose textures, materials, geometries.
      state.scene.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) {
            for (const m of obj.material) {
              if (m.map) m.map.dispose();
              m.dispose();
            }
          } else {
            if (obj.material.map) obj.material.map.dispose();
            obj.material.dispose();
          }
        }
      });
    }
    if (state.renderer) {
      state.renderer.dispose();
      if (state.canvas && state.canvas.parentNode) {
        state.canvas.parentNode.removeChild(state.canvas);
      }
    }
    state.scene = state.renderer = state.camera = state.canvas = state.raycaster = null;
    state.beltTexture = null;
    state.decimalScreen = { mesh: null, halo: null, texture: null, verdict: 'neutral', haloTarget: 0, haloOpacity: 0 };
    state.bitScreen = { mesh: null, texture: null, baseY: 0 };
    state.sendButton = { cap: null, capFace: null, stalk: null, labelTex: null, targetY: 0, down: false };
    state.door = { frame: null, light: null, interior: null, baseIntensity: 0.6 };
    state.rails = [];
  }

  // ---------- start game ----------
  function start() {
    const d = DIFFS[state.diff] || DIFFS.medium;
    state.bitWidth = d.bitWidth;
    state.timeLimit = d.timeLimit;
    state.timeLeft = d.timeLimit;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.multiplier = 1.0;
    state.lives = LIVES;
    state.correct = 0;
    state.wrong = 0;
    state.locked = false;
    state.buffer = [];
    state.packages = [];
    window._posted = false;
    stopLoop();
    stopTimer();
    renderPlay();
    startTimer();
  }

  // ---------- boot ----------
  renderStart();

  // Keyboard: 0/1 drop bits, Enter sends, Esc skips. Only active during play.
  document.addEventListener('keydown', (e) => {
    // On the start screen we already attached a one-shot Enter → start.
    if (!state.scene) return;
    if (state.locked) return;
    if (e.key === '0' || e.key === '1') {
      e.preventDefault();
      dropBit(parseInt(e.key, 10));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      submit();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      // Skip is a soft "I give up on this one" — counts as wrong.
      if (state.buffer.length > 0) {
        // Fill remaining bits with 0 to make a valid number, then mark
        // the answer as wrong so the player loses a life. This is the
        // existing skip-flow: reveal the right answer, deduct a life.
        while (state.buffer.length < state.bitWidth) state.buffer.push(0);
        // Skip the cover guard — the player is giving up, so we
        // evaluate the answer immediately. Force the cover open too
        // so the visual state matches what would have happened.
        if (state.sendButton.cover) {
          state.sendButton.coverOpen = true;
          state.sendButton.coverTarget = Math.PI * 0.5;
          state.sendButton.coverMoving = true;
        }
        submit({ skipCoverGuard: true });
      } else {
        // No bits yet — just reveal the answer and lose a life.
        updateBitScreen(true);
        state.wrong += 1;
        state.streak = 0;
        state.multiplier = 1.0;
        state.lives -= 1;
        const fb = $('#fb');
        if (fb) {
          fb.className = 'feedback bad';
          fb.innerHTML = 'Skipped — ' + state.target + ' = ' + state.target.toString(2).padStart(state.bitWidth, '0');
          fx.fadeUp(fb);
        }
        loseLife();
        updateHud();
        if (state.lives <= 0) { setTimeout(endGame, 1100); return; }
        setTimeout(nextQuestion, 1100);
      }
    }
  });
})();
</script>
</body>
</html>
