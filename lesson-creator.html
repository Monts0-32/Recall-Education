  // bindInteractive.
  if (!window.LessonRender || !window.LessonRender.renderBlock) {
    console.error('lesson-render.js failed to load — renderBlock is unavailable.');
  }
  const { renderBlock, renderMarkdown: renderMarkdownShared, escapeHtml: escapeHtmlShared, attachInteractivity } = window.LessonRender || {};
  // The supabase-js client already sets the `apikey` header on every
  // request, but privacy-focused browsers and extensions (Brave Shields,
  // uBlock Origin in strict mode, some corporate firewalls) silently strip
  // headers that aren't in the CORS-safelisted list. Supabase's gateway
  // also accepts the apikey as a `?apikey=` URL parameter — we add it as
  // a fallback so users with Shields / ad-blockers can still sign up and
  // sign in. The anon key is public by design; embedding it in URLs is
  // no worse than embedding it in the bundled JS.
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    global: {
      fetch: (url, options = {}) => {
        try {
          const u = new URL(url, window.location.href);
          if (u.host.endsWith('.supabase.co') && !u.searchParams.has('apikey')) {
            u.searchParams.set('apikey', SUPABASE_ANON_KEY);
          }
          return fetch(u.toString(), options);
        } catch (_) {
          return fetch(url, options);
        }
      }
    }
  });

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const initials = (name) => {
    if (!name) return 'R';
    const p = name.trim().split(/\s+/);
    return ((p[0]?.[0] || '') + (p[1]?.[0] || '')).toUpperCase() || 'R';
  };

  // Lightweight Markdown for the block previews. Mirrors the
  // implementation in lesson-render.js (the student-facing player
  // loads that file). Kept inline here so the editor doesn't have to
  // fetch a second script for what is just a small preview helper.
  //   - Input is escaped first, so any user-supplied HTML renders as
  //     text rather than as DOM.
  //   - Supports: fenced code, h2/h3, lists (- and 1.), blockquote,
  //     **bold**, *italic*, `code`, [link](url).
  function renderMarkdown(md) {
    if (!md) return '';
    let s = escapeHtml(md);
    s = s.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c}</code></pre>`);
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    s = s.replace(/(^|\n)((?:- .+(?:\n|$))+)/g, (_, pre, list) => {
      const items = list.trim().split('\n').map(l => l.replace(/^- /, '')).map(l => `<li>${l}</li>`).join('');
      return pre + '<ul>' + items + '</ul>';
    });
    s = s.replace(/(^|\n)((?:\d+\. .+(?:\n|$))+)/g, (_, pre, list) => {
      const items = list.trim().split('\n').map(l => l.replace(/^\d+\. /, '')).map(l => `<li>${l}</li>`).join('');
      return pre + '<ol>' + items + '</ol>';
    });
    s = s.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
    s = s.replace(/\*([^*]+)\*/g, '<i>$1</i>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.split(/\n{2,}/).map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h\d|ul|ol|pre|blockquote|img|figure)/.test(p)) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    return s;
  }

  function toast(msg, kind = '') {
    const t = document.createElement('div');
    t.className = 'toast ' + kind;
    t.textContent = msg;
    $('toastWrap').appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }

  // ---------- app state ----------
  const state = {
    user: null,
    profile: null,
    role: null,
    canPublish: false,
    subjects: [],          // [{ id, name, exam_board, level, color_key, topics: [{ id, name, unit_id, lessons: [{ id, title, duration_min }] }] }]
    generalLessons: [],    // [{ id, title, duration_min, code, tags, status, ... }] — lessons with is_general=true, not in any subject
    boards: [],            // [{ id, name }] from exam_boards
    years: [],             // [{ id, label, sort_order }] from year_levels
    units: [],             // [{ id, subject_id, exam_board_id, year_id, name, description, sort_order }] from units
    boardMap: {},          // id -> exam_boards row, built when boards load
    yearMap: {},           // id -> year_levels row
    browsePath: {          // current position in the catalog card grid
      subject: null,       // { id, name, exam_board, level, color_key }
      board:   null,       // { id, name }
      year:    null,       // { id, label, sort_order }
      unit:    null,       // { id, name, description }
    },
    currentLesson: null,   // { id, title, duration_min, order_index, topic_id, blocks: [{...} | {__new:true}] }
    currentTopic: null,    // { id, name, subject_id, unit_id }
    currentSubject: null,  // { id, name }
    dirty: false,          // any unsaved change in the lesson (meta or blocks)
    metaDirty: false,      // subset: the title / duration / order row has unsaved changes
  };

  // ---------- boot ----------
  async function boot() {
    const { data, error } = await supabaseClient.auth.getUser();
    if (error || !data || !data.user) {
      renderGate('Sign-in required', 'Sign in to use the lesson creator.', 'signin');
      return;
    }
    state.user = data.user;
    const meta = state.user.user_metadata || {};

    // Role check: read from the JWT first (the normal path — the
    // auth hook stamps app_metadata.role on every token), and fall
    // back to the public.current_role() RPC if the claim is missing.
    // The RPC fallback exists because the auth hook has been observed
    // not to fire for some users on this Supabase project (Jul 2026);
    // reading from the DB is one extra round-trip but bulletproof.
    //
    // We still load the profile for the user's display name.
    let role = state.user.app_metadata?.role;
    if (!role) {
      try {
        const r = await supabaseClient.rpc('current_role');
        if (!r.error && r.data) role = r.data;
      } catch (_) { /* RPC not installed — fall through */ }
    }
    const allowedRoles = ['staff_author', 'staff_reviewer', 'admin'];
    if (!role || !allowedRoles.includes(role)) {
      renderGate(
        'Staff access only',
        'Your account is signed in, but it does not have staff permissions. Ask an admin to invite you from the admin console.',
        'noaccess',
        meta.full_name || state.user.email
      );
      return;
    }
    state.role = role;

    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('id, full_name, role')
      .eq('id', state.user.id)
      .maybeSingle();

    state.profile = profile;
    $('userName').textContent = (profile && profile.full_name) || state.user.email;
    $('signOutBtn').hidden = false;
    // Rank pill in the top nav.
    const ROLE_PILL = {
      staff_author:   { label: 'Author',   cls: 'author'   },
      staff_reviewer: { label: 'Reviewer', cls: 'reviewer' },
      admin:          { label: 'Admin',    cls: 'admin'    },
    };
    const r = ROLE_PILL[state.role];
    if (r) {
      $('rankPill').textContent = r.label;
      $('rankPill').classList.add(r.cls);
      $('rankPill').hidden = false;
    }

    // Reviewers and admins get a Publish toggle on the editor toolbar.
    // Authors see the lesson in draft state only.
    if (role === 'staff_reviewer' || role === 'admin') {
      state.canPublish = true;
    }

    await loadTree();

    // If the staff-dashboard search bar linked here with a pending
    // lesson id, open it. We stash the id in localStorage rather
    // than the URL so the back button doesn't accumulate search
    // queries in the history.
    const pendingId = localStorage.getItem('recall.openLesson');
    if (pendingId) {
      localStorage.removeItem('recall.openLesson');
      // Defer one tick so the catalog tree has been painted.
      setTimeout(() => { openLesson(pendingId); }, 50);
    }
  }

  function renderGate(title, msg, kind, name) {
    const main = $('main');
    main.innerHTML = `
      <div class="gate">
        <h1>${escapeHtml(title)}</h1>
        <p>${escapeHtml(msg).replace(/\n/g, '<br>')}</p>
        <p><a class="btn-link" href="index.html">← Back to home</a></p>
      </div>
    `;
    // Hide the sidebar and the top-nav brand so the gate fills the page.
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) sidebar.style.display = 'none';
    $('userName').textContent = name || '';
  }

  $('signOutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });

  // ---------- catalog (card grid) ----------
  // The left rail is a breadcrumb-driven card grid. Each level is a
  // .catalog-card on a single grid, with the breadcrumb above letting
  // the user jump back. The right side lesson editor is unchanged and
  // still works off state.currentLesson / state.currentTopic /
  // state.currentSubject — this just changes how staff *get to* a
  // topic.
  async function loadTree() {
    const [
      subjectsRes, topicsRes, lessonsRes,
      boardsRes, yearsRes, unitsRes,
    ] = await Promise.all([
      supabaseClient.from('subjects').select('*').order('sort_order').order('name'),
      supabaseClient.from('topics').select('*').order('order_index'),
      supabaseClient.from('lessons').select('*').order('order_index'),
      supabaseClient.from('exam_boards').select('*').order('name'),
      supabaseClient.from('year_levels').select('*').order('sort_order'),
      supabaseClient.from('units').select('*').order('sort_order').order('name'),
    ]);

    const subjects = subjectsRes.data || [];
    const topics   = topicsRes.data   || [];
    const lessons  = lessonsRes.data  || [];
    const boards   = boardsRes.data   || [];
    const years    = yearsRes.data    || [];
    const units    = unitsRes.data    || [];

    // nest topics under subjects, lessons under topics
    for (const t of topics)  t.lessons = [];
    for (const l of lessons) {
      if (l.is_general) continue; // general lessons live in their own list
      const t = topics.find(x => x.id === l.topic_id);
      if (t) t.lessons.push(l);
    }
    for (const s of subjects) s.topics = topics.filter(t => t.subject_id === s.id);
    // General lessons: kept separately so the left rail can render them
    // outside the subject → board → year → unit → topic hierarchy.
    state.generalLessons = lessons.filter(l => l.is_general);

    state.subjects = subjects;
    state.boards   = boards;
    state.years    = years;
    state.units    = units;
    state.boardMap = Object.fromEntries(boards.map(b => [b.id, b]));
    state.yearMap  = Object.fromEntries(years.map(y => [y.id, y]));

    renderCatalog();
  }

  // ---- breadcrumb / path helpers ----
  function goToSubject() {
    state.browsePath = { subject: null, board: null, year: null, unit: null };
    renderCatalog();
  }
  function goToBoard() {
    state.browsePath.year = null;
    state.browsePath.unit = null;
    renderCatalog();
  }
  function goToYear() {
    state.browsePath.unit = null;
    renderCatalog();
  }
  function goUp() {
    if (state.browsePath.unit) goToYear();
    else if (state.browsePath.year) goToBoard();
    else if (state.browsePath.board) goToSubject();
  }

  // Convert a subject → its first/only board for backfill. Most subjects
  // in the existing seed have exactly one (subject.exam_board matches one
  // row in exam_boards). If a subject ever has no matching board we skip
  // gracefully so the UI doesn't blow up.
  function boardForSubject(s) {
    return state.boards.find(b => b.name === s.exam_board) || null;
  }
  // Auto-pick a year for new units in a subject: GCSE → Year 10,
  // A-level → Year 12. If we don't know, fall back to whatever year
  // exists for that (subject, board) pair.
  function defaultYearFor(s) {
    if (s.level === 'gcse') {
      return state.years.find(y => y.label === 'Year 10')
          || state.years.find(y => y.label === 'GCSE')
          || state.years[0]
          || null;
    }
    if (s.level === 'a-level') {
      return state.years.find(y => y.label === 'Year 12')
          || state.years.find(y => y.label === 'A-level')
          || state.years[0]
          || null;
    }
    return state.years[0] || null;
  }

  // ---- render ----
  function renderCatalog() {
    renderBreadcrumb();
    const body = $('treeBody');
    const { subject, board, year, unit } = state.browsePath;

    const tree = !subject      ? renderSubjectLevel()
              : !board         ? renderBoardLevel(subject)
              : !year          ? renderYearLevel(subject, board)
              : !unit          ? renderUnitLevel(subject, board, year)
              :                   renderTopicLevel(subject, board, year, unit);

    // The General section lives outside the subject tree — it's pinned
    // at the top of the sidebar so staff can see at a glance that it
    // exists and find their loose lessons quickly. It's hidden while
    // a specific subject/topic is being edited to keep the eye on the
    // tree; the editor breadcrumb is still the canonical way back.
    const general = (!subject && !board && !year && !unit) ? renderGeneralSection() : '';
    body.innerHTML = general + tree;
  }

  // ---- General lessons (loose, not in any subject) ----
  function renderGeneralSection() {
    const lessons = state.generalLessons || [];
    const rows = lessons.length ? lessons.map(l => renderLessonRow(null, l, { general: true })).join('') :
      `<div style="color: var(--text-4); font-size: 12px; padding: 4px 8px;">No general lessons yet.</div>`;
    return `
      <div class="catalog-section" style="border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 8px;">
        <div class="catalog-section-head" style="display: flex; align-items: center; justify-content: space-between; padding: 6px 8px;">
          <div style="display: flex; align-items: center; gap: 6px; color: var(--text-2); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">
            <span>General</span>
            <span style="color: var(--text-4); font-weight: 400; text-transform: none;">${lessons.length}</span>
          </div>
          <button class="add-btn" onclick="openGeneralLessonModal()">+ Lesson</button>
        </div>
        <div class="catalog-section-body">${rows}</div>
      </div>
    `;
  }

  function renderBreadcrumb() {
    const { subject, board, year, unit } = state.browsePath;
    let html = '<a href="#" onclick="event.preventDefault(); goToSubject(); return false;">Catalogue</a>';
    if (subject) {
      html += '<span class="sep">/</span>';
      html += `<a href="#" onclick="event.preventDefault(); goToSubject(); return false;">${escapeHtml(subject.name)}</a>`;
    }
    if (board) {
      html += '<span class="sep">/</span>';
      html += `<a href="#" onclick="event.preventDefault(); goToBoard(); return false;">${escapeHtml(board.name)}</a>`;
    }
    if (year) {
      html += '<span class="sep">/</span>';
      html += `<a href="#" onclick="event.preventDefault(); goToYear(); return false;">${escapeHtml(year.label)}</a>`;
    }
    if (unit) {
      html += '<span class="sep">/</span>';
      html += `<span class="current">${escapeHtml(unit.name)}</span>`;
    }

    // Add-button on the right of the breadcrumb — context-aware.
    const isAdmin = state.role === 'admin';
    let addBtn = '';
    if (!subject) {
      // At the top level: "+ New subject" (always allowed; uses the
      // existing supabaseClient.from('subjects') insert)
      addBtn = '<button class="add-btn" onclick="openSubjectModal()">+ Subject</button>';
    } else if (!board) {
      // Subject level: only admin can add a new exam board. Staff
      // authors can still see existing boards for this subject; they
      // just can't create new ones.
      addBtn = `<button class="add-btn" ${isAdmin ? '' : 'disabled title="Only admins can add exam boards"'}
                       onclick="${isAdmin ? 'openAddBoardModal()' : 'return false'}">+ Board</button>`;
    } else if (!year) {
      addBtn = `<button class="add-btn" ${isAdmin ? '' : 'disabled title="Only admins can add year levels"'}
                       onclick="${isAdmin ? 'openAddYearModal()' : 'return false'}">+ Year</button>`;
    } else if (!unit) {
      // Year level: any staff role can add a unit.
      addBtn = '<button class="add-btn" onclick="openAddUnitModal()">+ Unit</button>';
    } else {
      // Unit level: any staff role can add a topic to this unit.
      addBtn = '<button class="add-btn" onclick="openTopicModalForCurrent()">+ Topic</button>';
    }

    $('catalogHead').innerHTML =
      `<div class="crumbs-inline">${html}</div>${addBtn}`;
  }

  // ---- Level 1: subjects ----
  function renderSubjectLevel() {
    if (!state.subjects.length) {
      return `
        <div class="catalog-empty">
          No subjects yet.<br>
          <button onclick="openSubjectModal()">+ Create the first one</button>
        </div>`;
    }
    const cards = state.subjects.map(s => {
      const board = boardForSubject(s);
      const yearCount = new Set(
        state.units
          .filter(u => u.subject_id === s.id && (!board || u.exam_board_id === board.id))
          .map(u => u.year_id)
      ).size;
      const unitCount = state.units.filter(u => u.subject_id === s.id).length;
      const meta = board
        ? `${escapeHtml(s.exam_board)} · ${unitCount} unit${unitCount === 1 ? '' : 's'}`
        : `${unitCount} unit${unitCount === 1 ? '' : 's'}`;
      return `
        <div class="catalog-card" onclick="enterSubject('${s.id}')">
          <button class="kebab" title="Rename" onclick="event.stopPropagation(); openSubjectModal('${s.id}')">✎</button>
          <div class="name">${escapeHtml(s.name)}</div>
          <div class="meta">${meta}</div>
        </div>`;
    }).join('');
    return `<div class="catalog-grid">${cards}</div>`;
  }

  // ---- Level 2: boards for a subject ----
  function renderBoardLevel(subject) {
    // Distinct exam boards that actually have at least one unit for
    // this subject.
    const boardsForSubj = state.boards.filter(b =>
      state.units.some(u => u.subject_id === subject.id && u.exam_board_id === b.id)
    );
    if (!boardsForSubj.length) {
      return `
        <div class="catalog-empty">
          No exam boards for ${escapeHtml(subject.name)} yet.<br>
          ${state.role === 'admin'
            ? '<button onclick="openAddBoardModal()">+ Add the first board</button>'
            : '<div style="margin-top:8px;font-size:11.5px;">Only admins can add exam boards.</div>'}
        </div>`;
    }
    const cards = boardsForSubj.map(b => {
      const unitCount = state.units.filter(u =>
        u.subject_id === subject.id && u.exam_board_id === b.id
      ).length;
      const yearCount = new Set(state.units
        .filter(u => u.subject_id === subject.id && u.exam_board_id === b.id)
        .map(u => u.year_id)).size;
      const isAdmin = state.role === 'admin';
      return `
        <div class="catalog-card" onclick="enterBoard('${b.id}')">
          <button class="kebab" title="Rename" onclick="event.stopPropagation(); openRenameBoardModal('${b.id}')">✎</button>
          ${isAdmin ? `<button class="kebab" title="Delete" style="right:28px;" onclick="event.stopPropagation(); confirmDeleteBoard('${b.id}')">🗑</button>` : ''}
          <div class="name">${escapeHtml(b.name)}</div>
          <div class="meta">${yearCount} year${yearCount === 1 ? '' : 's'} · ${unitCount} unit${unitCount === 1 ? '' : 's'}</div>
        </div>`;
    }).join('');
    return `<div class="catalog-grid">${cards}</div>`;
  }

  // ---- Level 3: years for (subject, board) ----
  function renderYearLevel(subject, board) {
    const yearsForPair = state.years.filter(y =>
      state.units.some(u =>
        u.subject_id === subject.id && u.exam_board_id === board.id && u.year_id === y.id
      )
    );
    if (!yearsForPair.length) {
      return `
        <div class="catalog-empty">
          No years for ${escapeHtml(subject.name)} / ${escapeHtml(board.name)} yet.
          <div style="margin-top:8px;font-size:11.5px;">Add a year (admin) or a unit in the GCSE / A-level year.</div>
        </div>`;
    }
    const cards = yearsForPair.map(y => {
      const unitCount = state.units.filter(u =>
        u.subject_id === subject.id && u.exam_board_id === board.id && u.year_id === y.id
      ).length;
      const isAdmin = state.role === 'admin';
      return `
        <div class="catalog-card" onclick="enterYear('${y.id}')">
          ${isAdmin ? `<button class="kebab" title="Rename" onclick="event.stopPropagation(); openRenameYearModal('${y.id}')">✎</button>
          <button class="kebab" title="Delete" style="right:28px;" onclick="event.stopPropagation(); confirmDeleteYear('${y.id}')">🗑</button>` : ''}
          <div class="name">${escapeHtml(y.label)}</div>
          <div class="meta">${unitCount} unit${unitCount === 1 ? '' : 's'}</div>
        </div>`;
    }).join('');
    return `<div class="catalog-grid">${cards}</div>`;
  }

  // ---- Level 4: units for (subject, board, year) ----
  function renderUnitLevel(subject, board, year) {
    const unitsForTriple = state.units.filter(u =>
      u.subject_id === subject.id && u.exam_board_id === board.id && u.year_id === year.id
    );
    if (!unitsForTriple.length) {
      return `
        <div class="catalog-empty">
          No units in ${escapeHtml(subject.name)} / ${escapeHtml(board.name)} / ${escapeHtml(year.label)} yet.<br>
          <button onclick="openAddUnitModal()">+ Add the first unit</button>
        </div>`;
    }
    const cards = unitsForTriple.map(u => {
      const topicCount = state.subjects
        .find(s => s.id === subject.id)
        .topics.filter(t => t.unit_id === u.id).length;
      const lessonCount = state.subjects
        .find(s => s.id === subject.id)
        .topics
        .filter(t => t.unit_id === u.id)
        .reduce((acc, t) => acc + (t.lessons || []).length, 0);
      return `
        <div class="catalog-card" onclick="enterUnit('${u.id}')">
          <button class="kebab" title="Rename" onclick="event.stopPropagation(); openRenameUnitModal('${u.id}')">✎</button>
          <button class="kebab" title="Delete" onclick="event.stopPropagation(); confirmDeleteUnit('${u.id}')" style="right:28px;">🗑</button>
          <div class="name">${escapeHtml(u.name)}</div>
          <div class="meta">${topicCount} topic${topicCount === 1 ? '' : 's'} · ${lessonCount} lesson${lessonCount === 1 ? '' : 's'}</div>
        </div>`;
    }).join('');
    return `<div class="catalog-grid">${cards}</div>`;
  }

  // ---- Level 5: topics + lessons inside a unit (right editor unchanged) ----
  function renderTopicLevel(subject, board, year, unit) {
    const topicsInUnit = state.subjects
      .find(s => s.id === subject.id)
      .topics.filter(t => t.unit_id === unit.id);

    const topicRows = topicsInUnit.map(t => {
      const isActive = state.currentTopic && state.currentTopic.id === t.id;
      return `
        <div class="topic-row ${isActive ? 'active' : ''}" onclick="enterTopic('${t.id}')">
          <span class="name">${escapeHtml(t.name)}</span>
          ${(t.lessons || []).length
            ? `<span style="color:var(--text-4); font-size:11px;">${t.lessons.length}</span>`
            : ''}
          <button class="row-btn" title="Rename" onclick="event.stopPropagation(); openTopicModal('${t.id}')">✎</button>
          <button class="row-btn" title="Delete" onclick="event.stopPropagation(); deleteTopic('${t.id}')">🗑</button>
        </div>
        ${(t.lessons || []).map(l => renderLessonRow(t, l)).join('')}
        <div class="add-row" style="padding-left:28px;">
          <button onclick="event.stopPropagation(); openLessonModal('${t.id}')">+ Lesson</button>
        </div>`;
    }).join('');

    return `
      <div class="catalog-topics">
        ${topicRows || '<div class="catalog-empty" style="padding:18px 14px;">No topics in this unit yet. Add the first one.</div>'}
        <div class="add-row">
          <button onclick="openTopicModalForCurrent()">+ Topic</button>
        </div>
      </div>`;
  }

  // renderLessonRow(topic, l, opts) — one row in the catalogue tree.
  // opts.general: this row is for a general (loose) lesson, not a
  //   topic lesson. Suppresses the kebab padding.
  // The code chip is shown for any lesson that has a code (which is
  // only published lessons — the publish_lesson RPC generates it).
  function renderLessonRow(topic, l, opts = {}) {
    const isActive = state.currentLesson && state.currentLesson.id === l.id;
    const codeChip = l.code
      ? `<span style="font-family: var(--font-mono); font-size: 10.5px; color: var(--text-4); margin-left: 4px;" title="Share code">${escapeHtml(l.code)}</span>`
      : '';
    const topicId = opts.general ? '' : topic.id;
    return `
      <div class="topic-row ${isActive ? 'active' : ''}"
           style="padding-left:${opts.general ? 8 : 28}px; font-size:12px; color:var(--text-3);"
           onclick="openLesson('${l.id}')">
        <span class="name">${escapeHtml(l.title)}</span>
        ${codeChip}
        <span style="color:var(--text-4); font-size:11px;">${l.duration_min ?? 20}m</span>
        <button class="row-btn" title="Rename" onclick="event.stopPropagation(); openLessonModal('${topicId}', '${l.id}')">✎</button>
        <button class="row-btn" title="Delete" onclick="event.stopPropagation(); deleteLesson('${l.id}')">🗑</button>
      </div>`;
  }

  // ---- navigation entrypoints (click a card) ----
  window.enterSubject = (id) => {
    const s = state.subjects.find(x => x.id === id);
    if (!s) return;
    state.browsePath = { subject: s, board: null, year: null, unit: null };
    state.currentSubject = s;
    renderCatalog();
  };
  window.enterBoard = (id) => {
    const b = state.boardMap[id];
    if (!b) return;
    state.browsePath.board = b;
    state.browsePath.year = null;
    state.browsePath.unit = null;
    renderCatalog();
  };
  window.enterYear = (id) => {
    const y = state.yearMap[id];
    if (!y) return;
    state.browsePath.year = y;
    state.browsePath.unit = null;
    renderCatalog();
  };
  window.enterUnit = (id) => {
    const u = state.units.find(x => x.id === id);
    if (!u) return;
    state.browsePath.unit = u;
    renderCatalog();
  };
  window.enterTopic = (id) => {
    const found = findTopic(id);
    if (!found) return;
    state.currentSubject = state.subjects.find(s => s.id === found.subject_id);
    state.currentTopic = found;
    // No lesson selected yet — show the topic empty-state so the
    // "+ New lesson" CTA is visible.
    state.currentLesson = null;
    renderCatalog();
    renderEmpty();
  };
  window.goToSubject = goToSubject;
  window.goToBoard = goToBoard;
  window.goToYear = goToYear;
  window.goUp = goUp;

  // ---------- unit / board / year modals ----------
  // All write through SECURITY DEFINER RPCs from supabase_units.sql.
  // Client-side role checks here are cosmetic (for the disabled state
  // and tooltip) — the RPCs are the source of truth.

  // ---- exam boards ----
  // The "+ Add board" modal lives at the subject level. The new board
  // also needs an anchoring (subject, board, year) units row before
  // it can appear in the catalog — that's what the year picker is
  // for. create_board_for_subject_year() (supabase_signup_routing.sql)
  // creates the exam_boards row + the units row atomically so the
  // catalog re-render picks it up.
  window.openAddBoardModal = () => {
    const subject = state.browsePath.subject;
    if (!subject) { toast('Pick a subject first', 'error'); return; }
    const subjectId = subject.id;

    const yearOptions = state.years
      .map(y => `<option value="${y.id}">${escapeHtml(y.label)}</option>`)
      .join('');

    openModal('New exam board', `
      <form id="boardForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Board name</label>
          <input name="name" required placeholder="e.g. AQA" autofocus />
        </div>
        <div class="form-row">
          <label>For year</label>
          <select name="year_id" required>
            ${yearOptions}
          </select>
          <span class="hint">The board will be added to ${escapeHtml(subject.name)} for this year. Staff can rename the auto-created Curriculum unit later.</span>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>`);
    $('boardForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      const yearId = e.target.year_id.value;
      if (!name || !yearId) return;
      const { data, error } = await supabaseClient.rpc('create_board_for_subject_year', {
        p_subject_id: subjectId,
        p_year_id:    yearId,
        p_name:       name,
      });
      if (error) { toast('Create failed: ' + error.message, 'error'); return; }
      toast('Exam board added to ' + subject.name, 'success');
      closeModal();
      await loadTree();
    });
  };

  window.openRenameBoardModal = (id) => {
    const b = state.boardMap[id];
    if (!b) return;
    openModal('Rename exam board', `
      <form id="boardForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Board name</label>
          <input name="name" required value="${escapeHtml(b.name)}" autofocus />
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>`);
    $('boardForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      const { error } = await supabaseClient.rpc('rename_exam_board', { p_id: id, p_name: name });
      if (error) { toast('Save failed: ' + error.message, 'error'); return; }
      toast('Exam board renamed', 'success');
      closeModal();
      await loadTree();
    });
  };

  window.confirmDeleteBoard = async (id) => {
    const b = state.boardMap[id];
    if (!b) return;
    if (!confirm(`Delete the ${b.name} exam board? All units for this board will be removed and topics in them will become orphan (not deleted).`)) return;
    const { error } = await supabaseClient.rpc('delete_exam_board', { p_id: id });
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Exam board deleted', 'success');
    if (state.browsePath.board?.id === id) {
      // We're inside this board's tree — go back up.
      state.browsePath.board = null;
      state.browsePath.year = null;
      state.browsePath.unit = null;
    }
    await loadTree();
  };

  // ---- years ----
  // "+ Add year" at the board level creates the year AND an anchoring
  // Curriculum unit for (current subject, current board, that year).
  // Without that anchor, the year would exist as a global reference
  // row but the catalog card grid would never show it for this board.
  window.openAddYearModal = () => {
    const { subject, board } = state.browsePath;
    if (!subject || !board) { toast('Pick a subject and board first', 'error'); return; }
    const subjectId = subject.id, boardId = board.id;

    openModal('New year level', `
      <form id="yearForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Label</label>
          <input name="label" required placeholder="e.g. Year 10, GCSE, A-level" autofocus />
          <span class="hint">The year will be added globally and anchored to ${escapeHtml(subject.name)} / ${escapeHtml(board.name)} with a default "Curriculum" unit. Staff can rename the unit later.</span>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>`);
    $('yearForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const label = e.target.label.value.trim();
      if (!label) return;
      // 1) Create the year_levels row (or fetch existing).
      const { data: created, error: yrErr } = await supabaseClient.rpc('create_year', { p_label: label });
      if (yrErr) { toast('Create failed: ' + yrErr.message, 'error'); return; }
      // create_year returns the year id when it creates a new one; for
      // an existing label it returns the existing id.
      const yearId = created;
      // 2) Anchor: a Curriculum unit for (subject, board, year). We
      // use upsert via the units unique constraint, so this is
      // idempotent. Direct insert (no RPC) is fine — the catalog
      // render reads from public.units, no audit needed for an
      // anchoring placeholder.
      if (yearId) {
        const { error: unitErr } = await supabaseClient.from('units').insert({
          subject_id: subjectId,
          exam_board_id: boardId,
          year_id: yearId,
          name: 'Curriculum',
          sort_order: 0,
        });
        // 23505 = unique_violation — already anchored, that's fine.
        if (unitErr && unitErr.code !== '23505') {
          toast('Year created but anchor failed: ' + unitErr.message, 'error');
          closeModal();
          await loadTree();
          return;
        }
      }
      toast('Year added to ' + subject.name + ' / ' + board.name, 'success');
      closeModal();
      await loadTree();
    });
  };

  window.openRenameYearModal = (id) => {
    const y = state.yearMap[id];
    if (!y) return;
    openModal('Rename year level', `
      <form id="yearForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Label</label>
          <input name="label" required value="${escapeHtml(y.label)}" autofocus />
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>`);
    $('yearForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const label = e.target.label.value.trim();
      if (!label) return;
      const { error } = await supabaseClient.rpc('rename_year', { p_id: id, p_label: label });
      if (error) { toast('Save failed: ' + error.message, 'error'); return; }
      toast('Year renamed', 'success');
      closeModal();
      await loadTree();
    });
  };

  window.confirmDeleteYear = async (id) => {
    const y = state.yearMap[id];
    if (!y) return;
    if (!confirm(`Delete the ${y.label} year level? All units for this year (across all boards) will be removed and topics in them will become orphan (not deleted).`)) return;
    const { error } = await supabaseClient.rpc('delete_year', { p_id: id });
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Year deleted', 'success');
    if (state.browsePath.year?.id === id) {
      state.browsePath.year = null;
      state.browsePath.unit = null;
    }
    await loadTree();
  };

  // ---- units ----
  // openAddUnitModal is called from the year level — it needs the
  // current (subject, board, year) triple. We capture it from
  // state.browsePath at modal-open time so the form doesn't get
  // confused if the user navigates while it's open.
  window.openAddUnitModal = () => {
    const { subject, board, year } = state.browsePath;
    if (!subject || !board || !year) {
      toast('Pick a subject, board, and year first', 'error');
      return;
    }
    const subjectId = subject.id, boardId = board.id, yearId = year.id;
    openModal('New unit', `
      <form id="unitForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Unit name</label>
          <input name="name" required placeholder="e.g. Cell structure" autofocus />
        </div>
        <div class="form-row">
          <label>Description <span style="color:var(--text-4);">(optional)</span></label>
          <textarea name="description" rows="3" placeholder="What this unit covers."></textarea>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>`);
    $('unitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const name = (fd.get('name') || '').toString().trim();
      if (!name) return;
      const { error } = await supabaseClient.rpc('create_unit', {
        p_subject_id: subjectId,
        p_exam_board_id: boardId,
        p_year_id: yearId,
        p_name: name,
      });
      if (error) { toast('Create failed: ' + error.message, 'error'); return; }
      toast('Unit created', 'success');
      closeModal();
      await loadTree();
    });
  };

  window.openRenameUnitModal = (id) => {
    const u = state.units.find(x => x.id === id);
    if (!u) return;
    openModal('Rename unit', `
      <form id="unitForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Unit name</label>
          <input name="name" required value="${escapeHtml(u.name)}" autofocus />
        </div>
        <div class="form-row">
          <label>Description <span style="color:var(--text-4);">(optional)</span></label>
          <textarea name="description" rows="3">${escapeHtml(u.description || '')}</textarea>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>`);
    $('unitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      const { error } = await supabaseClient.rpc('rename_unit', { p_id: id, p_name: name });
      if (error) { toast('Save failed: ' + error.message, 'error'); return; }
      toast('Unit renamed', 'success');
      closeModal();
      await loadTree();
    });
  };

  window.confirmDeleteUnit = async (id) => {
    const u = state.units.find(x => x.id === id);
    if (!u) return;
    if (!confirm(`Delete unit "${u.name}"? Topics in it will become orphan (not deleted) and can be re-attached to another unit.`)) return;
    const { error } = await supabaseClient.rpc('delete_unit', { p_id: id });
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Unit deleted', 'success');
    if (state.browsePath.unit?.id === id) state.browsePath.unit = null;
    await loadTree();
  };

  // ---- topic create inside a unit ----
  // Replaces the old "+ Topic" button that targeted a subject. Now
  // topics always live in (subject, board, year, unit), and we use
  // the current browse path to know where to put it.
  window.openTopicModalForCurrent = () => {
    const { subject, board, year, unit } = state.browsePath;
    if (!subject || !board || !year || !unit) {
      toast('Navigate to a unit first', 'error');
      return;
    }
    const subjectId = subject.id, unitId = unit.id;
    openModal('New topic', `
      <form id="topicForm" class="editor" style="padding:0;">
        <div class="form-row">
          <label>Topic name</label>
          <input name="name" required placeholder="e.g. Cell structure" autofocus />
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>`);
    $('topicForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      // Order within the unit
      const next = state.subjects
        .find(s => s.id === subjectId)
        .topics.filter(t => t.unit_id === unitId).length;
      const { error } = await supabaseClient.from('topics').insert({
        name,
        subject_id: subjectId,
        unit_id: unitId,
        order_index: next,
      });
      if (error) { toast('Create failed: ' + error.message, 'error'); return; }
      toast('Topic created', 'success');
      closeModal();
      await loadTree();
    });
  };

  // ---------- modal (shared) ----------
  function openModal(title, bodyHtml) {
    $('modalTitle').textContent = title;
    $('modalBody').innerHTML = bodyHtml;
    $('modalBack').classList.add('open');
  }
  function closeModal() {
    $('modalBack').classList.remove('open');
    // Strip any "wide" variant the preview modal added so the next
    // modal (rename, add unit, etc.) renders at the default width.
    const m = $('modalBack').querySelector('.modal');
    if (m) m.classList.remove('wide');
  }
  $('modalCloseBtn').addEventListener('click', closeModal);
  $('modalBack').addEventListener('click', (e) => { if (e.target === $('modalBack')) closeModal(); });

  // ---------- subject / topic / lesson CRUD modals ----------
  window.openSubjectModal = (id) => {
    const s = id ? state.subjects.find(x => x.id === id) : null;
    openModal(s ? 'Rename subject' : 'New subject', `
      <form id="subjForm" class="editor">
        <div class="form-row">
          <label>Name</label>
          <input name="name" required value="${escapeHtml(s?.name || '')}" placeholder="e.g. Mathematics" />
        </div>
        <div class="form-row">
          <label>Exam board</label>
          <select name="exam_board">
            ${['AQA','Edexcel','OCR','WJEC','CCEA'].map(b => `<option ${s?.exam_board===b?'selected':''}>${b}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <label>Level</label>
          <select name="level">
            <option value="gcse"    ${s?.level==='gcse'?'selected':''}>GCSE</option>
            <option value="a-level" ${s?.level==='a-level'?'selected':''}>A-level</option>
          </select>
        </div>
        <div class="form-row">
          <label>Colour key</label>
          <select name="color_key">
            ${['maths','eng','bio','chem','phys','hist','geog','psych'].map(c => `<option ${s?.color_key===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <span class="hint">Matches the coloured dot in the dashboard.</span>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${s ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('subjForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        name: fd.get('name'),
        exam_board: fd.get('exam_board'),
        level: fd.get('level'),
        color_key: fd.get('color_key'),
      };
      if (s) {
        const { error } = await supabaseClient.from('subjects').update(payload).eq('id', s.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject updated', 'success');
      } else {
        const { data, error } = await supabaseClient.from('subjects').insert(payload).select().single();
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  window.deleteSubject = async (id) => {
    if (!confirm('Delete this subject and everything under it (topics, lessons, blocks)? This cannot be undone.')) return;
    const { error } = await supabaseClient.from('subjects').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Subject deleted', 'success');
    if (state.currentSubject?.id === id) { state.currentSubject = null; state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  $('newSubjectBtn').addEventListener('click', () => openSubjectModal());

  window.openTopicModal = (parentId, id) => {
    // parentId may be a subject id (when + Topic) or a topic id (when renaming)
    let subjectId, existing;
    if (id) {
      existing = findTopic(id);
      subjectId = existing?.subject_id;
    } else {
      subjectId = parentId;
    }
    openModal(existing ? 'Rename topic' : 'New topic', `
      <form id="topicForm" class="editor" style="padding: 0;">
        <div class="form-row">
          <label>Name</label>
          <input name="name" required value="${escapeHtml(existing?.name || '')}" placeholder="e.g. Cell structure" />
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('topicForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      if (existing) {
        const { error } = await supabaseClient.from('topics').update({ name }).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic updated', 'success');
      } else {
        // figure out next order_index
        const subj = state.subjects.find(s => s.id === subjectId);
        const next = (subj?.topics || []).length;
        const { error } = await supabaseClient.from('topics').insert({ name, subject_id: subjectId, order_index: next });
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  function findTopic(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) if (t.id === id) return t;
    return null;
  }
  function findLesson(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) for (const l of (t.lessons || [])) if (l.id === id) return { lesson: l, topic: t, subject: s };
    // Also check general lessons. They don't belong to a topic or
    // subject, so we synthesise a minimal stub for the breadcrumb.
    const gl = (state.generalLessons || []).find(l => l.id === id);
    if (gl) return { lesson: gl, topic: null, subject: { id: null, name: 'General' } };
    return null;
  }

  window.deleteTopic = async (id) => {
    if (!confirm('Delete this topic and all its lessons?')) return;
    const { error } = await supabaseClient.from('topics').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Topic deleted', 'success');
    if (state.currentTopic?.id === id) { state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  window.openLessonModal = (topicId, id, mode = 'topic') => {
    // mode: 'topic' (default — under a topic) or 'general' (loose, no subject).
    // For an existing lesson the mode is inferred from the row, not the arg.
    let existing, parentTopic;
    if (id) {
      const found = findLesson(id);
      existing = found?.lesson;
      parentTopic = found?.topic;
      topicId = existing?.topic_id;
      mode = existing?.is_general ? 'general' : 'topic';
    } else {
      parentTopic = findTopic(topicId);
    }

    // The kind-toggle only shows up on *new* lessons. Editing an
    // existing lesson keeps its kind — if you created it as general,
    // you can't retroactively file it under a subject from this modal
    // (use a different tool for that to avoid silent data loss).
    const kindToggle = id ? '' : `
      <div class="form-row" style="margin-bottom: 4px;">
        <label>Where does this lesson live?</label>
        <div style="display: flex; gap: 6px; margin-top: 4px;">
          <label class="btn-ghost" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2);">
            <input type="radio" name="kind" value="topic" ${mode === 'topic' ? 'checked' : ''} />
            In a topic
          </label>
          <label class="btn-ghost" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2);">
            <input type="radio" name="kind" value="general" ${mode === 'general' ? 'checked' : ''} />
            General (loose)
          </label>
        </div>
      </div>
      <div id="kindHelp" style="font-size: 12px; color: var(--text-3); margin: 0 0 12px;">
        General lessons aren't filed under a subject. Add tags so students can find them by topic.
      </div>
    `;

    const tagsValue = (existing?.tags || []).join(', ');

    openModal(existing ? 'Rename lesson' : 'New lesson', `
      <form id="lessonForm" class="editor" style="padding: 0;">
        ${kindToggle}
        <div class="form-row">
          <label>Title</label>
          <input name="title" required value="${escapeHtml(existing?.title || '')}" placeholder="e.g. Mitochondria" />
        </div>
        <div class="form-row">
          <label>Duration (minutes)</label>
          <input name="duration_min" type="number" min="1" max="600" value="${existing?.duration_min ?? 20}" />
        </div>
        <div class="form-row" id="tagsRow" style="${mode === 'general' || existing?.is_general ? '' : 'display:none;'}">
          <label>Tags <span style="color: var(--text-4); font-weight: 400; font-size: 12px;">comma-separated, e.g. algebra, gcse-foundation</span></label>
          <input name="tags" value="${escapeHtml(tagsValue)}" placeholder="algebra, year-10" />
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    // Show/hide the tags row when the kind toggle changes (new lessons
    // only — the toggle isn't rendered for existing lessons).
    const form = $('lessonForm');
    if (!id) {
      form.querySelectorAll('input[name="kind"]').forEach(r => {
        r.addEventListener('change', () => {
          const isGeneral = form.querySelector('input[name="kind"]:checked').value === 'general';
          $('tagsRow').style.display = isGeneral ? '' : 'none';
          $('kindHelp').textContent = isGeneral
            ? 'General lessons aren\'t filed under a subject. Add tags so students can find them by topic.'
            : 'This lesson will be filed under the topic you opened this modal from.';
        });
      });
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        title: e.target.title.value.trim(),
        duration_min: parseInt(e.target.duration_min.value, 10) || 20,
        tags: (e.target.tags?.value || '')
          .split(',').map(s => s.trim().toLowerCase()).filter(Boolean),
      };
      if (!payload.title) return;
      if (existing) {
        const update = { title: payload.title, duration_min: payload.duration_min };
        // Only the owner (or staff with edit rights) can change tags; the
        // modal exposes them, so persist them.
        if (existing.is_general) update.tags = payload.tags;
        const { error } = await supabaseClient.from('lessons').update(update).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Lesson updated', 'success');
      } else {
        const kind = form.querySelector('input[name="kind"]:checked')?.value || mode;
        const insert = { ...payload, author_id: state.user.id };
        if (kind === 'general') {
          insert.is_general = true;
          insert.topic_id   = null;
        } else {
          insert.is_general = false;
          insert.topic_id   = topicId;
          insert.order_index = (parentTopic?.lessons || []).length;
        }
        const { error } = await supabaseClient.from('lessons').insert(insert);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Lesson created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  // Shorthand for the left-rail "+ New general lesson" button.
  window.openGeneralLessonModal = () => openLessonModal(null, null, 'general');

  window.deleteLesson = async (id) => {
    if (!confirm('Delete this lesson and all its blocks?')) return;
    const { error } = await supabaseClient.from('lessons').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Lesson deleted', 'success');
    if (state.currentLesson?.id === id) { state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  // ---------- lesson editor ----------
  window.openLesson = async (id) => {
    if (state.dirty && !confirm('You have unsaved changes. Discard them?')) return;

    const found = findLesson(id);
    if (!found) { toast('Lesson not found', 'error'); return; }
    const { lesson, topic, subject } = found;

    state.currentSubject = subject;
    state.currentTopic = topic;
    // General lessons don't belong to a subject, so the catalog
    // browse path is meaningless for them. Reset to the top so the
    // "General" section in the left rail is visible after the editor
    // closes.
    if (lesson.is_general) {
      state.browsePath = { subject: null, board: null, year: null, unit: null };
    }

    const { data: blocks, error } = await supabaseClient
      .from('lesson_blocks')
      .select('*')
      .eq('lesson_id', id)
      .order('order_index');
    if (error) { toast('Could not load blocks: ' + error.message, 'error'); return; }

    state.currentLesson = {
      ...lesson,
      blocks: blocks || [],
      _serverBlocks: blocks || [],
    };
    state.dirty = false;
    state.metaDirty = false;
    renderCatalog();
    renderEditor();
  };

  function renderEmpty() {
    // If the user has drilled down to a topic but not yet picked a
    // lesson, offer a "Create your first lesson" CTA instead of the
    // generic catalog pitch. Without this, the editor pane is a dead
    // end at the topic level.
    if (state.currentTopic) {
      const t = state.currentTopic;
      const subj = state.currentSubject;
      $('main').innerHTML = `
        <div class="empty-state" id="emptyState">
          <div>
            <h2>${escapeHtml(t.name)}</h2>
            <p>This topic has no lessons yet. Add the first one.</p>
            <div class="actions">
              <button class="btn-primary" onclick="openLessonModal('${t.id}')">+ New lesson</button>
            </div>
            ${subj ? `<p style="margin-top:18px; font-size:12px; color:var(--text-3);">In ${escapeHtml(subj.name)}</p>` : ''}
          </div>
        </div>
      `;
      return;
    }
    $('main').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div>
          <h2>Lesson creator</h2>
          <p>Pick a subject, exam board, year, unit, and topic on the left to start editing. Or create a new one.</p>
          <div class="actions">
            <button class="btn-primary" onclick="document.getElementById('newSubjectBtn').click()">+ New subject</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderEditor() {
    const L = state.currentLesson;
    if (!L) { renderEmpty(); return; }
    const topic = state.currentTopic;
    const subj  = state.currentSubject;
    const isGeneral = !!L.is_general;

    // Build the breadcrumb for the editor topbar. When the editor was
    // opened from a unit (i.e. the browse path is set), include the
    // board → year → unit path. The unit/board/year links jump back
    // to the corresponding catalog level.
    let breadcrumb;
    if (isGeneral) {
      // General lessons have no subject/topic; the breadcrumb is just
      // Catalogue / General / [title]. The "General" crumb is a link
      // back to the top of the catalogue where the General section is.
      breadcrumb = `
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">Catalogue</a>
        <span class="sep">/</span>
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">General</a>
        <span class="sep">/</span>
        <span class="current">${escapeHtml(L.title)}</span>
        <span class="status-pill ${L.status || 'draft'}" id="lessonStatusPill">${L.status === 'published' ? 'Published' : 'Draft'}</span>`;
    } else {
      breadcrumb = `
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">Catalogue</a>
        <span class="sep">/</span>
        <span>${escapeHtml(subj.name)}</span>`;
      const unit = state.browsePath.unit;
      const year = state.browsePath.year;
      const board = state.browsePath.board;
      if (board) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(board.name)}</span>`;
      }
      if (year) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(year.label)}</span>`;
      }
      if (unit) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(unit.name)}</span>`;
      }
      breadcrumb += `
        <span class="sep">/</span>
        <span>${escapeHtml(topic.name)}</span>
        <span class="sep">/</span>
        <span class="current">${escapeHtml(L.title)}</span>
        <span class="status-pill ${L.status || 'draft'}" id="lessonStatusPill">${L.status === 'published' ? 'Published' : 'Draft'}</span>`;
    }

    $('main').innerHTML = `
      <div class="topbar">
        <div class="crumbs">
          ${breadcrumb}
        </div>
        <div class="right">
          <button class="btn-ghost" id="previewBtn">Preview</button>
          <button class="btn-primary" id="saveBlocksBtn">Save blocks</button>
        </div>
      </div>
      <div class="editor">
        <div class="editor-meta">
          <div class="form-row" style="margin: 0;">
            <label>Lesson title</label>
            <input id="lessonTitle" value="${escapeHtml(L.title)}" />
          </div>
          <div class="form-row" style="margin: 0;">
            <label>Duration (min)</label>
            <input id="lessonDuration" type="number" min="1" max="600" value="${L.duration_min ?? 20}" />
          </div>
          <div class="form-row" style="margin: 0;">
            <label>Order</label>
            <input id="lessonOrder" type="number" value="${L.order_index ?? 0}" />
          </div>
          ${isGeneral ? `
            <div class="form-row" style="margin: 0; grid-column: 1 / -1;">
              <label>Tags <span style="color: var(--text-4); font-weight: 400; font-size: 12px;">comma-separated — these are how students find this lesson</span></label>
              <input id="lessonTags" value="${escapeHtml((L.tags || []).join(', '))}" placeholder="algebra, gcse-foundation" />
            </div>
          ` : ''}
        </div>
        <div class="editor-actions">
          <span class="${state.dirty ? 'dirty' : 'saved'}">${state.dirty ? '● Unsaved changes' : '✓ All saved'}</span>
          ${L.code ? `
            <span class="code-chip" title="Share this code to give anyone a direct link to the lesson">
              <span style="color: var(--text-4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;">Code</span>
              <code style="font-family: var(--font-mono); font-size: 13px; color: var(--text); letter-spacing: 0.05em;">${escapeHtml(L.code)}</code>
              <button class="row-btn" id="copyCodeBtn" title="Copy link">⧉ Copy</button>
              <a class="row-btn" id="openCodeLink" target="_blank" rel="noopener" href="lesson.html?code=${encodeURIComponent(L.code)}" title="Open as a student">↗ Open</a>
            </span>
          ` : ''}
          <span class="spacer"></span>
          <span class="shortcuts"><kbd>⌘S</kbd> save · <kbd>⌘Z</kbd> undo block</span>
          ${state.canPublish ? `
            <button class="btn-ghost" id="publishBtn" data-publishing="${L.status === 'published' ? 'true' : 'false'}">
              ${L.status === 'published' ? 'Unpublish' : 'Publish'}
            </button>
          ` : ''}
          <button class="btn-ghost" id="saveMetaBtn">Save lesson details</button>
        </div>
        <div class="blocks" id="blocksList"></div>
        <div class="block-add" id="blockPicker"></div>
      </div>
    `;
    renderBlocksList();
    renderBlockPicker();

    document.getElementById('previewBtn').addEventListener('click', openPreview);
    document.getElementById('saveMetaBtn').addEventListener('click', saveLessonMeta);
    document.getElementById('saveBlocksBtn').addEventListener('click', saveBlocks);
    // Copy-code: just puts the share URL on the clipboard. Plain
    // navigator.clipboard would also work but falls back to nothing
    // on insecure contexts; execCommand is older but works everywhere.
    const copyBtn = document.getElementById('copyCodeBtn');
    if (copyBtn && L.code) {
      copyBtn.addEventListener('click', () => {
        const url = `${location.origin}/lesson.html?code=${encodeURIComponent(L.code)}`;
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); toast('Link copied', 'success'); }
        catch (_) { toast('Copy failed — code: ' + L.code, 'error'); }
        document.body.removeChild(ta);
      });
    }
    // The publish button is only rendered for reviewers / admins, so
    // the element is optional. Wire it up if present.
    const publishBtn = document.getElementById('publishBtn');
    if (publishBtn) publishBtn.addEventListener('click', togglePublish);
    // Wire the three header inputs (title / duration / order) so they
    // write straight to the lesson object and trigger an autosave
    // (debounced). Previously these only flipped state.dirty without
    // persisting — typing a title would survive in the DOM until the
    // next renderEditor() ran, at which point the input was rebuilt
    // from the un-persisted L.title and your work vanished. Now: each
    // keystroke updates L.*, marks the lesson meta-dirty, and a
    // 800ms-debounced saveLessonMeta() pushes it to the server.
    const wireMetaInput = (id, key, parser) => {
      const el = document.getElementById(id);
      if (!el) return;
      let metaTimer = null;
      el.addEventListener('input', () => {
        const v = parser ? parser(el.value) : el.value;
        L[key] = v;
        state.dirty = true;
        state.metaDirty = true;
        renderEditorHeader();
        clearTimeout(metaTimer);
        metaTimer = setTimeout(() => {
          if (state.currentLesson === L) saveLessonMeta({ silent: true });
        }, 800);
      });
    };
    wireMetaInput('lessonTitle',    'title',        v => v);
    wireMetaInput('lessonDuration', 'duration_min', v => parseInt(v, 10) || 20);
    wireMetaInput('lessonOrder',    'order_index',  v => parseInt(v, 10) || 0);
    // Tags is a string in the input but an array in L.tags. The parser
    // does the comma-split + trim + lowercase. Only present for
    // general lessons.
    if (L.is_general && document.getElementById('lessonTags')) {
      wireMetaInput('lessonTags', 'tags', v =>
        v.split(',').map(s => s.trim().toLowerCase()).filter(Boolean)
      );
    }
  }

  // Publish / unpublish. The publish_lesson RPC is SECURITY DEFINER
  // and refuses to run for users whose role isn't reviewer / admin.
  // The button is only visible to those users, but a curious author
  // who hand-crafts the RPC call still gets denied on the server.
  async function togglePublish() {
    const L = state.currentLesson;
    if (!L) return;
    const btn = document.getElementById('publishBtn');
    if (!btn) return;
    const wasPublished = L.status === 'published';
    const wantPublish = !wasPublished;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = wantPublish ? 'Publishing…' : 'Unpublishing…';
    try {
      const { data, error } = await supabaseClient.rpc('publish_lesson', {
        p_lesson_id: L.id, p_publish: wantPublish,
      });
      if (error) {
        toast('Publish failed: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = original;
        return;
      }
      if (data && data.ok === false) {
        toast('Publish failed: ' + (data.reason || 'unknown'), 'error');
        btn.disabled = false;
        btn.textContent = original;
        return;
      }
      L.status = wantPublish ? 'published' : 'draft';
      L.published_at = wantPublish ? new Date().toISOString() : null;
      // The publish_lesson RPC generates a 5-char share code on the
      // first publish and returns it. Stash it on L so the code chip
      // in the editor can render. On re-publish the existing code is
      // returned too — we update unconditionally.
      if (data && data.code) L.code = data.code;
      toast(wantPublish
        ? (L.code ? `Lesson published · code ${L.code}` : 'Lesson published')
        : 'Lesson unpublished', 'success');
      // Re-render the editor so the pill + button text + code chip update.
      renderEditor();
      // Refresh the catalog so the new code shows next to the title in
      // the left rail.
      await loadTree();
    } catch (err) {
      toast('Publish failed: ' + (err?.message || err), 'error');
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  function renderEditorHeader() {
    const el = document.querySelector('.editor-actions .saved, .editor-actions .dirty');
    if (!el) return;
    el.className = state.dirty ? 'dirty' : 'saved';
    el.textContent = state.dirty ? '● Unsaved changes' : '✓ All saved';
  }

  async function saveLessonMeta(opts = {}) {
    const L = state.currentLesson;
    if (!L) return;
    const payload = {
      title: document.getElementById('lessonTitle').value.trim(),
      duration_min: parseInt(document.getElementById('lessonDuration').value, 10) || 20,
      order_index: parseInt(document.getElementById('lessonOrder').value, 10) || 0,
    };
    // Tags: only meaningful for general lessons (regular lessons are
    // filed under a topic, so tags would be redundant with the path).
    // The input only renders for general lessons, so the null-check
    // protects us in case the user re-saves a topic lesson later.
    const tagsEl = document.getElementById('lessonTags');
    if (L.is_general && tagsEl) {
      payload.tags = tagsEl.value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
    }
    if (!payload.title) {
      if (!opts.silent) toast('Title is required', 'error');
      return;
    }
    const { error } = await supabaseClient.from('lessons').update(payload).eq('id', L.id);
    if (error) {
      if (!opts.silent) toast('Save failed: ' + error.message, 'error');
      return;
    }
    Object.assign(L, payload);
    state.metaDirty = false;
    // dirty stays true if the blocks path still has unsaved work.
    state.dirty = state.metaDirty || isBlocksDirty();
    renderEditorHeader();
    if (!opts.silent) {
      // Manual click — refresh the catalogue tree so the new title
      // shows in the left rail. Silent/autosave skips this: reloading
      // the whole tree on every keystroke is wasteful.
      await loadTree();
      renderCatalog();
      toast('Lesson details saved', 'success');
    }
  }

  function renderBlocksList() {
    const list = document.getElementById('blocksList');
    if (!list) return;
    const L = state.currentLesson;
    if (!L.blocks.length) {
      list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--text-4); font-size: 13px; background: var(--bg-2); border: 1px dashed var(--line-2); border-radius: var(--r-md);">No blocks yet. Use the picker below to add the first one.</div>`;
      return;
    }
    list.innerHTML = L.blocks.map((b, i) => renderBlockEditor(b, i)).join('');
    // Wire interactivity for any block whose editor body includes a .preview
    // (callout, image, video, math, worked_example, reveal, flashcard, plus
    // all the new interactive practice / layout / study-aid kinds).
    list.querySelectorAll('.block').forEach((blockEl) => {
      const i = parseInt(blockEl.dataset.blockIndex, 10);
      if (isNaN(i)) return;
      const block = L.blocks[i];
      const preview = blockEl.querySelector('.preview');
      if (preview && block) bindInteractive(preview, block);
    });
    // Wire drag-to-reorder
    wireDragReorder(list);
  }

  // ---------- block picker (grouped) ----------
  const BLOCK_GROUPS = {
    'Text & structure': ['heading', 'text', 'callout', 'image', 'video', 'math', 'keypoints', 'worked_example', 'reveal', 'flashcard'],
    'Interactive practice': ['mcq', 'truefalse', 'shortanswer', 'fillblank', 'match', 'ordering', 'hotspot'],
    'Layout': ['accordion', 'tabs', 'compare', 'timeline'],
    'Study aids': ['objectives', 'prerequisites', 'glossary', 'summary'],
  };

  function renderBlockPicker() {
    const picker = document.getElementById('blockPicker');
    if (!picker) return;
    const html = Object.entries(BLOCK_GROUPS).map(([group, kinds], gi) => {
      const sep = gi > 0 ? `<span class="group-sep"></span>` : '';
      const label = `<span class="group-label">${escapeHtml(group)}</span>`;
      const btns = kinds.map(k => {
        if (!BLOCK_DEFS[k]) return '';
        return `<button class="picker-btn" onclick="addBlock('${k}')" title="${escapeHtml(BLOCK_DEFS[k].label)}">+ ${escapeHtml(BLOCK_DEFS[k].label)}</button>`;
      }).join('');
      return `${sep}${label}${btns}`;
    }).join('');
    const tplBtn = `<span class="group-sep"></span><span class="group-label">Templates</span><button class="picker-btn" id="tplBtn" onclick="toggleTemplatePop(event)">+ From template…</button>`;
    picker.innerHTML = html + tplBtn;
  }

  // ---------- template library ----------
  const TEMPLATES = {

  function toggleTemplatePop(e) {
    e.stopPropagation();
    const existing = document.getElementById('tplPop');
    if (existing) { existing.remove(); return; }
    const pop = document.createElement('div');
    pop.id = 'tplPop';
    pop.className = 'tpl-pop';
    pop.style.top = (e.target.getBoundingClientRect().bottom + window.scrollY + 4) + 'px';
    pop.style.left = Math.min(window.innerWidth - 360, e.target.getBoundingClientRect().left + window.scrollX) + 'px';
    pop.innerHTML = `
      <div class="tpl-head">Insert from template</div>
      ${Object.entries(TEMPLATES).map(([id, t]) => `
        <button class="tpl-item" onclick="applyTemplate('${id}')">
          ${escapeHtml(t.label)}
          <span class="tpl-meta">${escapeHtml(t.hint || '')}</span>
        </button>
      `).join('')}
    `;
    document.body.appendChild(pop);
    const closer = (ev) => {
      if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', closer); }
    };
    setTimeout(() => document.addEventListener('click', closer), 0);
  }
  window.applyTemplate = (id) => {
    const t = TEMPLATES[id];
    if (!t) return;
    if (!state.currentLesson) { toast('Open a lesson first', 'error'); return; }
    const blocks = t.blocks();
    state.currentLesson.blocks.push(...blocks);
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
    document.getElementById('tplPop')?.remove();
    toast(`Inserted ${blocks.length} block${blocks.length === 1 ? '' : 's'} from template`, 'success');
  };

  function renderBlockEditor(b, i) {
    const def = BLOCK_DEFS[b.kind];
    const label = def ? def.label : b.kind;
    const isFirst = i === 0;
    const isLast  = i === state.currentLesson.blocks.length - 1;
    return `
      <div class="block" data-block-id="${b.id || ''}" data-block-index="${i}" draggable="true">
        <div class="block-head">
          <span class="grip" style="color:var(--text-4);cursor:grab;padding:0 4px;font-size:12px;user-select:none;" title="Drag to reorder">⋮⋮</span>
          <span class="kind-label">${escapeHtml(label)}</span>
          <span style="color: var(--text-4);">#${i + 1}</span>
          <span class="spacer"></span>
          <button class="icon-btn" title="Move up"   ${isFirst ? 'disabled' : ''} onclick="moveBlock(${i}, -1)">▲</button>
          <button class="icon-btn" title="Move down" ${isLast  ? 'disabled' : ''} onclick="moveBlock(${i}, +1)">▼</button>
          <button class="icon-btn" title="Duplicate" onclick="duplicateBlock(${i})">⎘</button>
          <button class="icon-btn danger" title="Delete" onclick="deleteBlock(${i})">✕</button>

        if (EDITOR_DISPATCH[b.kind]) return EDITOR_DISPATCH[b.kind](b, i);
        return `<p style="color: var(--red)">No editor for kind: ${escapeHtml(b.kind)}</p>`;

  // ============================================================
  // EDITOR HELPERS for the new kinds. Each helper writes a control
  // panel on the left and a live preview on the right, mirroring
  // the pattern in the existing two-col editors.
  // ============================================================

  // Generic helper: render the small "list of {label, fields...}" editor
  // used by accordion, tabs, timeline, objectives, glossary, etc.
  function editorList(i, items, columns, rowHtml, onAdd) {
    return `
      <div class="repeater">
        ${items.map((_, j) => rowHtml(j)).join('')}
        <button class="add" onclick="${onAdd}">+ Add item</button>
      </div>
    `;
  }

  // ----- MCQ editor -----
  function renderMCQEditor(b, i) {
    const opts = b.data.options || [];
    return `
      <div class="form-row">
        <label>Prompt</label>
        <input value="${escapeHtml(b.data.prompt||'')}" oninput="updateBlock(${i}, {prompt: this.value})" placeholder="The question" />
      </div>
      <div class="check-row-editor">
        <label class="opt-multi"><input type="checkbox" ${b.data.multi ? 'checked' : ''} onchange="updateBlock(${i}, {multi: this.checked})" /> Allow multiple correct</label>
      </div>
      <div class="form-row">
        <label>Options</label>
        <div class="repeater">
          ${opts.map((o, j) => `
            <div class="opt-row">
              <button type="button" class="correct-mark ${o.correct ? 'on' : ''}" onclick="toggleMCQCorrect(${i}, ${j})" title="Mark correct">${o.correct ? '✓' : ''}</button>
              <input type="text" value="${escapeHtml(o.text||'')}" oninput="updateMCQOpt(${i}, ${j}, 'text', this.value)" placeholder="Option text" />
              <input type="text" class="fb-input" value="${escapeHtml(o.feedback||'')}" oninput="updateMCQOpt(${i}, ${j}, 'feedback', this.value)" placeholder="Why this is right/wrong" />
              <button class="del" onclick="removeMCQOpt(${i}, ${j})">✕</button>
            </div>
          `).join('')}
          <button class="add" onclick="addMCQOpt(${i})">+ Add option</button>
        </div>
      </div>
      <div class="form-row">
        <label>Explanation (shown after checking)</label>
        <textarea oninput="updateBlock(${i}, {explanation: this.value})">${escapeHtml(b.data.explanation || '')}</textarea>
      </div>
      <div class="form-row" style="margin: 0;">
        <label>Preview (click options, then Check)</label>
        <div class="preview">${renderBlock(b)}</div>
      </div>
    `;
  }
  window.toggleMCQCorrect = (i, j) => {
    const data = state.currentLesson.blocks[i].data;
    const opts = data.options || [];
    if (!opts[j]) return;
    opts[j].correct = !opts[j].correct;
    // If single-answer, ensure only one is correct
    if (!data.multi) opts.forEach((o, k) => { if (k !== j) o.correct = false; });
    state.dirty = true; renderBlocksList();
  };
  window.updateMCQOpt = (i, j, field, val) => {
    const opts = state.currentLesson.blocks[i].data.options || [];
    if (!opts[j]) opts[j] = { text: '', correct: false, feedback: '' };
    opts[j][field] = val;
    state.dirty = true; renderEditorHeader();
  };
  window.addMCQOpt = (i) => {
    if (!state.currentLesson.blocks[i].data.options) state.currentLesson.blocks[i].data.options = [];
    state.currentLesson.blocks[i].data.options.push({ text: '', correct: false, feedback: '' });
    renderBlocksList();
  };
  window.removeMCQOpt = (i, j) => {
    state.currentLesson.blocks[i].data.options.splice(j, 1);
    renderBlocksList();
  };

  // ----- True/False editor -----
