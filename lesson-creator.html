  };

  // Settings modal — quick access to required + height. The fields write
  // through to the same data structure the main editor uses.
  window.openHtmlBlockSettings = (i) => {
    const b = state.currentLesson.blocks[i];
    if (!b || b.kind !== 'html') return;
    const existing = document.getElementById('htmlBlockSettingsModal');
    if (existing) existing.remove();
    const required = !!(b.data && b.data.required);
    const height = (b.data && b.data.height) || 360;
    const scriptImport = (b.data && b.data.scriptImport) || '';
    const modal = document.createElement('div');
    modal.id = 'htmlBlockSettingsModal';
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="modal" role="dialog" aria-labelledby="htmlBlockSettingsTitle">
        <div class="modal-head">
          <h3 id="htmlBlockSettingsTitle">HTML block settings</h3>
          <button class="icon-btn" onclick="closeHtmlBlockSettings()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <label>Script import (URL)</label>
            <input id="htmlSetImport" value="${escapeHtml(scriptImport)}" placeholder="https://example.com/my-game.js" />
            <div style="color:var(--text-4); font-size:11px; margin-top:4px;">
              If set, the author has declared their game uses the RecallGame completion contract. The block can then
              be marked <strong>required</strong> below so the student must finish it before marking the lesson done.
            </div>
          </div>
          <div class="form-row">
            <label style="display:flex;align-items:center;gap:6px;">
              <input id="htmlSetRequired" type="checkbox" ${required ? 'checked' : ''} ${scriptImport ? '' : 'disabled'} />
              Required to complete before continuing
            </label>
            <div id="htmlSetRequiredHint" style="color:var(--text-4); font-size:11px; margin-top:4px;">
              ${scriptImport
                ? 'A script import is set — required-completion is available.'
                : 'Set a script import above before requiring completion. (The iframe can still signal completion via postMessage, but the intended contract uses RecallGame.)'}
            </div>
          </div>
          <div class="form-row inline">
            <label>Block height (px)</label>
            <input id="htmlSetHeight" type="number" min="80" max="2000" step="10" value="${height}" style="width:100px;" />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn" onclick="closeHtmlBlockSettings()">Cancel</button>
          <button class="btn primary" onclick="saveHtmlBlockSettings(${i})">Save</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    // Toggle the "required" disabled state if the import changes
    const importInput = modal.querySelector('#htmlSetImport');
    const reqInput = modal.querySelector('#htmlSetRequired');
    const hint = modal.querySelector('#htmlSetRequiredHint');
    importInput.addEventListener('input', () => {
      const hasImport = !!importInput.value.trim();
      reqInput.disabled = !hasImport;
      hint.textContent = hasImport
        ? 'A script import is set — required-completion is available.'
        : 'Set a script import above before requiring completion.';
    });
  };

  window.closeHtmlBlockSettings = () => {
    const m = document.getElementById('htmlBlockSettingsModal');
    if (m) m.remove();
  };

  window.saveHtmlBlockSettings = (i) => {
    const b = state.currentLesson.blocks[i];
    if (!b || b.kind !== 'html') return;
    const importVal = (document.getElementById('htmlSetImport').value || '').trim();
    const requiredEl = document.getElementById('htmlSetRequired');
    const height = parseInt(document.getElementById('htmlSetHeight').value, 10) || 360;
    const patch = { scriptImport: importVal, height };
    if (importVal) {
      patch.required = !!requiredEl.checked;
    } else {
      // Strip required if the import was removed — otherwise the
      // completion contract can't be relied on.
      patch.required = false;
    }
    window.updateBlock(i, patch);
    closeHtmlBlockSettings();
    // Re-render the inline editor body so the inline form values stay in sync.
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    if (block) {
      const body = block.querySelector('.block-body');
      if (body) body.innerHTML = renderBlockEditorBody(state.currentLesson.blocks[i], i);
      window.refreshHtmlPreview(i);
    }
  };

  window.updateBlock = (i, patch) => {
    Object.assign(state.currentLesson.blocks[i].data, patch);
    state.dirty = true;
    renderEditorHeader();
    // For text/callout/image/video/math/worked/reveal/flashcard, refresh the
    // preview pane inside this block without re-rendering the whole list
    // (which would lose focus on the textarea the staff is typing in).
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    if (!block) return;
    const preview = block.querySelector('.preview');
    if (preview) {
      preview.innerHTML = renderBlock(state.currentLesson.blocks[i]);
      bindInteractive(preview, state.currentLesson.blocks[i]);
    }
    // HTML block: refresh the live preview (debounced so we don't
    // rebuild the iframe on every keystroke).
    if (state.currentLesson.blocks[i] && state.currentLesson.blocks[i].kind === 'html') {
      clearTimeout(window._htmlPreviewTimer);
      window._htmlPreviewTimer = setTimeout(() => window.refreshHtmlPreview(i), 250);
    }
  };

  window.addBlock = (kind) => {
    if (!canUseKind(kind)) {
      toast('You don\'t have permission to add this block.', 'error');
      return;
    }
    const def = BLOCK_DEFS[kind];
    if (!def) return;
    state.currentLesson.blocks.push({
      id: null, // null = not yet persisted
      kind,
      data: def.defaults(),
      order_index: state.currentLesson.blocks.length,
    });
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
    // scroll to the new block
    const list = document.getElementById('blocksList');
    if (list) list.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.duplicateBlock = (i) => {
    const src = state.currentLesson.blocks[i];
    if (!src) return;
    // Deep clone the data via JSON round-trip (safe for our jsonb shapes;
    // ordering items have ids but we let them get fresh ids on save).
    const clone = JSON.parse(JSON.stringify({ kind: src.kind, data: src.data }));
    state.currentLesson.blocks.splice(i + 1, 0, {
      id: null, kind: clone.kind, data: clone.data, order_index: i + 1
    });
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
    // Scroll the duplicated block into view
    const newEl = document.querySelector(`.block[data-block-index="${i + 1}"]`);
    if (newEl) newEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  // ---------- drag-to-reorder ----------
  function wireDragReorder(list) {
    if (!list) return;
    let dragSrc = null;
    list.querySelectorAll('.block[draggable="true"]').forEach((el) => {
      el.addEventListener('dragstart', (e) => {
        dragSrc = el;
        el.classList.add('dragging');
        // Without setData Firefox refuses to start the drag
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', el.dataset.blockIndex || '');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        list.querySelectorAll('.block').forEach(b => b.classList.remove('drop-above', 'drop-below'));
        dragSrc = null;
      });
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!dragSrc || dragSrc === el) return;
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        list.querySelectorAll('.block').forEach(b => b.classList.remove('drop-above', 'drop-below'));
        el.classList.add(after ? 'drop-below' : 'drop-above');
      });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSrc || dragSrc === el) return;
        const rect = el.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        const srcIdx = parseInt(dragSrc.dataset.blockIndex, 10);
        const dstIdx = parseInt(el.dataset.blockIndex, 10);
        if (isNaN(srcIdx) || isNaN(dstIdx) || srcIdx === dstIdx) return;
        const arr = state.currentLesson.blocks;
        const [moved] = arr.splice(srcIdx, 1);
        // After splicing, the destination index may have shifted
        const newDst = srcIdx < dstIdx ? dstIdx : dstIdx;
        arr.splice(after ? newDst + 1 : newDst, 0, moved);
        state.dirty = true;
        renderBlocksList();
        renderEditorHeader();
      });
    });
  }

  // ---------- image upload (Supabase Storage) ----------
  window.uploadImage = (i) => {
    const fileInput = document.getElementById(`imgFile-${i}`);
    if (fileInput) fileInput.click();
  };
  window.handleImageUpload = async (i, fileInput) => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) { toast('Image too large (max 8 MB).', 'error'); fileInput.value = ''; return; }
    if (!state.currentLesson) { toast('Open a lesson first.', 'error'); return; }
    const ext = (file.name.split('.').pop() || 'png').toLowerCase().replace(/[^a-z0-9]/g, '') || 'png';
    const path = `lessons/${state.currentLesson.id}/${crypto.randomUUID()}.${ext}`;
    const btn = fileInput.previousElementSibling;
    if (btn) btn.disabled = true;
    const { error } = await supabaseClient.storage
      .from('lesson-images')
      .upload(path, file, { upsert: false, contentType: file.type });
    if (error) { toast('Upload failed: ' + error.message, 'error'); if (btn) btn.disabled = false; fileInput.value = ''; return; }
    const { data: pub } = supabaseClient.storage.from('lesson-images').getPublicUrl(path);
    if (pub && pub.publicUrl) {
      state.currentLesson.blocks[i].data.url = pub.publicUrl;
      state.dirty = true;
      renderBlocksList();
      renderEditorHeader();
      toast('Image uploaded', 'success');
    }
    if (btn) btn.disabled = false;
    fileInput.value = '';
  };

  // ---------- per-block undo (Cmd/Ctrl+Z) ----------
  // Coalesces rapid keystrokes into a single undo chunk. After 800ms of
  // no further changes to the same block, the next change starts a new
  // chunk. This makes Cmd+Z feel natural for typing (undo a word) rather
  // than per-character.
  const _undoStack = new Map();   // block index -> array of data snapshots
  const _undoLastAt = new Map();  // block index -> timestamp of last push
  const _undoChunkMs = 800;

  function pushUndo(i) {
    const data = state.currentLesson.blocks[i]?.data;
    if (!data) return;
    const now = Date.now();
    if (_undoLastAt.has(i) && now - _undoLastAt.get(i) < _undoChunkMs) {
      _undoLastAt.set(i, now);
      return; // still in the same edit chunk
    }
    _undoLastAt.set(i, now);
    const snap = JSON.parse(JSON.stringify(data));
    const stack = _undoStack.get(i) || [];
    stack.push(snap);
    if (stack.length > 50) stack.shift();
    _undoStack.set(i, stack);
  }
  window.undoBlock = (i) => {
    const stack = _undoStack.get(i);
    if (!stack || !stack.length) { toast('Nothing to undo in this block', 'error'); return; }
    const prev = stack.pop();
    state.currentLesson.blocks[i].data = prev;
    state.dirty = true;
    // Reset the chunk window so the next change is a fresh edit chunk.
    _undoLastAt.set(i, 0);
    renderBlocksList();
    renderEditorHeader();
  };

  // ---------- global keyboard shortcuts ----------
  document.addEventListener('keydown', (e) => {
    // Esc closes an open modal
    if (e.key === 'Escape' && $('modalBack').classList.contains('open')) {
      closeModal();
      return;
    }
    // Cmd/Ctrl+S saves
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      if (state.currentLesson) saveBlocks();
      return;
    }
    // Cmd/Ctrl+Z undoes the active block (only if focus is inside .editor)
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
      const t = e.target;
      const blockEl = t && t.closest && t.closest('.block');
      if (blockEl && state.currentLesson) {
        e.preventDefault();
        const i = parseInt(blockEl.dataset.blockIndex, 10);
        if (!isNaN(i)) undoBlock(i);
      }
    }
  });

  // ---------- patch updateBlock to record undo snapshots and trigger autosave ----------
  const _origUpdateBlock = window.updateBlock;
  window.updateBlock = (i, patch) => {
    // Push a snapshot BEFORE the change so Cmd+Z can revert.
    pushUndo(i);
    _origUpdateBlock(i, patch);
    maybeAutosave();
  };

  // ---------- autosave debounce ----------
  // Sets a 1.2s timer after the last change; if a save is in flight it
  // queues a follow-up. Pure convenience — the manual "Save blocks"
  // button is the source of truth.
  let _saveTimer = null;
  let _saveInFlight = false;
  let _saveQueued = false;
  async function maybeAutosave() {
    if (!state.currentLesson || !state.dirty) return;
    if (_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async () => {
      if (_saveInFlight) { _saveQueued = true; return; }
      _saveInFlight = true;
      try { await saveAll({ silent: true }); } finally { _saveInFlight = false; }
      if (_saveQueued) { _saveQueued = false; maybeAutosave(); }
    }, 1200);
  }

  // saveAll: persist every dirty surface in one go. Used by the
  // autosave debounce; the manual "Save blocks" / "Save lesson
  // details" buttons still call their respective functions directly so
  // a click on one path doesn't surprise the user with a meta save.
  async function saveAll(opts = {}) {
    const L = state.currentLesson;
    if (!L) return;
    if (state.metaDirty) await saveLessonMeta(opts);
    if (isBlocksDirty())  await saveBlocks(opts);
  }

  window.deleteBlock = (i) => {
    if (!confirm('Delete this block?')) return;
    state.currentLesson.blocks.splice(i, 1);
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
  };

  window.moveBlock = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= state.currentLesson.blocks.length) return;
    const arr = state.currentLesson.blocks;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
  };

  // keypoints + worked-example helpers
  window.updateKPI = (i, j, val) => {
    if (!state.currentLesson.blocks[i].data.items) state.currentLesson.blocks[i].data.items = [];
    state.currentLesson.blocks[i].data.items[j] = val;
    state.dirty = true; renderEditorHeader();
  };
  window.addKPI = (i) => {
    if (!state.currentLesson.blocks[i].data.items) state.currentLesson.blocks[i].data.items = [];
    state.currentLesson.blocks[i].data.items.push('');
    renderBlocksList(); renderEditorHeader();
  };
  window.removeKPI = (i, j) => {
    state.currentLesson.blocks[i].data.items.splice(j, 1);
    renderBlocksList(); renderEditorHeader();
  };
  window.updateStep = (i, j, field, val) => {
    if (!state.currentLesson.blocks[i].data.steps) state.currentLesson.blocks[i].data.steps = [];
    if (!state.currentLesson.blocks[i].data.steps[j]) state.currentLesson.blocks[i].data.steps[j] = { label: '', body: '' };
    state.currentLesson.blocks[i].data.steps[j][field] = val;
    state.dirty = true; renderEditorHeader();
    // refresh the worked-example preview
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    const preview = block?.querySelector('.preview');
    if (preview && state.currentLesson.blocks[i].kind === 'worked_example') {
      preview.innerHTML = renderBlock(state.currentLesson.blocks[i]);
      bindInteractive(preview, state.currentLesson.blocks[i]);
    }
  };
  window.addStep = (i) => {
    if (!state.currentLesson.blocks[i].data.steps) state.currentLesson.blocks[i].data.steps = [];
    state.currentLesson.blocks[i].data.steps.push({ label: 'Step ' + (state.currentLesson.blocks[i].data.steps.length + 1), body: '' });
    renderBlocksList(); renderEditorHeader();
  };
  window.removeStep = (i, j) => {
    state.currentLesson.blocks[i].data.steps.splice(j, 1);
    renderBlocksList(); renderEditorHeader();
  };

  // ---------- save blocks ----------
  async function saveBlocks(opts = {}) {
    const L = state.currentLesson;
    if (!L) return;
    // Plan: for each block, if id is null → insert; else update. For deletes
    // we diff against the most recently loaded set (state._serverBlocks).
    const server = L._serverBlocks || (L._serverBlocks = await fetchServerBlocks(L.id));
    const current = L.blocks;
    try {
      console.log('[saveBlocks] lesson=%s blocks: current=%d, server=%d, dirty=%s, opts.silent=%s',
        L.id, current.length, server.length, state.dirty, !!opts.silent);
      // Dump ids so it's easy to see if the in-memory block lost its id
      // (e.g. the refetch returned a different row than was inserted).
      console.log('[saveBlocks] current ids:',
        current.map(b => b.id || '<null>'));
      console.log('[saveBlocks] server ids:',
        server.map(b => b.id || '<null>'));
    } catch (_) { /* noop */ }

    const currentIds = new Set(current.filter(b => b.id).map(b => b.id));
    // Defensive: only pass real, uuid-shaped ids to .delete().in('id', ...).
    // We sometimes see a row in the server fetch whose id is null (transient
    // state, or a block inserted without a default gen_random_uuid() in a
    // test/dev environment). Supabase's .in() serialises the array to a
    // PostgREST URL and PG then chokes on the literal "null" with
    // "invalid input syntax for type uuid: 'null'". Filtering the bad
    // ids out here means the delete just skips them — the row will be
    // cleaned up on the next save once it has a real id.
    const toDelete = server
      .filter(b => b.id && !currentIds.has(b.id))
      .map(b => b.id);
    if (toDelete.length) {
      const { error } = await supabaseClient.from('lesson_blocks').delete().in('id', toDelete);
      if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    }

    // Insert + update. Use .select() on the insert so we can detect the
    // silent-RLS-block case: Supabase's JS client returns {data: null,
    // error: null} when an RLS WITH CHECK fails, so checking .error
    // alone would let a denied insert appear to succeed. The most
    // common reason for that on this project is the lesson_blocks RLS
    // policy still checking role = 'staff' (the old pre-admin-roles
    // form) when the caller's role is 'staff_author' / 'staff_reviewer'
    // / 'admin' — fixed by running supabase_admin.sql which rewrites
    // the policies. The .select() lets us tell the user what to do.
    //
    // We also track the original array index of each to-be-inserted
    // block, so we can wire the new server-issued ids back onto the
    // in-memory blocks. This replaces the old "refetch + replace
    // L.blocks" pattern that was clobbering any edits the user typed
    // during the in-flight async save.
    const inserts = [];
    const insertIndices = [];
    for (let i = 0; i < current.length; i++) {
      const b = current[i];
      if (b.id) continue;
      inserts.push({
        lesson_id: L.id,
        kind: b.kind,
        data: b.data,
        order_index: i,
      });
      insertIndices.push(i);
    }
    if (inserts.length) {
      // First, log what we're about to insert so the user can see it in
      // the browser console if something goes wrong. Often the most
      // useful debug info when an insert fails is "what was the row?"
      // — e.g. an unexpected kind string, a null lesson_id, or a
      // malformed jsonb payload. Print a compact summary, not the full
      // data (data can be large for image / video / hotspot blocks).
      try {
        console.log('[saveBlocks] inserting', inserts.length, 'block(s):',
          inserts.map(i => ({ kind: i.kind, order_index: i.order_index,
            data_keys: i.data ? Object.keys(i.data) : null })));
      } catch (_) { /* noop */ }
      const { data: inserted, error } = await supabaseClient
        .from('lesson_blocks')
        .insert(inserts)
        .select();
      if (error) {
        console.error('[saveBlocks] insert error:', error);
        // showFullError: the standard toast truncates at 80 chars which
        // is fine for the headline but can hide a useful PostgREST
        // hint. We log the full message to the console so the user
        // (or the developer helping them) can find it via F12.
        toast('Insert failed: ' + error.message, 'error');
        return;
      }
      if (!inserted || inserted.length !== inserts.length) {
        // Silent RLS denial or other write-skip. Common cause: the
        // lesson_blocks_staff_write policy is still checking
        // role = 'staff' (the pre-admin-roles form), so staff_author
        // accounts get silently filtered out. We now also dump the
        // caller's profile.role to the console so the user can see
        // whether the role migration actually took effect.
        try {
          const { data: prof } = await supabaseClient
            .from('profiles').select('role').eq('id', state.user.id).single();
          console.error(
            '[saveBlocks] RLS blocked the insert. Caller role:',
            prof?.role, '— if this is "staff" (singular), update the row to ' +
            '"staff_author" in profiles, or re-run supabase_admin.sql to widen ' +
            'the policy. Requested', inserts.length, 'insert(s), got',
            inserted ? inserted.length : 0
          );
        } catch (_) { /* noop */ }
        toast(
          'Insert was blocked by row-level security. ' +
          'Your profile role is not in the policy allowlist — ' +
          'open the browser console (F12) for the exact role and fix instructions.',
          'error'
        );
        return;
      }
      // Wire the new server ids back into the in-memory blocks at
      // their original positions. This is the only mutation we make
      // to `current` (= L.blocks) inside this save — the in-memory
      // state remains the source of truth, and any keystrokes the
      // user typed during the async insert round-trip are preserved.
      for (let i = 0; i < inserted.length; i++) {
        const idx = insertIndices[i];
        if (current[idx]) current[idx].id = inserted[i].id;
      }
    }
    // Updates: only need to send if data or order_index changed.
    // Use the loop index `i` rather than `current.indexOf(b)` to
    // avoid an O(n²) scan; the array order IS the canonical
    // order_index here.
    const updates = [];
    for (let i = 0; i < current.length; i++) {
      const b = current[i];
      if (!b.id) continue;
      const before = server.find(s => s.id === b.id);
      const dataChanged = !before || JSON.stringify(before.data) !== JSON.stringify(b.data);
      const orderChanged = !before || before.order_index !== i;
      if (dataChanged || orderChanged) {
        updates.push({ id: b.id, data: b.data, order_index: i });
      }
    }
    for (const u of updates) {
      const { error } = await supabaseClient.from('lesson_blocks').update({ data: u.data, order_index: u.order_index }).eq('id', u.id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return; }
    }

    // Mirror the in-memory state into _serverBlocks so isBlocksDirty()
    // returns false. We deliberately do NOT do a server refetch and do
    // NOT replace L.blocks here. The previous behaviour — refetch and
    // `L.blocks = L._serverBlocks` — was the cause of the "save keeps
    // reverting" bug: any keystroke the user typed during the async
    // save round-trip was overwritten by the server's older snapshot
    // when the refetch returned, then the editor re-rendered from
    // that clobbered state. The in-memory L.blocks is the canonical
    // post-save state; we just snapshot it (via a deep clone so
    // subsequent in-place edits don't taint the dirty check) for
    // comparison.
    L._serverBlocks = JSON.parse(JSON.stringify(L.blocks));
    state.dirty = state.metaDirty || isBlocksDirty();
    renderEditorHeader();
    if (!opts.silent) {
      // Pop the Save button + glow the saved pill so the user sees
      // the save event. This is the same pattern as the meta-save
      // glow above; kept parallel so the editor feels consistent.
      const saveBtn = document.getElementById('saveBlocksBtn');
      if (saveBtn) fx.pop(saveBtn);
      const saved = document.querySelector('.editor-actions .saved');
      if (saved) fx.glow(saved);
      toast('Blocks saved', 'success');
    }
  }

  // isBlocksDirty(): do the in-memory blocks differ from what the
  // server has? Used by the dirty flag so the "● Unsaved changes"
  // header doesn't disappear while the user is still editing.
  // _serverBlocks can be missing right after openLesson() if a save
  // fired before the initial load completed — treat that as "unknown,
  // assume dirty".
  function isBlocksDirty() {
    const L = state.currentLesson;
    if (!L) return false;
    const server = L._serverBlocks;
    if (!server) return true;
    if (L.blocks.length !== server.length) return true;
    const serverById = new Map(server.map(b => [b.id, b]));
    for (const b of L.blocks) {
      if (!b.id) return true;                       // new, never persisted
      const s = serverById.get(b.id);
      if (!s) return true;                          // server lost it
      if (JSON.stringify(b.data) !== JSON.stringify(s.data)) return true;
      if ((b.order_index ?? server.indexOf(s)) !== s.order_index) return true;
    }
    return false;
  }

  async function fetchServerBlocks(lessonId) {
    const { data, error } = await supabaseClient
      .from('lesson_blocks')
      .select('*')
      .eq('lesson_id', lessonId)
      .order('order_index');
    if (error) { toast('Could not load blocks: ' + error.message, 'error'); return []; }
    return data || [];
  }

  // ---------- preview modal ----------
  function openPreview() {
    const L = state.currentLesson;
    if (!L) return;
    const blocksHtml = (L.blocks || []).map((b, i) =>
      `<div class="student-preview-block" data-bidx="${i}">${renderBlock(b)}</div>`
    ).join('') || '<p style="color: var(--text-4)">No blocks yet.</p>';

    // Build the breadcrumb shown above the lesson title — mirrors the
    // student view in lesson.html so staff can see what the lesson will
    // look like in context (Catalogue › Subject › Topic › Lesson).
    const isGeneral = !!L.is_general;
    let crumb;
    if (isGeneral) {
      crumb = `
        <a href="#" onclick="closeModal(); return false;">Catalogue</a>
        <span>›</span>
        <span>General</span>
        <span>›</span>
        <span style="color: var(--text-2);">${escapeHtml(L.title)}</span>
      `;
    } else {
      const subj = state.currentSubject;
      const topic = state.currentTopic;
      crumb = `
        <a href="#" onclick="closeModal(); return false;">Catalogue</a>
        ${subj ? `<span>›</span><span>${escapeHtml(subj.name)}</span>` : ''}
        ${topic ? `<span>›</span><span>${escapeHtml(topic.name)}</span>` : ''}
        <span>›</span>
        <span style="color: var(--text-2);">${escapeHtml(L.title)}</span>
      `;
    }

    const body = `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;">
        <div style="color:var(--text-3);font-size:12px;">In-staff preview — interactivity works exactly like the student view.</div>
        <a class="btn-primary" id="openStudentViewBtn" target="_blank" rel="noopener" style="text-decoration:none;font-size:12px;padding:6px 12px;">Open student view ↗</a>
      </div>
      <div class="student-preview">
        <div class="student-preview-head">
          <div class="student-preview-crumb">${crumb}</div>
          <h1 class="student-preview-title">${escapeHtml(L.title)}</h1>
          <p class="student-preview-meta">
            ${escapeHtml(state.currentSubject?.name || 'General')}
            ${state.currentTopic ? ' · ' + escapeHtml(state.currentTopic.name) : ''}
            · ${L.duration_min ?? 20} min
          </p>
        </div>
        <div class="student-preview-body">
          ${blocksHtml}
        </div>
      </div>
    `;
    // Widen the modal so the 800px lesson column fits comfortably —
    // the default 900px cap is too narrow once you account for the
    // modal padding and the in-staff banner above the preview.
    $('modalBack').querySelector('.modal').classList.add('wide');
    openModal('Preview — ' + L.title, body);
    // Wire interactivity for any interactive blocks in the preview.
    const sp = $('modalBody').querySelector('.student-preview');
    if (sp) {
      sp.querySelectorAll('.student-preview-block').forEach((wrap, i) => {
        bindInteractive(wrap, L.blocks[i]);
      });
    }
    // Link the "Open student view" button to the new player. Only enable
    // it once the lesson has a real id (i.e. it's been saved at least
    // once) — unsaved lessons don't have a row to look up.
    const link = $('openStudentViewBtn');
    if (link) {
      if (L.id) {
        link.href = 'lesson.html?lesson=' + encodeURIComponent(L.id);
      } else {
        link.href = '#';
        link.style.opacity = '0.5';
        link.style.pointerEvents = 'none';
        link.title = 'Save the lesson first to preview it as a student.';
      }
    }
  }

  // ============================================================
  // EDITOR DISPATCH — maps new block kinds to their editor renderers.
  // Defined last so the helper functions above are in scope.
  // ============================================================
  const EDITOR_DISPATCH = {
    mcq:           (b, i) => renderMCQEditor(b, i),
    truefalse:     (b, i) => renderTFEditor(b, i),
    shortanswer:   (b, i) => renderSAEditor(b, i),
    fillblank:     (b, i) => renderFBEditor(b, i),
    match:         (b, i) => renderMatchEditor(b, i),
    ordering:      (b, i) => renderOrderingEditor(b, i),
    hotspot:       (b, i) => renderHotspotEditor(b, i),
    categorise:    (b, i) => renderCategoriseEditor(b, i),
    slider:        (b, i) => renderSliderEditor(b, i),
    dial:          (b, i) => renderDialEditor(b, i),
    sequence:      (b, i) => renderSequenceEditor(b, i),
    connect:       (b, i) => renderConnectEditor(b, i),
    pile:          (b, i) => renderPileEditor(b, i),
