          <button type="submit" class="btn-primary">${s ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('subjForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        name: fd.get('name'),
        exam_board: fd.get('exam_board'),
        level: fd.get('level'),
        color_key: fd.get('color_key'),
      };
      if (s) {
        const { error } = await supabaseClient.from('subjects').update(payload).eq('id', s.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject updated', 'success');
      } else {
        const { data, error } = await supabaseClient.from('subjects').insert(payload).select().single();
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Subject created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  window.deleteSubject = async (id) => {
    if (!confirm('Delete this subject and everything under it (topics, lessons, blocks)? This cannot be undone.')) return;
    const { error } = await supabaseClient.from('subjects').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Subject deleted', 'success');
    if (state.currentSubject?.id === id) { state.currentSubject = null; state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  $('newSubjectBtn').addEventListener('click', () => openSubjectModal());

  window.openTopicModal = (parentId, id) => {
    // parentId may be a subject id (when + Topic) or a topic id (when renaming)
    let subjectId, existing;
    if (id) {
      existing = findTopic(id);
      subjectId = existing?.subject_id;
    } else {
      subjectId = parentId;
    }
    openModal(existing ? 'Rename topic' : 'New topic', `
      <form id="topicForm" class="editor" style="padding: 0;">
        <div class="form-row">
          <label>Name</label>
          <input name="name" required value="${escapeHtml(existing?.name || '')}" placeholder="e.g. Cell structure" />
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    $('topicForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value.trim();
      if (!name) return;
      if (existing) {
        const { error } = await supabaseClient.from('topics').update({ name }).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic updated', 'success');
      } else {
        // figure out next order_index
        const subj = state.subjects.find(s => s.id === subjectId);
        const next = (subj?.topics || []).length;
        const { error } = await supabaseClient.from('topics').insert({ name, subject_id: subjectId, order_index: next });
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Topic created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  function findTopic(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) if (t.id === id) return t;
    return null;
  }
  function findLesson(id) {
    for (const s of state.subjects) for (const t of (s.topics || [])) for (const l of (t.lessons || [])) if (l.id === id) return { lesson: l, topic: t, subject: s };
    // Also check general lessons. They don't belong to a topic or
    // subject, so we synthesise a minimal stub for the breadcrumb.
    const gl = (state.generalLessons || []).find(l => l.id === id);
    if (gl) return { lesson: gl, topic: null, subject: { id: null, name: 'General' } };
    return null;
  }

  window.deleteTopic = async (id) => {
    if (!confirm('Delete this topic and all its lessons?')) return;
    const { error } = await supabaseClient.from('topics').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Topic deleted', 'success');
    if (state.currentTopic?.id === id) { state.currentTopic = null; state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  window.openLessonModal = (topicId, id, mode = 'topic') => {
    // mode: 'topic' (default — under a topic), 'general' (loose, no subject),
    // or 'activity' (a single HTML file rendered as a sandboxed iframe).
    // For an existing lesson the mode is inferred from the row, not the arg.
    let existing, parentTopic;
    if (id) {
      const found = findLesson(id);
      existing = found?.lesson;
      parentTopic = found?.topic;
      topicId = existing?.topic_id;
      if (existing?.kind === 'activity') mode = 'activity';
      else mode = existing?.is_general ? 'general' : 'topic';
    } else {
      parentTopic = findTopic(topicId);
    }

    // The kind-toggle only shows up on *new* lessons. Editing an
    // existing lesson keeps its kind — if you created it as general,
    // you can't retroactively file it under a subject from this modal
    // (use a different tool for that to avoid silent data loss).
    const kindToggle = id ? '' : `
      <div class="form-row" style="margin-bottom: 4px;">
        <label>What kind of lesson?</label>
        <div style="display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;">
          <label class="btn-ghost" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2);">
            <input type="radio" name="kind" value="topic" ${mode === 'topic' ? 'checked' : ''} />
            Lesson (in a topic)
          </label>
          <label class="btn-ghost" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2);">
            <input type="radio" name="kind" value="general" ${mode === 'general' ? 'checked' : ''} />
            General (loose)
          </label>
          <label class="btn-ghost" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2);">
            <input type="radio" name="kind" value="activity" />
            Activity (HTML file)
          </label>
        </div>
      </div>
      <div id="kindHelp" style="font-size: 12px; color: var(--text-3); margin: 0 0 12px;">
        ${mode === 'general'
          ? 'General lessons aren\'t filed under a subject. Add tags so students can find them by topic.'
          : mode === 'activity'
            ? 'Activity lessons are a single HTML file. The file is sandboxed and rendered as an iframe when students open the lesson.'
            : 'This lesson will be filed under the topic you opened this modal from.'}
      </div>
    `;

    const tagsValue = (existing?.tags || []).join(', ');

    // The activity-file picker only shows up for new activity lessons.
    // For existing activity lessons the file lives in the editor page
    // (a "Replace HTML" button), not in this rename modal.
    const fileRow = (!id && mode === 'activity') ? `
      <div class="form-row" id="activityFileRow">
        <label>HTML file <span style="color: var(--text-4); font-weight: 400; font-size: 12px;">.html, ≤ 8 MB. Uploaded to the <code>lesson-activities</code> bucket.</span></label>
        <input type="file" id="activityFile" accept="text/html,.html,.htm" required />
        <span class="hint">The file is rendered as a sandboxed iframe. Call <code>parent.postMessage({{type:&quot;recall-block-complete&quot;}}, &quot;*&quot;)</code> from the iframe to mark the activity complete.</span>
      </div>
    ` : '';

    openModal(existing ? 'Rename lesson' : 'New lesson', `
      <form id="lessonForm" class="editor" style="padding: 0;">
        ${kindToggle}
        <div class="form-row">
          <label>Title</label>
          <input name="title" required value="${escapeHtml(existing?.title || '')}" placeholder="${mode === 'activity' ? 'e.g. Photosynthesis drag-and-drop' : 'e.g. Mitochondria'}" />
        </div>
        <div class="form-row">
          <label>Duration (minutes)</label>
          <input name="duration_min" type="number" min="1" max="600" value="${existing?.duration_min ?? 20}" />
        </div>
        <div class="form-row" id="tagsRow" style="${mode === 'general' || existing?.is_general ? '' : 'display:none;'}">
          <label>Tags <span style="color: var(--text-4); font-weight: 400; font-size: 12px;">comma-separated, e.g. algebra, gcse-foundation</span></label>
          <input name="tags" value="${escapeHtml(tagsValue)}" placeholder="algebra, year-10" />
        </div>
        ${fileRow}
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">${existing ? 'Save' : 'Create'}</button>
        </div>
      </form>
    `);
    // Show/hide the tags row + file row when the kind toggle changes
    // (new lessons only — the toggle isn't rendered for existing lessons).
    const form = $('lessonForm');
    if (!id) {
      const updateKindUi = () => {
        const v = form.querySelector('input[name="kind"]:checked')?.value || 'topic';
        $('tagsRow').style.display = v === 'general' ? '' : 'none';
        $('kindHelp').textContent =
          v === 'general' ? 'General lessons aren\'t filed under a subject. Add tags so students can find them by topic.' :
          v === 'activity' ? 'Activity lessons are a single HTML file. The file is sandboxed and rendered as an iframe when students open the lesson.' :
          'This lesson will be filed under the topic you opened this modal from.';
      };
      form.querySelectorAll('input[name="kind"]').forEach(r => {
        r.addEventListener('change', updateKindUi);
      });
      // Sync initial state in case the user re-opens the modal with mode
      // preset to 'activity' (e.g. from a future "New activity" button).
      updateKindUi();
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        title: e.target.title.value.trim(),
        duration_min: parseInt(e.target.duration_min.value, 10) || 20,
        tags: (e.target.tags?.value || '')
          .split(',').map(s => s.trim().toLowerCase()).filter(Boolean),
      };
      if (!payload.title) return;
      if (existing) {
        const update = { title: payload.title, duration_min: payload.duration_min };
        // Only the owner (or staff with edit rights) can change tags; the
        // modal exposes them, so persist them.
        if (existing.is_general) update.tags = payload.tags;
        const { error } = await supabaseClient.from('lessons').update(update).eq('id', existing.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        toast('Lesson updated', 'success');
      } else {
        const kind = form.querySelector('input[name="kind"]:checked')?.value || mode;
        const insert = { ...payload, author_id: state.user.id };
        if (kind === 'general') {
          insert.is_general = true;
          insert.topic_id   = null;
        } else if (kind === 'activity') {
          // Activity lessons live in the same tree as normal lessons —
          // either under a topic (when topicId was provided) or loose
          // (when opened from the General section). The body is a
          // single HTML file; lesson_blocks is unused.
          insert.is_general = !topicId;
          insert.topic_id   = topicId || null;
          insert.kind       = 'activity';
          if (!topicId) insert.order_index = (state.generalLessons || []).length;
          else insert.order_index = (parentTopic?.lessons || []).length;
        } else {
          insert.is_general = false;
          insert.topic_id   = topicId;
          insert.order_index = (parentTopic?.lessons || []).length;
        }
        // Pre-check the (topic_id, title) uniqueness constraint
        // (lessons_topic_title_uniq, supabase_tables.sql:327). Postgres
        // raises a generic "duplicate key value" error if it trips,
        // which isn't helpful — do a local check first so the user
        // sees a clear message and can rename without a wasted insert
        // round-trip. For general lessons the index is the same shape
        // but topic_id is NULL, so the bucket key is (NULL, title) —
        // duplicate titles ARE allowed there, so we only check the
        // in-topic case.
        if (insert.topic_id) {
          const collision = (parentTopic?.lessons || []).some(
            l => l.title.trim().toLowerCase() === insert.title.trim().toLowerCase()
          );
          if (collision) {
            toast('A lesson with that title already exists in this topic. Pick a unique title.', 'error');
            return;
          }
        }
        const { data: created, error } = await supabaseClient
          .from('lessons')
          .insert(insert)
          .select('id')
          .single();
        if (error) {
          // Translate the most common constraint violations into
          // something a human can act on. The actual index is
          // lessons_topic_title_uniq (topic_id, title).
          if (/lessons_topic_title_uniq/i.test(error.message)) {
            toast('A lesson with that title already exists in this topic. Pick a unique title.', 'error');
          } else {
            toast('Save failed: ' + error.message, 'error');
          }
          return;
        }

        // For activity lessons: upload the chosen file to the
        // lesson-activities bucket at activities/<id>/index.html, then
        // persist the path on the lesson row. The activity editor will
        // pick this up on first open.
        if (kind === 'activity') {
          const fileInput = document.getElementById('activityFile');
          const file = fileInput?.files?.[0];
          if (!file) { toast('Choose an HTML file for the activity.', 'error'); return; }
          if (file.size > 8 * 1024 * 1024) { toast('Activity file too large (max 8 MB).', 'error'); return; }
          // Sniff the first 256 bytes for a '<' to reject non-HTML.
          // (Cheap, no full parsing — matches the spirit of the inline
          // html block: we accept any text the author says is HTML, but
          // refuse obvious binaries like .exe or .png renamed .html.)
          try {
            const head = await file.slice(0, 256).text();
            if (!head.includes('<')) { toast('That doesn\'t look like an HTML file.', 'error'); return; }
          } catch (_) { /* File API unavailable — let the upload proceed */ }
          const path = `activities/${created.id}/index.html`;
          // Force contentType on the File object itself. Supabase
          // Storage's upload() honours file.type for the object's
          // metadata, and the explicit contentType option in the
          // third arg sets the Content-Type the bucket will return.
          // Some browsers leave file.type empty for .html files
          // dragged from the filesystem, which would otherwise cause
          // the public URL to serve the file as text/plain — and the
          // browser then renders the source as text.
          try { if (!file.type) Object.defineProperty(file, 'type', { value: 'text/html' }); } catch (_) {}
          const { error: upErr } = await supabaseClient.storage
            .from('lesson-activities')
            .upload(path, file, { upsert: true, contentType: 'text/html', cacheControl: '3600' });
          if (upErr) {
            // Roll back the lesson row so we don't leave a stranded
            // activity with no file. The storage bucket is the source
            // of truth for the activity body; without it the lesson
            // would just show an empty iframe.
            await supabaseClient.from('lessons').delete().eq('id', created.id);
            toast('Upload failed: ' + upErr.message, 'error');
            return;
          }
          const { error: pathErr } = await supabaseClient
            .from('lessons')
            .update({ activity_path: path })
            .eq('id', created.id);
          if (pathErr) { toast('Save failed: ' + pathErr.message, 'error'); return; }
        }
        toast('Lesson created', 'success');
      }
      closeModal();
      await loadTree();
    });
  };

  // Shorthand for the left-rail "+ New general lesson" button.
  window.openGeneralLessonModal = () => openLessonModal(null, null, 'general');
  // Shorthand for the left-rail "+ New activity" button.
  window.openGeneralActivityModal = () => openLessonModal(null, null, 'activity');

  window.deleteLesson = async (id) => {
    if (!confirm('Delete this lesson and all its blocks?')) return;
    const { error } = await supabaseClient.from('lessons').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
    toast('Lesson deleted', 'success');
    if (state.currentLesson?.id === id) { state.currentLesson = null; renderEmpty(); }
    await loadTree();
  };

  // ---------- lesson editor ----------
  window.openLesson = async (id) => {
    if (state.dirty && !confirm('You have unsaved changes. Discard them?')) return;

    const found = findLesson(id);
    if (!found) { toast('Lesson not found', 'error'); return; }
    const { lesson, topic, subject } = found;

    state.currentSubject = subject;
    state.currentTopic = topic;
    // General lessons don't belong to a subject, so the catalog
    // browse path is meaningless for them. Reset to the top so the
    // "General" section in the left rail is visible after the editor
    // closes.
    if (lesson.is_general) {
      state.browsePath = { subject: null, board: null, year: null, unit: null };
    }

    const { data: blocks, error } = await supabaseClient
      .from('lesson_blocks')
      .select('*')
      .eq('lesson_id', id)
      .order('order_index');
    if (error) { toast('Could not load blocks: ' + error.message, 'error'); return; }

    state.currentLesson = {
      ...lesson,
      blocks: blocks || [],
      _serverBlocks: blocks || [],
    };
    state.dirty = false;
    state.metaDirty = false;
    renderCatalog();
    renderEditor();
  };

  function renderEmpty() {
    // If the user has drilled down to a topic but not yet picked a
    // lesson, offer a "Create your first lesson" CTA instead of the
    // generic catalog pitch. Without this, the editor pane is a dead
    // end at the topic level.
    if (state.currentTopic) {
      const t = state.currentTopic;
      const subj = state.currentSubject;
      $('main').innerHTML = `
        <div class="empty-state" id="emptyState">
          <div>
            <h2>${escapeHtml(t.name)}</h2>
            <p>This topic has no lessons yet. Add the first one.</p>
            <div class="actions">
              <button class="btn-primary" onclick="openLessonModal('${t.id}')">+ New lesson</button>
            </div>
            ${subj ? `<p style="margin-top:18px; font-size:12px; color:var(--text-3);">In ${escapeHtml(subj.name)}</p>` : ''}
          </div>
        </div>
      `;
      return;
    }
    $('main').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div>
          <h2>Lesson creator</h2>
          <p>Pick a subject, exam board, year, unit, and topic on the left to start editing. Or create a new one.</p>
          <div class="actions">
            <button class="btn-primary" onclick="document.getElementById('newSubjectBtn').click()">+ New subject</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderEditor() {
    const L = state.currentLesson;
    if (!L) { renderEmpty(); return; }
    const topic = state.currentTopic;
    const subj  = state.currentSubject;
    const isGeneral = !!L.is_general;
    // Activity lessons are a second lesson type: the body is a single
    // HTML file in Supabase Storage rather than a sequence of blocks.
    // They share the same topic tree and the same lifecycle (draft,
    // publish, share-code) as block-based lessons — only the editor
    // body and the student player differ.
    const isActivity = L.kind === 'activity';

    // Build the breadcrumb for the editor topbar. When the editor was
    // opened from a unit (i.e. the browse path is set), include the
    // board → year → unit path. The unit/board/year links jump back
    // to the corresponding catalog level.
    let breadcrumb;
    if (isGeneral) {
      // General lessons have no subject/topic; the breadcrumb is just
      // Catalogue / General / [title]. The "General" crumb is a link
      // back to the top of the catalogue where the General section is.
      breadcrumb = `
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">Catalogue</a>
        <span class="sep">/</span>
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">General</a>
        <span class="sep">/</span>
        <span class="current">${escapeHtml(L.title)}</span>
        ${isActivity ? '<span class="status-pill" style="background: rgba(163,113,247,0.15); color: #A371F7; border: 1px solid rgba(163,113,247,0.3); margin-left: 6px;">Activity</span>' : ''}
        <span class="status-pill ${L.status || 'draft'}" id="lessonStatusPill">${L.status === 'published' ? 'Published' : 'Draft'}</span>`;
    } else {
      breadcrumb = `
        <a href="#" onclick="renderEmpty(); goToSubject(); return false;">Catalogue</a>
        <span class="sep">/</span>
        <span>${escapeHtml(subj.name)}</span>`;
      const unit = state.browsePath.unit;
      const year = state.browsePath.year;
      const board = state.browsePath.board;
      if (board) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(board.name)}</span>`;
      }
      if (year) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(year.label)}</span>`;
      }
      if (unit) {
        breadcrumb += `<span class="sep">/</span><span>${escapeHtml(unit.name)}</span>`;
      }
      breadcrumb += `
        <span class="sep">/</span>
        <span>${escapeHtml(topic.name)}</span>
        <span class="sep">/</span>
        <span class="current">${escapeHtml(L.title)}</span>
        ${isActivity ? '<span class="status-pill" style="background: rgba(163,113,247,0.15); color: #A371F7; border: 1px solid rgba(163,113,247,0.3); margin-left: 6px;">Activity</span>' : ''}
        <span class="status-pill ${L.status || 'draft'}" id="lessonStatusPill">${L.status === 'published' ? 'Published' : 'Draft'}</span>`;
    }

    $('main').innerHTML = `
      <div class="topbar">
        <div class="crumbs">
          ${breadcrumb}
        </div>
        <div class="right">
          <button class="btn-ghost" id="previewBtn">Preview</button>
          <button class="btn-primary" id="saveBlocksBtn">${isActivity ? 'Save details' : 'Save blocks'}</button>
        </div>
      </div>
      <div class="editor">
        <div class="editor-meta" ${isActivity ? 'style="grid-template-columns: 1fr 100px 100px 100px;"' : ''}>
          <div class="form-row" style="margin: 0;">
            <label>Lesson title</label>
            <input id="lessonTitle" value="${escapeHtml(L.title)}" />
          </div>
          <div class="form-row" style="margin: 0;">
            <label>Duration (min)</label>
            <input id="lessonDuration" type="number" min="1" max="600" value="${L.duration_min ?? 20}" />
          </div>
          ${isActivity ? `
            <div class="form-row" style="margin: 0;">
              <label>Frame height (px)</label>
              <input id="lessonActivityHeight" type="number" min="200" max="2000" value="${L.activity_height ?? 720}" />
            </div>
            <div class="form-row" style="margin: 0; display: flex; align-items: flex-end; gap: 8px;">
              <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12.5px; color: var(--text-2);">
                <input id="lessonActivityRequired" type="checkbox" ${L.activity_required === false ? '' : 'checked'} />
                Required to complete
              </label>
            </div>
          ` : `
            <div class="form-row" style="margin: 0;">
              <label>Order</label>
              <input id="lessonOrder" type="number" value="${L.order_index ?? 0}" />
            </div>
          `}
          ${isGeneral ? `
            <div class="form-row" style="margin: 0; grid-column: 1 / -1;">
              <label>Tags <span style="color: var(--text-4); font-weight: 400; font-size: 12px;">comma-separated — these are how students find this lesson</span></label>
              <input id="lessonTags" value="${escapeHtml((L.tags || []).join(', '))}" placeholder="algebra, gcse-foundation" />
            </div>
          ` : ''}
        </div>
        <div class="editor-actions">
          <span class="${state.dirty ? 'dirty' : 'saved'}">${state.dirty ? '● Unsaved changes' : '✓ All saved'}</span>
          ${L.code ? `
            <span class="code-chip" title="Share this code to give anyone a direct link to the lesson">
              <span style="color: var(--text-4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;">Code</span>
              <code style="font-family: var(--font-mono); font-size: 13px; color: var(--text); letter-spacing: 0.05em;">${escapeHtml(L.code)}</code>
              <button class="row-btn" id="copyCodeBtn" title="Copy link">⧉ Copy</button>
              <a class="row-btn" id="openCodeLink" target="_blank" rel="noopener" href="lesson.html?code=${encodeURIComponent(L.code)}" title="Open as a student">↗ Open</a>
            </span>
          ` : ''}
          <span class="spacer"></span>
          <span class="shortcuts"><kbd>⌘S</kbd> save${isActivity ? '' : ' · <kbd>⌘Z</kbd> undo block'}</span>
          ${state.canPublish ? `
            <button class="btn-ghost" id="publishBtn" data-publishing="${L.status === 'published' ? 'true' : 'false'}">
              ${L.status === 'published' ? 'Unpublish' : 'Publish'}
            </button>
          ` : ''}
          <button class="btn-ghost" id="saveMetaBtn">Save lesson details</button>
        </div>
        ${isActivity
          ? '<div id="activityEditor"></div>'
          : '<div class="blocks" id="blocksList"></div><div class="block-add" id="blockPicker"></div>'}
      </div>
    `;
    if (isActivity) {
      renderActivityEditor(L);
    } else {
      renderBlocksList();
      renderBlockPicker();
    }

    document.getElementById('previewBtn').addEventListener('click', openPreview);
    document.getElementById('saveMetaBtn').addEventListener('click', saveLessonMeta);
    document.getElementById('saveBlocksBtn').addEventListener('click', () => {
      // For activity lessons, the only thing to "save" is the lesson
      // meta (the file is uploaded on replace). For block lessons this
      // button is wired to saveBlocks().
      if (isActivity) saveLessonMeta();
      else saveBlocks();
    });
    // Copy-code: just puts the share URL on the clipboard. Plain
    // navigator.clipboard would also work but falls back to nothing
    // on insecure contexts; execCommand is older but works everywhere.
    const copyBtn = document.getElementById('copyCodeBtn');
    if (copyBtn && L.code) {
      copyBtn.addEventListener('click', () => {
        const url = `${location.origin}/lesson.html?code=${encodeURIComponent(L.code)}`;
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); toast('Link copied', 'success'); }
        catch (_) { toast('Copy failed — code: ' + L.code, 'error'); }
        document.body.removeChild(ta);
      });
    }
    // The publish button is only rendered for reviewers / admins, so
    // the element is optional. Wire it up if present.
    const publishBtn = document.getElementById('publishBtn');
    if (publishBtn) publishBtn.addEventListener('click', togglePublish);
    // Wire the three header inputs (title / duration / order) so they
    // write straight to the lesson object and trigger an autosave
    // (debounced). Previously these only flipped state.dirty without
    // persisting — typing a title would survive in the DOM until the
    // next renderEditor() ran, at which point the input was rebuilt
    // from the un-persisted L.title and your work vanished. Now: each
    // keystroke updates L.*, marks the lesson meta-dirty, and a
    // 800ms-debounced saveLessonMeta() pushes it to the server.
    const wireMetaInput = (id, key, parser) => {
      const el = document.getElementById(id);
      if (!el) return;
      let metaTimer = null;
      el.addEventListener('input', () => {
        const v = parser ? parser(el.value) : el.value;
        L[key] = v;
        state.dirty = true;
        state.metaDirty = true;
        renderEditorHeader();
        clearTimeout(metaTimer);
        metaTimer = setTimeout(() => {
          if (state.currentLesson === L) saveLessonMeta({ silent: true });
        }, 800);
      });
    };
    wireMetaInput('lessonTitle',    'title',        v => v);
    wireMetaInput('lessonDuration', 'duration_min', v => parseInt(v, 10) || 20);
    if (isActivity) {
      // Activity lessons use activity_height in place of order_index.
      // Required is a checkbox, not a text input — we use 'change' so
      // a single click triggers a debounced save.
      const heightEl = document.getElementById('lessonActivityHeight');
      if (heightEl) wireMetaInput('lessonActivityHeight', 'activity_height', v => Math.max(200, Math.min(2000, parseInt(v, 10) || 720)));
      const reqEl = document.getElementById('lessonActivityRequired');
      if (reqEl) {
        let metaTimer = null;
        reqEl.addEventListener('change', () => {
          L.activity_required = !!reqEl.checked;
          state.dirty = true;
          state.metaDirty = true;
          renderEditorHeader();
          clearTimeout(metaTimer);
          metaTimer = setTimeout(() => {
            if (state.currentLesson === L) saveLessonMeta({ silent: true });
          }, 800);
        });
      }
    } else {
      wireMetaInput('lessonOrder',    'order_index',  v => parseInt(v, 10) || 0);
    }
    // Tags is a string in the input but an array in L.tags. The parser
    // does the comma-split + trim + lowercase. Only present for
    // general lessons.
    if (L.is_general && document.getElementById('lessonTags')) {
      wireMetaInput('lessonTags', 'tags', v =>
        v.split(',').map(s => s.trim().toLowerCase()).filter(Boolean)
      );
    }
  }

  // renderActivityEditor(L) — the editor body for activity lessons.
  // Shows a live iframe preview of the file in the lesson-activities
  // bucket, a "Replace HTML" button that upserts the file, and a small
  // status footer. The form (title / duration / height / required) is
  // rendered by renderEditor() above; this function only paints the
  // iframe + replace control.
  function renderActivityEditor(L) {
    const wrap = document.getElementById('activityEditor');
    if (!wrap) return;
    if (!L.activity_path) {
      // No file uploaded yet (e.g. an activity lesson whose upload
      // failed mid-create). Show a one-shot upload prompt.
      wrap.innerHTML = `
        <div class="block" style="background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 24px; text-align: center;">
          <p style="margin: 0 0 12px; color: var(--text-3); font-size: 13px;">This activity has no HTML file yet. Upload one to make it visible to students.</p>
          <button class="btn-primary" id="activityUploadBtn">Upload HTML</button>
          <input type="file" id="activityReplaceFile" accept="text/html,.html,.htm" hidden />
        </div>
      `;
      const btn = document.getElementById('activityUploadBtn');
      const input = document.getElementById('activityReplaceFile');
      btn?.addEventListener('click', () => input?.click());
      input?.addEventListener('change', () => window.handleActivityFileReplace(L, input));
      return;
    }
    const pub = supabaseClient.storage.from('lesson-activities').getPublicUrl(L.activity_path).data?.publicUrl || '';
    // Cache-bust on every render so a fresh upload shows up immediately.
    const cacheBuster = `v=${Date.now()}`;
    const src = pub ? `${pub}${pub.includes('?') ? '&' : '?'}${cacheBuster}` : '';
    wrap.innerHTML = `
      <div class="block" style="background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden;">
        <div class="block-head">
          <span class="kind-label">ACTIVITY FILE</span>
          <span class="spacer"></span>
          <button class="btn-ghost" id="activityReplaceBtn">Replace HTML</button>
          <input type="file" id="activityReplaceFile" accept="text/html,.html,.htm" hidden />
        </div>
        <div class="block-body" style="padding: 0; background: var(--bg);">
          ${src
            ? `<iframe id="activityPreview" src="${escapeHtml(src)}" sandbox="allow-scripts" style="width: 100%; height: ${L.activity_height || 720}px; border: 0; display: block; background: #fff;" title="Activity preview"></iframe>`
            : `<div style="padding: 24px; text-align: center; color: var(--red); font-size: 13px;">Storage path "${escapeHtml(L.activity_path)}" produced no public URL. Check the lesson-activities bucket.</div>`}
        </div>
        <div style="padding: 10px 14px; border-top: 1px solid var(--line); font-size: 11.5px; color: var(--text-4); display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <span>Path: <code style="font-family: var(--font-mono); color: var(--text-2);">${escapeHtml(L.activity_path)}</code></span>
          <span style="color: var(--text-4);">·</span>
          <span>Bucket: <code style="font-family: var(--font-mono); color: var(--text-2);">lesson-activities</code></span>
          <span style="color: var(--text-4);">·</span>
          <span>Public read · staff write</span>
        </div>
      </div>
    `;
    const btn = document.getElementById('activityReplaceBtn');
    const input = document.getElementById('activityReplaceFile');
    btn?.addEventListener('click', () => input?.click());
    input?.addEventListener('change', () => window.handleActivityFileReplace(L, input));
    // Fade the activity card up so it doesn't just snap into place
    // after a replace — feels like the preview is fresh, not stale.
    const card = wrap.querySelector('.block');
    if (card) fx.fadeUp(card);
  }

  // handleActivityFileReplace(L, fileInput) — upload a new HTML file
  // to the lesson-activities bucket at the lesson's path, then refresh
  // the preview. Path is always activities/<id>/index.html so the
  // public URL is stable; we just bump a cache-buster on the iframe.
  window.handleActivityFileReplace = async (L, fileInput) => {
    const file = fileInput?.files?.[0];
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) { toast('Activity file too large (max 8 MB).', 'error'); fileInput.value = ''; return; }
    if (!L.activity_path) {
      // No path yet (the "no file uploaded" state) — assign one and
      // persist, mirroring the create flow.
      L.activity_path = `activities/${L.id}/index.html`;
    }
    const btn = document.getElementById('activityReplaceBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Uploading…'; }
    const { error } = await supabaseClient.storage
      .from('lesson-activities')
      .upload(L.activity_path, file, { upsert: true, contentType: 'text/html', cacheControl: '3600' });
    if (btn) { btn.disabled = false; btn.textContent = 'Replace HTML'; }
    if (error) { toast('Upload failed: ' + error.message, 'error'); fileInput.value = ''; return; }
    // Persist activity_path in case we just assigned it.
    if (L.activity_path) {
      await supabaseClient.from('lessons').update({ activity_path: L.activity_path }).eq('id', L.id);
    }
    toast('Activity file uploaded', 'success');
    fileInput.value = '';
    // Pop the upload button to confirm the upload landed; the
    // renderActivityEditor call below re-fades the preview card up.
    if (btn) fx.pop(btn);
    renderActivityEditor(L);
  };

  // Publish / unpublish. The publish_lesson RPC is SECURITY DEFINER
  // and refuses to run for users whose role isn't reviewer / admin.
  // The button is only visible to those users, but a curious author
  // who hand-crafts the RPC call still gets denied on the server.
  async function togglePublish() {
    const L = state.currentLesson;
    if (!L) return;
    const btn = document.getElementById('publishBtn');
    if (!btn) return;
    const wasPublished = L.status === 'published';
    const wantPublish = !wasPublished;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = wantPublish ? 'Publishing…' : 'Unpublishing…';
    try {
      const { data, error } = await supabaseClient.rpc('publish_lesson', {
        p_lesson_id: L.id, p_publish: wantPublish,
      });
      if (error) {
        toast('Publish failed: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = original;
        return;
      }
      if (data && data.ok === false) {
        toast('Publish failed: ' + (data.reason || 'unknown'), 'error');
        btn.disabled = false;
        btn.textContent = original;
        return;
      }
      L.status = wantPublish ? 'published' : 'draft';
      L.published_at = wantPublish ? new Date().toISOString() : null;
      // The publish_lesson RPC generates a 5-char share code on the
      // first publish and returns it. Stash it on L so the code chip
      // in the editor can render. On re-publish the existing code is
      // returned too — we update unconditionally.
      if (data && data.code) L.code = data.code;
      // Pulse the publish button so the user sees the event land,
      // then render the editor (which will swap the button to its
      // post-publish state). The button gets a brief pop that draws
      // the eye to the area where the share code pill will appear.
      fx.pop(btn);
      toast(wantPublish
        ? (L.code ? `Lesson published · code ${L.code}` : 'Lesson published')
        : 'Lesson unpublished', 'success');
      // Re-render the editor so the pill + button text + code chip update.
      renderEditor();
      // The status pill in the breadcrumb (rendered by renderEditor)
      // gets a green/red glow so the state change is visible.
      const pill = document.querySelector('.status-pill, [class*="status"]');
      if (pill) fx.glow(pill);
      // Refresh the catalog so the new code shows next to the title in
      // the left rail.
      await loadTree();
    } catch (err) {
      toast('Publish failed: ' + (err?.message || err), 'error');
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  function renderEditorHeader() {
    const el = document.querySelector('.editor-actions .saved, .editor-actions .dirty');
    if (!el) return;
    el.className = state.dirty ? 'dirty' : 'saved';
    el.textContent = state.dirty ? '● Unsaved changes' : '✓ All saved';
  }

  async function saveLessonMeta(opts = {}) {
    const L = state.currentLesson;
    if (!L) return;
    // For activity lessons the form uses activity_height + activity_required
    // instead of order_index; the input IDs differ, so look each up
    // individually and skip the missing ones.
    const isActivity = L.kind === 'activity';
    const orderEl = document.getElementById('lessonOrder');
    const heightEl = document.getElementById('lessonActivityHeight');
    const reqEl = document.getElementById('lessonActivityRequired');
    const payload = {
      title: document.getElementById('lessonTitle').value.trim(),
      duration_min: parseInt(document.getElementById('lessonDuration').value, 10) || 20,
    };
    if (isActivity) {
      if (heightEl) payload.activity_height = Math.max(200, Math.min(2000, parseInt(heightEl.value, 10) || 720));
      if (reqEl)    payload.activity_required = !!reqEl.checked;
    } else {
      payload.order_index = parseInt(orderEl?.value, 10) || 0;
    }
    // Tags: only meaningful for general lessons (regular lessons are
    // filed under a topic, so tags would be redundant with the path).
    // The input only renders for general lessons, so the null-check
    // protects us in case the user re-saves a topic lesson later.
    const tagsEl = document.getElementById('lessonTags');
    if (L.is_general && tagsEl) {
      payload.tags = tagsEl.value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
    }
    if (!payload.title) {
      if (!opts.silent) toast('Title is required', 'error');
      return;
    }
    const { error } = await supabaseClient.from('lessons').update(payload).eq('id', L.id);
    if (error) {
      if (!opts.silent) toast('Save failed: ' + error.message, 'error');
      return;
    }
    Object.assign(L, payload);
    state.metaDirty = false;
    // dirty stays true if the blocks path still has unsaved work.
    state.dirty = state.metaDirty || isBlocksDirty();
    renderEditorHeader();
    if (!opts.silent) {
      // Manual click — refresh the catalogue tree so the new title
      // shows in the left rail. Silent/autosave skips this: reloading
      // the whole tree on every keystroke is wasteful.
      await loadTree();
      renderCatalog();
      // Glow the saved pill so the user sees the save event, not just
      // the toast. Restarts the animation in case the user saved
      // twice in a row.
      const saved = document.querySelector('.editor-actions .saved');
      if (saved) fx.glow(saved);
      toast('Lesson details saved', 'success');
    }
  }

  function renderBlocksList() {
    const list = document.getElementById('blocksList');
    if (!list) return;
    const L = state.currentLesson;
    if (!L.blocks.length) {
      list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--text-4); font-size: 13px; background: var(--bg-2); border: 1px dashed var(--line-2); border-radius: var(--r-md);">No blocks yet. Use the picker below to add the first one.</div>`;
      return;
    }
    list.innerHTML = L.blocks.map((b, i) => renderBlockEditor(b, i)).join('');
    // Stagger the fade-in for the block rows — 30ms between each one
    // so the list assembles in front of the author's eyes rather than
    // all at once. Restart-on-repeat is handled by fadeUpChildren
    // (it removes the prior class and resets the animation-delay).
    fx.fadeUpChildren(list, 30);
    // Wire interactivity for any block whose editor body includes a .preview
    // (callout, image, video, math, worked_example, reveal, flashcard, plus
    // all the new interactive practice / layout / study-aid kinds).
    list.querySelectorAll('.block').forEach((blockEl) => {
      const i = parseInt(blockEl.dataset.blockIndex, 10);
      if (isNaN(i)) return;
      const block = L.blocks[i];
      const preview = blockEl.querySelector('.preview');
      if (preview && block) bindInteractive(preview, block);
    });
    // Wire drag-to-reorder
    wireDragReorder(list);
  }

  // ---------- block picker (grouped) ----------
  const BLOCK_GROUPS = {
    'Text & structure': ['heading', 'text', 'callout', 'image', 'video', 'math', 'audio', 'divider', 'quote', 'keypoints', 'worked_example', 'reveal', 'flashcard'],
    'Interactive practice': ['mcq', 'truefalse', 'shortanswer', 'fillblank', 'match', 'ordering', 'hotspot', 'categorise', 'slider', 'dial', 'sequence', 'connect', 'pile', 'html'],
    'Layout': ['accordion', 'tabs', 'compare', 'timeline', 'steps'],
    'Study aids': ['objectives', 'prerequisites', 'glossary', 'summary', 'cardset', 'flashcard_stack', 'progress_meter', 'mindmap'],
  };

  // Some block kinds can only be added by reviewers / admins. This is a
  // UX gate (the button is disabled and tagged 🔒); the real safety is
  // the sandboxed iframe + completion contract on the renderer side, but
  // gating the author prevents a compromised staff_author account from
  // sneaking interactive content into a draft.
  const RESTRICTED_KINDS = { html: ['staff_reviewer', 'admin'] };
  function canUseKind(kind) {
    const allow = RESTRICTED_KINDS[kind];
    return !allow || allow.includes(state.role);
  }

  function renderBlockPicker() {
    const picker = document.getElementById('blockPicker');
    if (!picker) return;
    const html = Object.entries(BLOCK_GROUPS).map(([group, kinds], gi) => {
      const sep = gi > 0 ? `<span class="group-sep"></span>` : '';
      const label = `<span class="group-label">${escapeHtml(group)}</span>`;
      const btns = kinds.map(k => {
        if (!BLOCK_DEFS[k]) return '';
        const allowed = canUseKind(k);
        const onclick = allowed
          ? `onclick="addBlock('${k}')"`
          : `onclick="toast('${escapeHtml(BLOCK_DEFS[k].label)} can only be added by reviewers and admins.', 'error'); return false;"`;
        const dis = allowed ? '' : 'disabled';
        const lock = allowed ? '' : ' 🔒';
        const title = allowed ? escapeHtml(BLOCK_DEFS[k].label) : 'Reviewer / admin only';
        return `<button class="picker-btn" ${dis} title="${title}" ${onclick}>+ ${escapeHtml(BLOCK_DEFS[k].label)}${lock}</button>`;
      }).join('');
      return `${sep}${label}${btns}`;
    }).join('');
    const tplBtn = `<span class="group-sep"></span><span class="group-label">Templates</span><button class="picker-btn" id="tplBtn" onclick="toggleTemplatePop(event)">+ From template…</button>`;
    picker.innerHTML = html + tplBtn;
  }

  // ---------- template library ----------
  const TEMPLATES = {
    'mcq-photosynthesis': {
      label: 'MCQ — photosynthesis',
      hint:  'A 4-option MCQ about photosynthesis.',
      blocks: () => [{ kind: 'mcq', data: BLOCK_DEFS.mcq.defaults() }]
    },
    'denary-binary': {
      label: 'Denary → binary — 173',
      hint:  'Convert denary 173 to an 8-bit binary number.',
      blocks: () => [{ kind: 'denary_binary', data: BLOCK_DEFS.denary_binary.defaults() }]
    },
    'worked-quadratic': {
      label: 'Worked example — quadratic equation',
      hint:  'A step-by-step worked example for (x+3)(x-2)=0.',
      blocks: () => [{
        kind: 'worked_example',
        data: {
          question: 'Solve (x + 3)(x − 2) = 0.',
          steps: [
            { label: 'Step 1', body: 'A product is zero when at least one of its factors is zero.' },
            { label: 'Step 2', body: 'Set **x + 3 = 0** and **x − 2 = 0**.' },
            { label: 'Step 3', body: 'Solve each linear equation.' }
          ],
          answer: 'x = −3 or x = 2'
        }
      }]
    },
    'reveal-key-terms-biology': {
      label: 'Reveal — key terms (biology)',
      hint:  '5 reveal blocks with cell-biology terms.',
      blocks: () => {
        const terms = [
          ['Mitochondrion', 'The site of aerobic respiration in eukaryotic cells.'],
          ['Ribosome',       'The site of protein synthesis; found free in the cytoplasm and on the rough ER.'],
          ['Nucleus',        'Contains the cell\'s DNA and controls its activities.'],
          ['Cell membrane',  'A phospholipid bilayer that controls what enters and leaves the cell.'],
          ['Chloroplast',    'The site of photosynthesis in plant cells.']
        ];
        return terms.map(([prompt, explanation]) => ({ kind: 'reveal', data: { prompt, explanation } }));
      }
    },
    'compare-mitosis-meiosis': {
      label: 'Comparison — mitosis vs meiosis',
      hint:  'A side-by-side compare block.',
      blocks: () => [{
        kind: 'compare',
        data: BLOCK_DEFS.compare.defaults()
      }]
    },
    'timeline-wwii': {
      label: 'Timeline — World War II',
      hint:  '4 dated events on a vertical timeline.',
      blocks: () => [{
        kind: 'timeline',
        data: {
          items: [
            { date: '1939', title: 'War begins', markdown: 'Germany invades Poland; Britain and France declare war.' },
            { date: '1941', title: 'Operation Barbarossa', markdown: 'Germany invades the Soviet Union.' },
            { date: '1944', title: 'D-Day', markdown: 'Allied forces land on the beaches of Normandy.' },
            { date: '1945', title: 'War ends', markdown: 'Germany surrenders in May; Japan in September after the atomic bombings.' }
          ]
        }
      }]
    },
    'glossary-atomic-structure': {
      label: 'Glossary — atomic structure',
      hint:  '5 glossary entries.',
      blocks: () => [{
        kind: 'glossary',
        data: {
          items: [
            { term: 'Proton', definition: 'A positively charged particle in the nucleus.' },
            { term: 'Neutron', definition: 'A neutral particle in the nucleus.' },
            { term: 'Electron', definition: 'A negatively charged particle orbiting the nucleus.' },
            { term: 'Atomic number', definition: 'The number of protons in the nucleus.' },
            { term: 'Mass number', definition: 'The total number of protons and neutrons in the nucleus.' }
          ]
        }
      }]
    }
  };

  function toggleTemplatePop(e) {
    e.stopPropagation();
    const existing = document.getElementById('tplPop');
    if (existing) { existing.remove(); return; }
    const pop = document.createElement('div');
    pop.id = 'tplPop';
    pop.className = 'tpl-pop';
    pop.style.top = (e.target.getBoundingClientRect().bottom + window.scrollY + 4) + 'px';
    pop.style.left = Math.min(window.innerWidth - 360, e.target.getBoundingClientRect().left + window.scrollX) + 'px';
    pop.innerHTML = `
      <div class="tpl-head">Insert from template</div>
      ${Object.entries(TEMPLATES).map(([id, t]) => `
        <button class="tpl-item" onclick="applyTemplate('${id}')">
          ${escapeHtml(t.label)}
          <span class="tpl-meta">${escapeHtml(t.hint || '')}</span>
        </button>
      `).join('')}
    `;
    document.body.appendChild(pop);
    const closer = (ev) => {
      if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', closer); }
    };
    setTimeout(() => document.addEventListener('click', closer), 0);
  }
  window.applyTemplate = (id) => {
    const t = TEMPLATES[id];
    if (!t) return;
    if (!state.currentLesson) { toast('Open a lesson first', 'error'); return; }
    const blocks = t.blocks();
    state.currentLesson.blocks.push(...blocks);
    state.dirty = true;
    renderBlocksList();
    renderEditorHeader();
    document.getElementById('tplPop')?.remove();
    toast(`Inserted ${blocks.length} block${blocks.length === 1 ? '' : 's'} from template`, 'success');
  };

  function renderBlockEditor(b, i) {
    const def = BLOCK_DEFS[b.kind];
    const label = def ? def.label : b.kind;
    const isFirst = i === 0;
    const isLast  = i === state.currentLesson.blocks.length - 1;
    return `
      <div class="block" data-block-id="${b.id || ''}" data-block-index="${i}" draggable="true">
        <div class="block-head">
          <span class="grip" style="color:var(--text-4);cursor:grab;padding:0 4px;font-size:12px;user-select:none;" title="Drag to reorder">⋮⋮</span>
          <span class="kind-label">${escapeHtml(label)}</span>
          <span style="color: var(--text-4);">#${i + 1}</span>
          <span class="spacer"></span>
          <button class="icon-btn" title="Move up"   ${isFirst ? 'disabled' : ''} onclick="moveBlock(${i}, -1)">▲</button>
          <button class="icon-btn" title="Move down" ${isLast  ? 'disabled' : ''} onclick="moveBlock(${i}, +1)">▼</button>
          <button class="icon-btn" title="Duplicate" onclick="duplicateBlock(${i})">⎘</button>
          ${b.kind === 'html' ? `<button class="icon-btn" title="HTML block settings" onclick="openHtmlBlockSettings(${i})">⚙</button>` : ''}
          <button class="icon-btn danger" title="Delete" onclick="deleteBlock(${i})">✕</button>

        </div>
      </div>
    `;
  }

  // ============================================================
  // EDITOR HELPERS for the new kinds. Each helper writes a control
  // panel on the left and a live preview on the right, mirroring
  // the pattern in the existing two-col editors.

  // Generic helper: render the small "list of {label, fields...}" editor
  // used by accordion, tabs, timeline, objectives, glossary, etc.
  function editorList(i, items, columns, rowHtml, onAdd) {
    return `
      <div class="repeater">

  // ----- MCQ editor -----
  function renderMCQEditor(b, i) {
    const opts = b.data.options || [];
    return `
      <div class="form-row">

      </div>
      <div class="form-row">
        <label>Options</label>
        <div class="repeater">
          ${opts.map((o, j) => `
            <div class="opt-row">
              <button type="button" class="correct-mark ${o.correct ? 'on' : ''}" onclick="toggleMCQCorrect(${i}, ${j})" title="Mark correct">${o.correct ? '✓' : ''}</button>
              <input type="text" value="${escapeHtml(o.text||'')}" oninput="updateMCQOpt(${i}, ${j}, 'text', this.value)" placeholder="Option text" />
              <input type="text" class="fb-input" value="${escapeHtml(o.feedback||'')}" oninput="updateMCQOpt(${i}, ${j}, 'feedback', this.value)" placeholder="Why this is right/wrong" />
              <button class="del" onclick="removeMCQOpt(${i}, ${j})">✕</button>

        </div>

      <div class="form-row">
        <label>Explanation (shown after checking)</label>
        <textarea oninput="updateBlock(${i}, {explanation: this.value})">${escapeHtml(b.data.explanation || '')}</textarea>

      <div class="form-row inline">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" ${b.data.required ? 'checked' : ''} onchange="updateBlock(${i}, {required: this.checked})" />
          Required — student must attempt before marking lesson done
        </label>
        <label style="display:flex;align-items:center;gap:6px;margin-left:12px;">
          <input type="checkbox" ${b.data.allowRetry !== false ? 'checked' : ''} onchange="updateBlock(${i}, {allowRetry: this.checked})" />
          Allow retry
        </label>
      </div>
      <div class="form-row" style="margin: 0;">
        <label>Preview (click options, then Check)</label>
        <div class="preview">${renderBlock(b)}</div>
      </div>
    `;
  }
  window.toggleMCQCorrect = (i, j) => {
    const data = state.currentLesson.blocks[i].data;
    const opts = data.options || [];
    if (!opts[j]) return;
    opts[j].correct = !opts[j].correct;
    // If single-answer, ensure only one is correct
    if (!data.multi) opts.forEach((o, k) => { if (k !== j) o.correct = false; });
    state.dirty = true; renderBlocksList();
  };
  window.updateMCQOpt = (i, j, field, val) => {
    const opts = state.currentLesson.blocks[i].data.options || [];
    if (!opts[j]) opts[j] = { text: '', correct: false, feedback: '' };
    opts[j][field] = val;
    state.dirty = true; renderEditorHeader();
  };
  window.addMCQOpt = (i) => {
    if (!state.currentLesson.blocks[i].data.options) state.currentLesson.blocks[i].data.options = [];
    state.currentLesson.blocks[i].data.options.push({ text: '', correct: false, feedback: '' });
    renderBlocksList();
  };
  window.removeMCQOpt = (i, j) => {
    state.currentLesson.blocks[i].data.options.splice(j, 1);
    renderBlocksList();
  };

  // ----- Fill-in-the-blank editor -----
  function renderFBEditor(b, i) {
    const blanks = b.data.blanks || [];
    return `
      <div class="form-row">
        <label>Sentence (use <code>___</code> for each blank)</label>
        <textarea oninput="updateFBText(${i}, this.value)">${escapeHtml(b.data.text || '')}</textarea>
      </div>
      <div class="form-row">
        <label>Answers (in order)</label>
        <div class="repeater">
          ${blanks.map((bl, j) => `
            <div class="fb-line">
              <div class="fb-head">
                <code>blank ${j + 1}</code>
                <input type="text" value="${escapeHtml(bl.answer || '')}" oninput="updateFBBlank(${i}, ${j}, this.value)" placeholder="Answer" />
                <button class="del" onclick="removeFBBlank(${i}, ${j})">✕</button>
              </div>
            </div>
          `).join('')}
          <button class="add" onclick="addFBBlank(${i})">+ Add blank</button>
        </div>
        <span class="hint">The number of <code>___</code> placeholders in the sentence should match the number of answers. Use the Sync button if they differ.</span>
      </div>
      <div class="form-row">
        <button class="btn-ghost" onclick="syncFBBlanks(${i})">Sync blanks to text</button>
      </div>
      <div class="form-row">
        <label>Explanation (shown after checking)</label>
        <textarea oninput="updateBlock(${i}, {explanation: this.value})">${escapeHtml(b.data.explanation || '')}</textarea>
      </div>
      <div class="form-row inline">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" ${b.data.required ? 'checked' : ''} onchange="updateBlock(${i}, {required: this.checked})" />
          Required — student must attempt before marking lesson done
        </label>
        <label style="display:flex;align-items:center;gap:6px;margin-left:12px;">
          <input type="checkbox" ${b.data.allowRetry !== false ? 'checked' : ''} onchange="updateBlock(${i}, {allowRetry: this.checked})" />
          Allow retry
        </label>
      </div>
      <div class="form-row" style="margin: 0;">
        <label>Preview</label>
        <div class="preview">${renderBlock(b)}</div>
      </div>
    `;
  }
  window.updateFBText = (i, val) => {
    const data = state.currentLesson.blocks[i].data;
    data.text = val;
    // Auto-extend/trim blanks array to match ___ count
    const count = (val.match(/___/g) || []).length;
    if (!data.blanks) data.blanks = [];
    while (data.blanks.length < count) data.blanks.push({ answer: '' });
    if (data.blanks.length > count) data.blanks.length = count;
    state.dirty = true; renderEditorHeader();
    // Re-render just the blanks list inside this block
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    if (!block) return;
    const preview = block.querySelector('.preview');
    if (preview) {
      preview.innerHTML = renderBlock(state.currentLesson.blocks[i]);
      bindInteractive(preview, state.currentLesson.blocks[i]);
    }
  };
  window.updateFBBlank = (i, j, val) => {
    const data = state.currentLesson.blocks[i].data;
    if (!data.blanks[j]) data.blanks[j] = { answer: '' };
    data.blanks[j].answer = val;
    state.dirty = true; renderEditorHeader();
  };
  window.addFBBlank = (i) => {
    const data = state.currentLesson.blocks[i].data;
    if (!data.blanks) data.blanks = [];
    data.blanks.push({ answer: '' });
    // Also add a ___ placeholder at the end
    data.text = (data.text || '') + ' ___';
    renderBlocksList();
  };
  window.removeFBBlank = (i, j) => {
    const data = state.currentLesson.blocks[i].data;
    data.blanks.splice(j, 1);
    // Remove the n-th ___ occurrence
    const parts = (data.text || '').split('___');
    if (parts.length > 1) {
      parts.splice(j, 1);
      data.text = parts.join('___');
    }
    renderBlocksList();
  };
  window.syncFBBlanks = (i) => {
    const data = state.currentLesson.blocks[i].data;
    const count = ((data.text || '').match(/___/g) || []).length;
    if (!data.blanks) data.blanks = [];
    while (data.blanks.length < count) data.blanks.push({ answer: '' });
    if (data.blanks.length > count) data.blanks.length = count;
    renderBlocksList();
  };

  // ----- Denary → binary editor -----
  // The denary value is clamped to [0, 2^bitWidth - 1] so it always
  // fits in the visible bit row. Bit width is clamped to [1, 16]. When
  // bitWidth changes we also re-clamp the denary value so the two stay
  // consistent. After every edit we refresh the preview only — the
  // surrounding inputs keep their focus so the author can type freely.
  function renderDenaryBinaryEditor(b, i) {
    const d = b.data || {};
    return `
      <div class="form-row">
        <label>Prompt</label>
        <input value="${escapeHtml(d.prompt || '')}" oninput="updateBlock(${i}, {prompt: this.value})" placeholder="Convert the following denary number to binary." />
      </div>
      <div class="two-col">
        <div class="form-row" style="margin: 0;">
          <label>Denary value</label>
          <input id="db-denary-${i}" type="number" min="0" step="1" value="${Number.isFinite(parseInt(d.denary, 10)) ? parseInt(d.denary, 10) : 0}" oninput="updateDenaryValue(${i}, this.value)" />
          <span class="hint" id="db-denary-hint-${i}"></span>
        </div>
        <div class="form-row" style="margin: 0;">
          <label>Bit width (1–16)</label>

  // updateDenaryValue — clamp the denary value into [0, 2^bitWidth - 1]
  // and refresh the preview only. The surrounding inputs keep focus.
  window.updateDenaryValue = (i, raw) => {
    const data = state.currentLesson.blocks[i].data || {};
    const bitWidth = Math.max(1, Math.min(16, parseInt(data.bitWidth, 10) || 8));
    const max = Math.pow(2, bitWidth) - 1;
    const parsed = parseInt(raw, 10);
    const clamped = Number.isFinite(parsed) ? Math.max(0, Math.min(max, parsed)) : 0;
    data.denary = clamped;
    state.dirty = true; renderEditorHeader();
    // Sync the input back to the clamped value (so the author sees it).
    const inp = document.getElementById(`db-denary-${i}`);
    if (inp && inp.value !== String(clamped)) inp.value = String(clamped);
    // Refresh the hint with the max range.
    const hint = document.getElementById(`db-denary-hint-${i}`);
    if (hint) hint.textContent = `0–${max}`;
    // Refresh the preview only.
    refreshDenaryBinaryPreview(i);
  };
  // updateBitWidth — clamp the bit width and re-clamp the denary value
  // to fit the new range, then refresh the preview. The hint updates too.
  window.updateBitWidth = (i, raw) => {
    const data = state.currentLesson.blocks[i].data || {};
    const parsed = parseInt(raw, 10);
    const bitWidth = Math.max(1, Math.min(16, Number.isFinite(parsed) ? parsed : 8));
    data.bitWidth = bitWidth;
    // Re-clamp denary to fit.
    const max = Math.pow(2, bitWidth) - 1;
    const den = parseInt(data.denary, 10);
    data.denary = Number.isFinite(den) ? Math.max(0, Math.min(max, den)) : 0;
    state.dirty = true; renderEditorHeader();
    // Sync both inputs.
    const bw = document.getElementById(`db-bw-${i}`);
    if (bw && bw.value !== String(bitWidth)) bw.value = String(bitWidth);
    const denaryInp = document.getElementById(`db-denary-${i}`);
    if (denaryInp) denaryInp.value = String(data.denary);
    const hint = document.getElementById(`db-denary-hint-${i}`);
    if (hint) hint.textContent = `0–${max}`;
    refreshDenaryBinaryPreview(i);
  };
  function refreshDenaryBinaryPreview(i) {
    const block = document.querySelector(`.block[data-block-index="${i}"]`);
    if (!block) return;
    const preview = block.querySelector('.preview');
    if (!preview) return;
    preview.innerHTML = renderBlock(state.currentLesson.blocks[i]);
    if (window.bindInteractive) bindInteractive(preview, state.currentLesson.blocks[i]);

  window.handleAudioUpload = async (i, fileInput) => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    if (file.size > 16 * 1024 * 1024) { toast('Audio too large (max 16 MB).', 'error'); fileInput.value = ''; return; }
    if (!state.currentLesson) { toast('Open a lesson first.', 'error'); return; }
    const ext = (file.name.split('.').pop() || 'mp3').toLowerCase().replace(/[^a-z0-9]/g, '') || 'mp3';
    const path = `lessons/${state.currentLesson.id}/${crypto.randomUUID()}.${ext}`;
    const { error } = await supabaseClient.storage
      .from('lesson-audio')
      .upload(path, file, { upsert: false, contentType: file.type });
    if (error) { toast('Upload failed: ' + error.message, 'error'); fileInput.value = ''; return; }
    const { data: pub } = supabaseClient.storage.from('lesson-audio').getPublicUrl(path);
    if (pub && pub.publicUrl) {
      state.currentLesson.blocks[i].data.url = pub.publicUrl;
      state.dirty = true;

  // ============================================================

  // block state mutations

  // ---- HTML block editor ----
  // Author can write freeform HTML / CSS / JS. The renderer builds a
  // sandboxed iframe (sandbox="allow-scripts" only) and a tiny shim wires
  // window.RecallGame.register({onComplete}) -> parent.postMessage so the
  // student's "Mark complete" can be gated on this block.
  //
  // The settings modal is a quick-access surface for the few users who
  // already know what they're doing — toggle required-completion or change
  // the iframe height without scrolling the giant code area.
  function renderHtmlEditor(b, i) {
    const d = b.data || {};
    const safe = (s) => escapeHtml(s == null ? '' : s);
    const id = `htmlb-${i}`;
    return `
      <div class="form-row">
        <label>HTML</label>

        <label>CSS <span style="color:var(--text-4); font-weight:400;">(scoped to the iframe)</span></label>

      </div>
      <div class="form-row">
        <label>JS</label>
        <textarea class="mono" rows="6" placeholder='document.getElementById("finish").onclick = function() {&#10;  parent.postMessage({ type: "recall-block-complete", score: 1, total: 1 }, "*");&#10;};' oninput="updateBlock(${i}, {js: this.value})">${safe(d.js)}</textarea>
        <div style="color:var(--text-4); font-size:11px; margin-top:4px; line-height:1.45;">
          Author's helper script: <span class="mono">window.RecallGame.register({ onComplete: function(payload) { ... } })</span>.
          On completion call <span class="mono">onComplete({ score: 1, total: 1 })</span> and the parent will be notified.
          (If you don't use the helper contract, post a message with <span class="mono">type: "recall-block-complete"</span> directly.)
        </div>
      </div>
      <div class="form-row">
        <label>Optional script import <span style="color:var(--text-4); font-weight:400;">(URL of a JS file the author hosts — e.g. an educational game library)</span></label>
        <input value="${safe(d.scriptImport)}" oninput="updateBlock(${i}, {scriptImport: this.value})" placeholder="https://example.com/my-game.js" />
      </div>
      <div class="form-row inline">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" ${d.required ? 'checked' : ''} onchange="updateBlock(${i}, {required: this.checked})" />
          Required — student must complete this before marking the lesson done
        </label>
      </div>
      <div class="form-row inline">
        <label>Iframe height (px)</label>

  // Re-render the live preview inside the html-block editor. Called from

  window.refreshHtmlPreview = (i) => {
    const wrap = document.querySelector(`#htmlb-${i}-preview`);
    if (!wrap) return;
    const b = state.currentLesson.blocks[i];
    if (!b) return;
    // Use the same renderer the student sees (lesson-render.js). The
    // renderer imports a global function in the staff page via the
    // shared <script> include at the top of the file.
    if (window.LessonRender && typeof window.LessonRender.renderBlock === 'function') {

    } else {
      wrap.innerHTML = '<p style="color: var(--text-4)">Preview unavailable.</p>';
