<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lesson creator — Recall staff</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="description" content="Author lessons for the Recall catalogue." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <style>
    :root {
      --bg:        #0D1117;
      --bg-2:      #161B22;
      --bg-3:      #1C2128;
      --bg-4:      #21262D;
      --line:      #21262D;
      --line-2:    #30363D;
      --line-3:    #484F58;
      --text:      #F0F6FC;
      --text-2:    #C9D1D9;
      --text-3:    #8B949E;
      --text-4:    #6E7681;
      --blue:      #58A6FF;
      --blue-2:    #1F6FEB;
      --blue-dim:  rgba(56,139,253,0.15);
      --blue-pale: rgba(56,139,253,0.08);
      --green:     #3FB950;
      --green-dim: rgba(63,185,80,0.12);
      --yellow:    #D29922;
      --yellow-dim:rgba(210,153,34,0.12);
      --red:       #F85149;
      --red-dim:   rgba(248,81,73,0.12);
      --purple:    #A371F7;
      --teal:      #56D4DD;
      --r-sm: 6px;
      --r-md: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------- TOP NAV ---------- */
    nav.top {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      position: sticky; top: 0; z-index: 50;
    }
    nav.top .row {
      max-width: 100%; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15px;
      color: var(--text);
    }
    .brand-mark {
      width: 26px; height: 26px;
      display: block;
      object-fit: cover;
      border-radius: var(--r-sm);
    }
    .brand .tag {
      font-size: 11px; font-weight: 600;
      background: var(--blue-dim); color: var(--blue);
      padding: 2px 8px; border-radius: 999px;
      margin-left: 6px;
      letter-spacing: 0.02em;
    }
    nav.top .right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-3); }
    /* Role pill in the top nav — same colour scheme as the
       invite-pill / role-pill elsewhere so "Author", "Reviewer",
       and "Admin" all look consistent across the project. */
    .rank-pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .rank-pill.author   { background: rgba(63,185,80,0.15);  color: #56d364; }
    .rank-pill.reviewer { background: rgba(210,153,34,0.15); color: #e3b341; }
    .rank-pill.admin    { background: rgba(248,81,73,0.15);  color: #ff7b72; }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--line-2);
      padding: 6px 12px;
      border-radius: var(--r-sm);
      font-family: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer;
    }
    .btn-ghost:hover { background: var(--bg-2); color: var(--text); }

    /* ---------- LAYOUT ---------- */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 56px);
    }

    /* ---------- SIDEBAR (tree) ---------- */
    .sidebar {
      background: var(--bg-2);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .sidebar .head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar .head h2 {
      margin: 0; font-size: 13px; font-weight: 600;
      color: var(--text); letter-spacing: 0.01em;
    }
    .sidebar .head .actions { display: flex; gap: 6px; }
    .sidebar .body {
      flex: 1; overflow-y: auto;
      padding: 8px 0 32px;
    }
    .tree-subject { border-top: 1px solid var(--line); }
    .tree-subject:first-child { border-top: 0; }
    .tree-subject-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px; font-weight: 600;
      color: var(--text);
      user-select: none;
    }
    .tree-subject-head:hover { background: var(--bg-3); }
    .tree-subject-head .caret {
      width: 12px; text-align: center;
      color: var(--text-4); font-size: 10px;
      transition: transform 0.15s ease;
    }
    .tree-subject.open .caret { transform: rotate(90deg); }
    .tree-subject-head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tree-subject-head .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-subject-head .meta { color: var(--text-4); font-size: 11px; font-weight: 500; }
    .tree-subject-head .row-btn {
      background: transparent; border: 0; color: var(--text-4);
      font-size: 14px; padding: 2px 6px; border-radius: 4px; cursor: pointer; line-height: 1;
    }
    .tree-subject-head .row-btn:hover { background: var(--bg-4); color: var(--text); }
    .tree-children { display: none; padding: 4px 0 8px 26px; }
    .tree-subject.open .tree-children { display: block; }
    .tree-topic-head {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 8px;
      font-size: 12.5px;
      color: var(--text-2); font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .tree-topic-head:hover { background: var(--bg-3); }
    .tree-topic-head .caret {
      width: 10px; text-align: center;
      color: var(--text-4); font-size: 9px;
      transition: transform 0.15s ease;
    }
    .tree-topic.open .tree-topic-head .caret { transform: rotate(90deg); }
    .tree-topic-head .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-topic-head .row-btn { background: transparent; border: 0; color: var(--text-4); font-size: 13px; padding: 1px 5px; border-radius: 4px; cursor: pointer; line-height: 1; }
    .tree-topic-head .row-btn:hover { background: var(--bg-4); color: var(--text); }
    .tree-lessons { display: none; padding: 2px 0 6px 28px; }
    .tree-topic.open .tree-lessons { display: block; }
    .tree-lesson {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px 5px 8px;
      font-size: 12.5px;
      color: var(--text-3); cursor: pointer;
      border-left: 2px solid transparent;
    }
    .tree-lesson:hover { background: var(--bg-3); color: var(--text-2); }
    .tree-lesson.active {
      background: var(--blue-pale);
      color: var(--blue); font-weight: 600;
      border-left-color: var(--blue);
    }
    .tree-lesson .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-lesson .row-btn { background: transparent; border: 0; color: var(--text-4); font-size: 12px; padding: 1px 4px; border-radius: 4px; cursor: pointer; line-height: 1; opacity: 0; }
    .tree-lesson:hover .row-btn { opacity: 1; }
    .tree-lesson .row-btn:hover { background: var(--bg-4); color: var(--text); }
    .tree-add {
      display: flex; gap: 6px; padding: 4px 14px 6px 8px;
    }
    .tree-add button {
      background: transparent; border: 0; color: var(--text-4);
      font-size: 11.5px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
      font-family: inherit;
    }
    .tree-add button:hover { background: var(--bg-3); color: var(--blue); }

    .dot.maths { background: #58A6FF; }
    .dot.eng   { background: #A371F7; }
    .dot.bio   { background: #3FB950; }
    .dot.chem  { background: #D29922; }
    .dot.phys  { background: #F85149; }
    .dot.hist  { background: #FF7B72; }
    .dot.geog  { background: #56D4DD; }
    .dot.psych { background: #BC8CFF; }

    /* ---------- CATALOG CARD GRID ---------- */
    .catalog-head {
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }
    .catalog-head .crumbs-inline {
      flex: 1; min-width: 0;
      color: var(--text-3); font-size: 12.5px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .catalog-head .crumbs-inline a { color: var(--text-3); }
    .catalog-head .crumbs-inline a:hover { color: var(--text-2); text-decoration: none; }
    .catalog-head .crumbs-inline .sep { color: var(--text-4); margin: 0 5px; }
    .catalog-head .crumbs-inline .current { color: var(--text); font-weight: 600; }
    .catalog-head .add-btn {
      background: var(--bg-3); color: var(--text-2);
      border: 1px solid var(--line-2);
      padding: 4px 9px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 11.5px; font-weight: 500;
      cursor: pointer;
    }
    .catalog-head .add-btn:hover { background: var(--bg-4); border-color: var(--line-3); color: var(--text); }
    .catalog-head .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 14px;
    }
    .catalog-card {
      background: var(--bg-3);
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      padding: 14px 12px;
      cursor: pointer;
      position: relative;
      min-height: 84px;
      display: flex; flex-direction: column; gap: 4px;
      transition: border-color 0.1s ease, background 0.1s ease;
    }
    .catalog-card:hover { border-color: var(--blue); background: var(--bg-4); }
    .catalog-card .name {
      font-weight: 600; font-size: 13.5px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .catalog-card .meta {
      color: var(--text-4); font-size: 11.5px;
    }
    .catalog-card .kebab {
      position: absolute; top: 6px; right: 6px;
      background: transparent; border: 0; color: var(--text-4);
      font-size: 14px; padding: 2px 6px; border-radius: 4px; cursor: pointer;
      line-height: 1; opacity: 0;
    }
    .catalog-card:hover .kebab { opacity: 1; }
    .catalog-card .kebab:hover { background: var(--bg-2); color: var(--text); }
    .catalog-empty {
      padding: 32px 16px; color: var(--text-4); font-size: 12.5px;
      text-align: center;
    }
    .catalog-empty button {
      margin-top: 12px;
      background: var(--bg-3); color: var(--text-2);
      border: 1px solid var(--line-2);
      padding: 6px 12px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer;
    }
    .catalog-empty button:hover { background: var(--bg-4); color: var(--text); }

    /* At the unit level we keep a compact "open topic" list under the
       breadcrumb so the right-side editor still works for topics that
       exist at the year level but don't yet live in a unit. */
    .catalog-topics {
      padding: 4px 0 12px;
      border-top: 1px solid var(--line);
      margin-top: 4px;
    }
    .catalog-topics .topic-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      font-size: 12.5px; color: var(--text-2);
      cursor: pointer;
    }
    .catalog-topics .topic-row:hover { background: var(--bg-3); color: var(--text); }
    .catalog-topics .topic-row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .catalog-topics .topic-row .row-btn {
      background: transparent; border: 0; color: var(--text-4);
      font-size: 12px; padding: 1px 4px; border-radius: 4px; cursor: pointer;
      line-height: 1; opacity: 0;
    }
    .catalog-topics .topic-row:hover .row-btn { opacity: 1; }
    .catalog-topics .topic-row .row-btn:hover { background: var(--bg-4); color: var(--text); }
    .catalog-topics .topic-row.active {
      background: var(--blue-pale);
      color: var(--blue); font-weight: 600;
      border-left: 2px solid var(--blue);
    }
    .catalog-topics .add-row {
      padding: 6px 14px;
    }
    .catalog-topics .add-row button {
      background: transparent; border: 0; color: var(--text-4);
      font-size: 11.5px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
      font-family: inherit;
    }
    .catalog-topics .add-row button:hover { background: var(--bg-3); color: var(--blue); }

    /* ---------- MAIN ---------- */
    .main {
      display: flex; flex-direction: column;
      min-width: 0;
      min-height: calc(100vh - 56px);
    }
    .main .topbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 12px;
    }
    .crumbs { color: var(--text-3); font-size: 12.5px; }
    .crumbs a { color: var(--text-3); }
    .crumbs a:hover { color: var(--text-2); text-decoration: none; }
    .crumbs .sep { color: var(--text-4); margin: 0 6px; }
    .crumbs .current { color: var(--text); font-weight: 600; }
    .status-pill {
      display: inline-block;
      margin-left: 10px;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .status-pill.draft {
      background: rgba(210, 153, 34, 0.12);
      color: #e3b341;
      border: 1px solid rgba(210, 153, 34, 0.3);
    }
    .status-pill.published {
      background: rgba(63, 185, 80, 0.12);
      color: #56d364;
      border: 1px solid rgba(63, 185, 80, 0.3);
    }
    .main .topbar .right { margin-left: auto; display: flex; gap: 8px; }

    .editor {
      flex: 1;
      padding: 24px 28px 64px;
      max-width: 920px;
      width: 100%;
    }
    .empty-state {
      flex: 1;
      display: grid; place-items: center;
      text-align: center;
      padding: 60px 24px;
      color: var(--text-3);
    }
    .empty-state h2 {
      font-size: 20px; font-weight: 600;
      color: var(--text); margin: 0 0 6px;
    }
    .empty-state p { margin: 0 0 18px; max-width: 44ch; }
    .empty-state .actions { display: flex; gap: 8px; justify-content: center; }

    .gate {
      max-width: 520px;
      margin: 80px auto;
      padding: 32px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      text-align: center;
    }
    .gate h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    .gate p { color: var(--text-2); margin: 0 0 18px; }
    .gate .muted { color: var(--text-4); font-size: 12px; }

    /* ---------- BUTTONS ---------- */
    .btn-primary {
      background: var(--blue); color: #fff;
      padding: 8px 14px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 13px; font-weight: 600;
      border: 1px solid var(--blue);
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--blue-2); border-color: var(--blue-2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--bg-3); color: var(--text);
      border: 1px solid var(--line-2);
      padding: 7px 12px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer;
    }
    .btn-secondary:hover { background: var(--bg-4); border-color: var(--line-3); }
    .btn-danger {
      background: transparent; color: var(--red);
      border: 1px solid rgba(248,81,73,0.3);
      padding: 7px 12px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer;
    }
    .btn-danger:hover { background: var(--red-dim); border-color: var(--red); }
    .btn-link {
      background: transparent; border: 0; color: var(--blue);
      font-family: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer; padding: 4px 6px;
    }
    .btn-link:hover { text-decoration: underline; }

    /* ---------- FORMS ---------- */
    .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-row label {
      font-size: 12.5px; font-weight: 500;
      color: var(--text-2);
    }
    .form-row .hint { font-size: 11.5px; color: var(--text-4); }
    .form-row input, .form-row select, .form-row textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 8px 11px;
      font-family: inherit; font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-row select { appearance: none; -webkit-appearance: none; cursor: pointer;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%238B949E' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat; background-position: right 10px center;
      padding-right: 28px;
    }
    .form-row textarea { resize: vertical; min-height: 80px; line-height: 1.5; font-family: inherit; }
    .form-row textarea.mono { font-family: 'JetBrains Mono', ui-monospace, Consolas, monospace; font-size: 12.5px; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-pale);
    }
    .form-row input::placeholder, .form-row textarea::placeholder { color: var(--text-4); }
    .form-row.inline { flex-direction: row; align-items: center; gap: 10px; }
    .form-row.inline > label { margin: 0; }
    .form-row.inline input, .form-row.inline select { flex: 1; }

    /* ---------- EDITOR HEADER ---------- */
    .editor-meta {
      display: grid; grid-template-columns: 1fr 100px 80px;
      gap: 12px;
      margin-bottom: 20px;
    }
    .editor-actions {
      display: flex; gap: 8px; align-items: center;
      margin: 0 0 16px;
    }
    .editor-actions .spacer { flex: 1; }
    .editor-actions .dirty {
      font-size: 12px; color: var(--yellow);
    }
    .editor-actions .saved {
      font-size: 12px; color: var(--green);
    }

    /* ---------- BLOCKS ---------- */
    .blocks { display: flex; flex-direction: column; gap: 14px; }
    .block {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .block-head {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--line);
      font-size: 11.5px; color: var(--text-3);
    }
    .block-head .kind-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-2);
      font-size: 10.5px;
    }
    .block-head .spacer { flex: 1; }
    .block-head .icon-btn {
      background: transparent; border: 0; color: var(--text-4);
      width: 24px; height: 24px;
      display: grid; place-items: center;
      border-radius: 4px; cursor: pointer; font-size: 12px;
      line-height: 1;
    }
    .block-head .icon-btn:hover { background: var(--bg-4); color: var(--text); }
    .block-head .icon-btn.danger:hover { background: var(--red-dim); color: var(--red); }
    .block-head .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .block-body { padding: 14px; }

    .block-add {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 6px;
    }
    .block-add .picker-btn {
      background: var(--bg-2);
      border: 1px dashed var(--line-3);
      color: var(--text-2);
      padding: 6px 10px;
      border-radius: var(--r-sm);
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer;
    }
    .block-add .picker-btn:hover { background: var(--bg-3); border-color: var(--blue); color: var(--blue); }

    /* ---------- BLOCK-SPECIFIC EDITORS ---------- */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .preview {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-2);
      min-height: 80px;
      overflow: auto;
    }
    .preview h2 { font-size: 18px; font-weight: 600; margin: 0 0 6px; color: var(--text); }
    .preview h3 { font-size: 15px; font-weight: 600; margin: 0 0 6px; color: var(--text); }
    .preview p  { margin: 0 0 8px; }
    .preview ul, .preview ol { margin: 0 0 8px 18px; }
    .preview blockquote {
      border-left: 3px solid var(--line-3);
      margin: 0 0 8px; padding: 4px 12px;
      color: var(--text-3); font-style: italic;
    }
    .preview code {
      background: var(--bg-3); padding: 1px 5px; border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .preview pre {
      background: var(--bg-3); padding: 10px 12px; border-radius: var(--r-sm);
      overflow: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .preview img { max-width: 100%; border-radius: var(--r-sm); display: block; }

    .preview figcaption { font-size: 12px; color: var(--text-3); margin-top: 6px; text-align: center; }
    .preview .callout {

      margin: 0 0 8px;
    }
    .preview .callout.tip       { background: var(--green-dim);  border-left: 3px solid var(--green); }
    .preview .callout.warning   { background: var(--yellow-dim); border-left: 3px solid var(--yellow); }
    .preview .callout.definition{ background: var(--blue-pale);  border-left: 3px solid var(--blue); }
    .preview .callout .icon { font-size: 16px; line-height: 1; }
    .preview .callout .body { flex: 1; }
    .preview .callout .body p:last-child { margin: 0; }
    .preview .video-frame {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      background: var(--bg-3); border-radius: var(--r-sm);
    }
    .preview .video-frame iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }
    .preview .keypoints {
      background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--r-sm);
      padding: 12px 14px;
    }
    .preview .keypoints ul { margin: 0; padding-left: 18px; }
    .preview .worked { display: flex; flex-direction: column; gap: 8px; }
    .preview .worked .q {
      background: var(--blue-pale); border-left: 3px solid var(--blue);
      padding: 8px 12px; border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-weight: 500; color: var(--text);
    }
    .preview .worked .step {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 8px 10px;
    }
    .preview .worked .step b { color: var(--text-2); }
    .preview .worked .ans {
      background: var(--green-dim); border-left: 3px solid var(--green);
      padding: 8px 12px; border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .preview .reveal {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 10px 12px;
    }
    .preview .reveal .prompt { font-weight: 500; color: var(--text); }
    .preview .reveal .answer {
      display: none; margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--line-2);
      color: var(--text-2);
    }
    .preview .reveal.open .answer { display: block; }
    .preview .reveal .toggle {
      background: transparent; border: 0; color: var(--blue);
      font-family: inherit; font-size: 11.5px; cursor: pointer; padding: 4px 0;
    }
    .preview .flashcard {
      perspective: 800px; height: 120px; cursor: pointer;
    }
    .preview .flashcard-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.5s; transform-style: preserve-3d;
    }
    .preview .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .preview .flashcard-face {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      backface-visibility: hidden;
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm);
      display: grid; place-items: center; text-align: center; padding: 14px;
    }
    .preview .flashcard-back { transform: rotateY(180deg); background: var(--blue-pale); border-color: var(--blue); }
    .preview .math-inline { background: var(--bg-3); padding: 2px 4px; border-radius: 3px; }
    .preview .math-display {
      background: var(--bg-3); border: 1px solid var(--line);
      padding: 12px; border-radius: var(--r-sm); margin: 6px 0;
      text-align: center; overflow-x: auto;
    }
    /* ---------- new block kinds (2026-07) ---------- */
    .preview audio { display: block; width: 100%; }
    .preview hr.divider-rule { border: 0; border-top: 1px solid var(--line-2); margin: 14px 0; }
    .preview .divider {
      display: flex; align-items: center; gap: 10px; margin: 14px 0;
      color: var(--text-3); font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .preview .divider hr { flex: 1; border: 0; border-top: 1px solid var(--line-2); margin: 0; }
    .preview .pull-quote {
      border-left: 3px solid var(--blue);
      background: var(--blue-pale);
      margin: 8px 0 10px; padding: 12px 16px;
      font-size: 16px; font-weight: 500; color: var(--text);
      font-style: italic; border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .preview .pull-quote cite {
      display: block; margin-top: 6px;
      font-size: 12px; font-style: normal; font-weight: 500;
      color: var(--text-3);
    }
    .preview .cardset-stack { display: flex; flex-direction: column; gap: 10px; }
    .preview .steps-list { list-style: none; counter-reset: stepc; padding: 0; margin: 6px 0; display: flex; flex-direction: column; gap: 8px; }
    .preview .step-item {
      counter-increment: stepc; position: relative;
      background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--r-sm);
      padding: 10px 12px 10px 48px;
    }
    .preview .step-item::before {
      content: counter(stepc);
      position: absolute; left: 10px; top: 10px;
      width: 28px; height: 28px;
      display: grid; place-items: center;
      background: var(--blue-dim); color: var(--blue);
      border-radius: 50%; font-weight: 700; font-size: 13px;
    }
    .preview .step-title { font-weight: 600; color: var(--text); margin-bottom: 2px; font-size: 13.5px; }
    .preview .step-body { color: var(--text-2); font-size: 13px; }
    .preview .cat-items { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
    .preview .cat-item {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: 999px; padding: 5px 12px;
      cursor: pointer; font-size: 12.5px; color: var(--text-2);
      font-family: inherit;
    }
    .preview .cat-item:hover { background: var(--bg-4); border-color: var(--line-3); }
    .preview .cat-item.selected { border-color: var(--blue); background: var(--blue-pale); color: var(--text); }
    .preview .cat-item.correct  { border-color: var(--green); background: var(--green-dim); color: var(--text); }
    .preview .cat-item.wrong    { border-color: var(--red);   background: var(--red-dim);   color: var(--text); }
    .preview .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .preview .cat-bucket {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); min-height: 90px;
      display: flex; flex-direction: column;
    }
    .preview .cat-bucket.correct { border-color: var(--green); }
    .preview .cat-bucket.wrong   { border-color: var(--red); }
    .preview .cat-bucket-head {
      padding: 6px 10px; font-size: 11.5px; font-weight: 600;
      color: var(--text-2); border-bottom: 1px solid var(--line);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .preview .cat-bucket-body {
      padding: 8px; display: flex; flex-wrap: wrap; gap: 4px; flex: 1;
    }

    /* ---------- INTERACTIVE PRACTICE PREVIEWS ---------- */
    .preview .practice {
      display: flex; flex-direction: column; gap: 10px;
    }
    .preview .practice .prompt {
      font-weight: 500; color: var(--text); font-size: 14px;
    }
    .preview .practice .options {
      display: flex; flex-direction: column; gap: 6px;
    }
    .preview .practice .opt {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 8px 10px;
      cursor: pointer; font-size: 13px; color: var(--text-2);
      text-align: left; font-family: inherit; width: 100%;
    }
    .preview .practice .opt:hover { background: var(--bg-4); border-color: var(--line-3); }
    .preview .practice .opt.selected { border-color: var(--blue); background: var(--blue-pale); color: var(--text); }
    .preview .practice .opt.correct { border-color: var(--green); background: var(--green-dim); color: var(--text); }
    .preview .practice .opt.wrong { border-color: var(--red); background: var(--red-dim); color: var(--text); }
    .preview .practice .opt .marker { font-size: 13px; opacity: 0.7; }
    .preview .practice .check-row { display: flex; gap: 8px; align-items: center; }
    .preview .practice .check-row .check-btn {
      background: var(--blue); color: #fff; border: 0;
      padding: 6px 14px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 12.5px; font-weight: 600;
      cursor: pointer;

    .preview .practice .check-row .check-btn:hover { background: var(--blue-2); }
    .preview .practice .check-row .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview .practice .check-row .reset-btn {
      background: transparent; color: var(--text-3); border: 1px solid var(--line-2);
      padding: 5px 12px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    .preview .practice .feedback {
      border-radius: var(--r-sm); padding: 8px 12px; font-size: 12.5px;
    }
    .preview .practice .feedback.ok    { background: var(--green-dim); border-left: 3px solid var(--green); color: var(--text); }
    .preview .practice .feedback.bad   { background: var(--red-dim);   border-left: 3px solid var(--red);   color: var(--text); }
    .preview .practice .feedback.info  { background: var(--blue-pale); border-left: 3px solid var(--blue);  color: var(--text); }
    .preview .practice .feedback b { color: var(--text); }

    /* MCQ + true/false + short-answer share .practice above */
    .preview .practice .sa-input, .preview .practice .fb-input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm); padding: 7px 10px;
      font-family: inherit; font-size: 13px; outline: none;
    }
    .preview .practice .sa-input:focus, .preview .practice .fb-input:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-pale);
    }
    .preview .practice .fb-sentence { line-height: 2.2; font-size: 13.5px; color: var(--text-2); }
    .preview .practice .fb-sentence .fb-input {
      display: inline-block; min-width: 100px; max-width: 220px;
      margin: 0 2px; text-align: center;
    }
    .preview .practice .fb-sentence .fb-input.correct { background: var(--green-dim); border-color: var(--green); }
    .preview .practice .fb-sentence .fb-input.wrong   { background: var(--red-dim);   border-color: var(--red); }
    .preview .practice .reveal-line { color: var(--text-3); font-size: 12px; margin-left: 4px; }

    /* Denary → binary (toggles) */
    .preview .practice .db-denary {
      display: flex; align-items: center; gap: 8px;
      background: var(--blue-pale); border: 1px solid var(--blue);
      border-radius: var(--r-sm); padding: 6px 12px;
      align-self: flex-start;
    }
    .preview .practice .db-denary-label {
      font-size: 11px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    }
    .preview .practice .db-denary-value {
      font-family: 'JetBrains Mono', ui-monospace, Consolas, monospace;
      font-size: 18px; font-weight: 700; color: var(--text);
    }
    .preview .practice .db-bits {
      display: flex; gap: 6px; flex-wrap: wrap;
      justify-content: center;
    }
    .preview .practice .db-bit {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm);
      width: 44px; height: 56px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; font-family: inherit;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    .preview .practice .db-bit:hover { background: var(--bg-4); border-color: var(--line-3); }
    .preview .practice .db-bit[aria-pressed="true"] {
      background: var(--blue-dim); border-color: var(--blue); color: var(--text);
    }
    .preview .practice .db-bit .db-bit-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .preview .practice .db-bit .db-bit-place {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-4);
      margin-top: 2px;
    }
    .preview .practice .db-bit[aria-pressed="true"] .db-bit-place { color: var(--blue); }
    .preview .practice .db-bit.correct {
      background: var(--green-dim); border-color: var(--green);
    }
    .preview .practice .db-bit.correct .db-bit-place { color: var(--green); }
    .preview .practice .db-bit.wrong {
      background: var(--red-dim); border-color: var(--red);
    }
    .preview .practice .db-bit.wrong .db-bit-place { color: var(--red); }
    /* Practice "done" indicator in the editor preview — mirrors the
       .practice.practice-done rule in lesson.html. Set by the
       attachInteractivity onScore callback when the staff clicks Check
       inside the preview. */
    .preview .practice.practice-done {
      box-shadow: 0 0 0 1px var(--green);
      border-radius: var(--r-sm);
    }

    /* Match */
    .preview .practice .match-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .preview .practice .match-col { display: flex; flex-direction: column; gap: 6px; }
    .preview .practice .match-col h5 { margin: 0 0 4px; font-size: 11px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .preview .practice .match-tile {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 7px 10px;
      cursor: pointer; font-size: 12.5px; color: var(--text-2);
      text-align: left; font-family: inherit;
    }
    .preview .practice .match-tile:hover { background: var(--bg-4); }
    .preview .practice .match-tile.selected { border-color: var(--blue); background: var(--blue-pale); color: var(--text); }
    .preview .practice .match-tile.correct { border-color: var(--green); background: var(--green-dim); }
    .preview .practice .match-tile.wrong   { border-color: var(--red);   background: var(--red-dim); }
    .preview .practice .match-tile.muted   { opacity: 0.4; }

    /* Ordering */
    .preview .practice .order-list { display: flex; flex-direction: column; gap: 4px; }
    .preview .practice .order-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 7px 10px;
      font-size: 13px; color: var(--text-2); cursor: grab;
      user-select: none;
    }
    .preview .practice .order-item:active { cursor: grabbing; }
    .preview .practice .order-item.dragging { opacity: 0.4; }
    .preview .practice .order-item .grip { color: var(--text-4); font-size: 14px; }
    .preview .practice .order-item.correct-pos { border-color: var(--green); background: var(--green-dim); }
    .preview .practice .order-item.wrong-pos   { border-color: var(--red);   background: var(--red-dim); }

    /* Hotspot */
    .preview .practice .hotspot-wrap {
      position: relative; display: inline-block; max-width: 100%;
    }
    .preview .practice .hotspot-wrap img {
      display: block; max-width: 100%; border-radius: var(--r-sm);
      cursor: crosshair;
    }
    .preview .practice .hotspot-wrap .dot {
      position: absolute; width: 18px; height: 18px;
      border-radius: 50%; transform: translate(-50%, -50%);
      border: 2px solid var(--blue); background: var(--blue-pale);
      display: grid; place-items: center;
      font-size: 10px; color: var(--blue); font-weight: 700;
    }

    /* ---------- LAYOUT PREVIEWS ---------- */
    .preview .accordion { display: flex; flex-direction: column; gap: 6px; }
    .preview .accordion .acc-item {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .preview .accordion .acc-head {
      padding: 8px 12px; cursor: pointer;
      font-weight: 500; color: var(--text); font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .preview .accordion .acc-head:hover { background: var(--bg-4); }
    .preview .accordion .acc-head .caret { color: var(--text-4); font-size: 10px; transition: transform 0.15s ease; }
    .preview .accordion .acc-item.open .acc-head .caret { transform: rotate(90deg); }
    .preview .accordion .acc-body { display: none; padding: 8px 14px 12px; border-top: 1px solid var(--line); color: var(--text-2); font-size: 13px; }
    .preview .accordion .acc-item.open .acc-body { display: block; }

    .preview .tabs { display: flex; flex-direction: column; gap: 8px; }
    .preview .tabs .tab-bar {
      display: flex; gap: 4px; border-bottom: 1px solid var(--line);
    }
    .preview .tabs .tab {
      background: transparent; border: 0;
      padding: 7px 12px; cursor: pointer;

      border-bottom: 2px solid transparent; margin-bottom: -1px;

    .preview .tabs .tab:hover { color: var(--text-2); }
    .preview .tabs .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .preview .tabs .tab-body { color: var(--text-2); font-size: 13px; }

    .preview .compare-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .preview .compare-grid .col {
      background: var(--bg-3); border: 1px solid var(--line);
      border-radius: var(--r-sm); padding: 12px; font-size: 13px; color: var(--text-2);
    }
    .preview .compare-grid .col h4 {
      margin: 0 0 8px; font-size: 12.5px; font-weight: 600; color: var(--text);
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .preview .timeline { position: relative; padding-left: 22px; }
    .preview .timeline::before {
      content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px;
      width: 2px; background: var(--line-2);
    }
    .preview .timeline .tl-item { position: relative; margin-bottom: 14px; }
    .preview .timeline .tl-item::before {
      content: ''; position: absolute; left: -19px; top: 6px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--blue); border: 2px solid var(--bg-2);
    }
    .preview .timeline .tl-item .tl-date {
      font-size: 11px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    }
    .preview .timeline .tl-item .tl-title { font-weight: 600; color: var(--text); font-size: 13.5px; margin: 2px 0 4px; }
    .preview .timeline .tl-item .tl-body { color: var(--text-2); font-size: 13px; }

    /* ---------- STUDY AID PREVIEWS ---------- */
    .preview .objectives { display: flex; flex-direction: column; gap: 4px; }
    .preview .objectives .obj-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 8px; border-radius: var(--r-sm);
      font-size: 13px; color: var(--text-2); cursor: pointer;
    }
    .preview .objectives .obj-item:hover { background: var(--bg-3); }
    .preview .objectives .obj-item input { margin-top: 2px; accent-color: var(--blue); }
    .preview .objectives .obj-item.done { color: var(--text-4); text-decoration: line-through; }

    .preview .glossary { display: flex; flex-direction: column; gap: 4px; }

    /* ---------- New interactive kinds (2026-07-24) ---------- */
    /* The preview pane uses .preview prefix; we mirror the live styles. */

    /* Slider */
    .preview .practice .slider-wrap { display: flex; flex-direction: column; gap: 10px; }
    .preview .practice .slider-track {
      position: relative; height: 8px; background: var(--bg-3);
      border: 1px solid var(--line); border-radius: 999px; cursor: pointer;
    }
    .preview .practice .slider-fill {
      position: absolute; top: 0; left: 0; height: 100%;

      transition: width 0.1s linear, background 0.2s ease;

      position: absolute; top: 50%;
