<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set a new password — Recall</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0D1117;
      --bg-2:      #161B22;
      --bg-3:      #1C2128;
      --bg-4:      #21262D;
      --line:      #21262D;
      --line-2:    #30363D;
      --line-3:    #484F58;
      --text:      #F0F6FC;
      --text-2:    #C9D1D9;
      --text-3:    #8B949E;
      --text-4:    #6E7681;
      --blue:      #58A6FF;
      --blue-2:    #1F6FEB;
      --blue-dim:  rgba(56,139,253,0.15);
      --blue-pale: rgba(56,139,253,0.08);
      --green:     #3FB950;
      --red:       #F85149;
      --r-sm: 6px;
      --r-md: 8px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::selection { background: var(--blue); color: #fff; }

    nav.top {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    nav.top .row {
      max-width: 1280px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 16px;
      color: var(--text);
    }
    .brand:hover { text-decoration: none; }
    .brand-mark {
      width: 28px; height: 28px;
      display: block;
      object-fit: cover;
      border-radius: var(--r-sm);
    }

    .page {
      max-width: 480px; margin: 0 auto;
      padding: 64px 24px 80px;
    }
    .form-card {
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      padding: 32px;
    }
    .form-card h1 {
      margin: 0 0 6px;
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.015em;
    }
    .form-card .sub {
      font-size: 13px; color: var(--text-3);
      margin: 0 0 24px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label {
      font-size: 13px; font-weight: 500;
      color: var(--text-2);
    }
    .field input {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 9px 12px;
      font-family: inherit; font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-pale);
    }
    .field input::placeholder { color: var(--text-4); }
    .field .hint { font-size: 12px; color: var(--text-3); }
    .field .hint.error { color: var(--red); }
    .field .hint.ok { color: var(--green); }

    .btn-primary {
      width: 100%;
      background: var(--blue); color: #fff;
      padding: 10px 18px; border-radius: var(--r-sm);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border: 1px solid var(--blue);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-primary:hover { background: var(--blue-2); border-color: var(--blue-2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      display: none;
      border-radius: var(--r-sm);
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .status.show { display: block; }
    .status.ok    { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.4); color: #7EE787; }
    .status.error { background: rgba(248,81,73,0.10); border: 1px solid rgba(248,81,73,0.4); color: #FFA198; }

    .foot {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 12.5px;
      color: var(--text-3);
      text-align: center;
    }

    .loading {
      text-align: center;
      color: var(--text-3);
      padding: 32px 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 2px solid var(--blue); outline-offset: 2px;
    }
  </style>
</head>
<body>

<nav class="top">
  <div class="row">
    <a class="brand" href="index.html"><img class="brand-mark" src="logo.png" alt="Recall" /> Recall</a>
  </div>
</nav>

<main class="page">
  <div class="form-card">
    <h1 id="heading">Set a new password</h1>
    <p class="sub" id="subheading">Choose a new password for your Recall account.</p>

    <div class="status" id="status"></div>

    <!-- Shown while we wait for the recovery session to be set up. -->
    <div class="loading" id="loading">Verifying your reset link…</div>

    <!-- Shown once we have a recovery session. -->
    <form id="resetForm" hidden novalidate>
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="At least 12 characters" autocomplete="new-password" minlength="12" required />
        <span class="hint" id="pwdHint">At least 12 characters. Longer is stronger.</span>
      </div>

      <div class="field">
        <label for="password2">Confirm new password</label>
        <input type="password" id="password2" name="password2" placeholder="Type your new password again" autocomplete="new-password" required />
        <span class="hint" id="pwdMatch"></span>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Save new password</button>
    </form>

    <!-- Shown when the link is invalid or has expired. -->
    <div id="invalidState" hidden>
      <p style="color: var(--text-2); margin: 0 0 16px;">
        This reset link is invalid or has expired. Reset links are valid for 1 hour.
      </p>
      <a class="btn-primary" href="login.html#forgot" style="display: inline-block; text-align: center; text-decoration: none;">Request a new link</a>
    </div>

    <div class="foot">
      Need help? <a href="mailto:hello@recalleducation.co.uk">hello@recalleducation.co.uk</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://hkjiyibpeqdoqzlyqzwz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhraml5aWJwZXFkb3F6bHlxend6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MzkxNDgsImV4cCI6MjA5OTQxNTE0OH0.UGVZ0-b9-c7JVtu006mmyfj0NkIbpmmn0wCNNqdi9iU';
  // The supabase-js client already sets the `apikey` header on every
  // request, but privacy-focused browsers and extensions (Brave Shields,
  // uBlock Origin in strict mode, some corporate firewalls) silently strip
  // headers that aren't in the CORS-safelisted list. Supabase's gateway
  // also accepts the apikey as a `?apikey=` URL parameter — we add it as
  // a fallback so users with Shields / ad-blockers can still sign up and
  // sign in. The anon key is public by design; embedding it in URLs is
  // no worse than embedding it in the bundled JS.
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    global: {
      fetch: (url, options = {}) => {
        try {
          const u = new URL(url, window.location.href);
          if (u.host.endsWith('.supabase.co') && !u.searchParams.has('apikey')) {
            u.searchParams.set('apikey', SUPABASE_ANON_KEY);
          }
          return fetch(u.toString(), options);
        } catch (_) {
          return fetch(url, options);
        }
      }
    }
  });

  const $ = (id) => document.getElementById(id);

  function showStatus(text, kind) {
    const el = $('status');
    el.textContent = text;
    el.className = 'status show ' + (kind || '');
  }
  function setHint(el, msg, state) {
    el.textContent = msg;
    el.className = 'hint' + (state ? ' ' + state : '');
  }

  function explainAuthError(message) {
    if (!message) return 'Something went wrong. Please try again.';
    const m = message.toLowerCase();
    if (m.includes('password') && (m.includes('short') || m.includes('characters') || m.includes('12'))) {
      return 'Password must be at least 12 characters.';
    }
    if (m.includes('same') || m.includes('different from')) {
      return 'Your new password must be different from your old one.';
    }
    if (m.includes('auth session') || m.includes('session missing') || m.includes('not authenticated')) {
      return 'Your reset link has expired. Request a new one and try again.';
    }
    if (m.includes('rate limit') || m.includes('too many')) {
      return 'Too many attempts. Wait a moment and try again.';
    }
    if (m.includes('network') || m.includes('fetch')) {
      return 'Network error. Check your connection and try again.';
    }
    return message;
  }

  // Wait for either a PASSWORD_RECOVERY event (the email-link path) or
  // an existing recovery session. If neither arrives within a few seconds,
  // the link is invalid/expired.
  let recoverySeen = false;
  let authSub;

  function showForm() {
    $('loading').hidden = true;
    $('invalidState').hidden = true;
    $('resetForm').hidden = false;
    $('password').focus();
  }
  function showInvalid() {
    $('loading').hidden = true;
    $('resetForm').hidden = true;
    $('invalidState').hidden = false;
    $('heading').textContent = 'Reset link expired';
    $('subheading').textContent = 'Request a new one to keep going.';
  }

  // supabase-js auto-processes the URL hash on init when detectSessionInUrl
  // is true (the default). That fires PASSWORD_RECOVERY when the link is a
  // recovery link. We also accept SIGNED_IN just in case the user landed
  // here via a magic link or already had a session.
  ({ data: authSub } = supabaseClient.auth.onAuthStateChange((event, session) => {
    if (recoverySeen) return;
    if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session?.user)) {
      recoverySeen = true;
      showForm();
    }
  }));

  // Fallback: if the URL hash has already been processed by the time we
  // attach the listener, getSession() will return the recovery session.
  supabaseClient.auth.getSession().then(({ data, error }) => {
    if (recoverySeen) return;
    if (!error && data?.session) {
      recoverySeen = true;
      showForm();
    }
  });

  // If after 4 seconds nothing has resolved, assume the link is bad.
  setTimeout(() => {
    if (!recoverySeen) showInvalid();
  }, 4000);

  // ---------- password strength + match hints ----------
  const password = $('password');
  const password2 = $('password2');
  const pwdHint = $('pwdHint');
  const pwdMatch = $('pwdMatch');
  const submitBtn = $('submitBtn');

  function updatePwdHint() {
    const v = password.value;
    if (!v) { setHint(pwdHint, 'At least 12 characters. Longer is stronger.'); return; }
    if (v.length < 12) setHint(pwdHint, v.length + ' characters. Needs at least 12.', 'error');
    else if (v.length < 16) setHint(pwdHint, v.length + ' characters. Good. 16+ is stronger.', 'ok');
    else setHint(pwdHint, v.length + ' characters. Strong.', 'ok');
  }
  function updatePwdMatch() {
    if (!password2.value) { setHint(pwdMatch, ''); return; }
    if (password.value === password2.value) setHint(pwdMatch, 'Passwords match.', 'ok');
    else setHint(pwdMatch, 'Passwords do not match.', 'error');
  }
  password.addEventListener('input', () => { updatePwdHint(); updatePwdMatch(); });
  password2.addEventListener('input', updatePwdMatch);
  updatePwdHint();

  // ---------- submit ----------
  $('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (password.value.length < 12) {
      showStatus('Password must be at least 12 characters.', 'error');
      return;
    }
    if (password.value !== password2.value) {
      showStatus('Passwords do not match.', 'error');
      return;
    }

    submitBtn.disabled = true;
    const original = submitBtn.textContent;
    submitBtn.textContent = 'Saving…';

    try {
      const { error } = await supabaseClient.auth.updateUser({ password: password.value });
      if (error) {
        showStatus(explainAuthError(error.message), 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = original;
        return;
      }
      showStatus('Password updated — taking you to your dashboard…', 'ok');
      // Sign out so the user re-authenticates with the new password. The
      // dashboard would otherwise render with the recovery session, and
      // the next refresh / sign-in would re-hash the same recovery link.
      setTimeout(async () => {
        try { await supabaseClient.auth.signOut(); } catch (_) {}
        window.location.href = 'dashboard.html';
      }, 1500);
    } catch (err) {
      showStatus('Network error. Check your connection and try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = original;
    }
  });
</script>
</body>
</html>
